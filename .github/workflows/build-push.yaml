# Build and Push Docker Images
#
# Builds Docker image and pushes to registries:
#   - GitHub Container Registry (GHCR)
#   - Azure Container Registry (ACR) - optional
#
# Triggers:
#   - After CI passes on main branch
#   - On version tags (v*)
#   - Manual dispatch with registry selection
#
# Tags:
#   - sha-<commit>  (immutable, for CI)
#   - v1.2.3        (semantic version, for releases)

name: Build and Push

on:
  # Trigger after CI passes on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Trigger on version tags
  push:
    tags:
      - 'v*'

  # Manual trigger with registry selection
  workflow_dispatch:
    inputs:
      registry:
        description: 'Which registry to push to'
        required: false
        default: 'both'
        type: choice
        options:
          - ghcr
          - acr
          - both

# Cancel in-progress runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Image name (without registry prefix)
  IMAGE_NAME: elspeth
  # Commit that the built image represents. For workflow_run, github.sha is the
  # default-branch tip, not necessarily the completed CI run's commit.
  IMAGE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  # Platforms to build for
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  # ===========================================================================
  # Build and Push Docker Image
  # ===========================================================================
  build-push:
    name: Build and Push
    runs-on: [self-hosted, Linux, X64, nyx-ci, trusted]
    # Only run if CI passed for a trusted push in this repository, or always
    # for tags/dispatch. The workflow_run branch filter alone is not a trust
    # boundary: fork pull_request runs can report a matching head branch name.
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )

    permissions:
      actions: read
      checks: read
      contents: read
      packages: write
      statuses: read
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      # Export only non-secret digest values. GitHub Actions suppresses job
      # outputs that contain secret-derived values such as the ACR hostname.
      ghcr_digest: ${{ steps.ghcr-push.outputs.digest }}
      acr_digest: ${{ steps.acr-push.outputs.digest }}
      # Which registries were actually pushed, so the smoke-test job tests the
      # image that exists rather than unconditionally pulling GHCR.
      push_ghcr: ${{ steps.registries.outputs.push_ghcr }}
      push_acr: ${{ steps.registries.outputs.push_acr }}

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ env.IMAGE_SHA }}

      - name: Verify required checks for image commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_SHA: ${{ env.IMAGE_SHA }}
        run: |
          set -euo pipefail
          python3 scripts/cicd/check_release_required_checks.py \
            --repo "$GITHUB_REPOSITORY" \
            --sha "$IMAGE_SHA" \
            --ruleset-name main

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      # This is the exact lean extras profile used by ECS acceptance builds.
      # Build and exercise it before any registry login/push so dev/all extras
      # cannot mask a missing production dependency.
      - name: Verify lean PostgreSQL image contract
        run: |
          set -euo pipefail
          INSTALL_EXTRAS="webui llm aws postgres"
          LEAN_IMAGE="elspeth-lean-postgres:${IMAGE_SHA}"
          docker build --load \
            --build-arg INSTALL_EXTRAS="$INSTALL_EXTRAS" \
            --tag "$LEAN_IMAGE" \
            .
          test "$(docker inspect --format '{{ index .Config.Labels "io.elspeth.install-extras" }}' "$LEAN_IMAGE")" = "$INSTALL_EXTRAS"
          docker run --rm --interactive --entrypoint python "$LEAN_IMAGE" - <<'PY'
          import psycopg
          import psycopg2
          from sqlalchemy import create_engine

          del psycopg, psycopg2
          for url, expected_driver in (
              ("postgresql://user:password@localhost/database", "psycopg2"),  # secret-scan: allow-this-line
              ("postgresql+psycopg://user:password@localhost/database", "psycopg"),
          ):
              engine = create_engine(url)
              assert engine.dialect.driver == expected_driver
              engine.dispose()
          PY
          docker image rm "$LEAN_IMAGE"

      # -----------------------------------------------------------------------
      # Determine which registries to push to
      # -----------------------------------------------------------------------
      - name: Determine registry targets
        id: registries
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          INPUT_REGISTRY: ${{ github.event.inputs.registry }}
        run: |
          # Default to both for automatic triggers
          REGISTRY="${INPUT_REGISTRY:-both}"

          if [[ "$REGISTRY" == "ghcr" || "$REGISTRY" == "both" ]]; then
            echo "push_ghcr=true" >> "$GITHUB_OUTPUT"
          else
            echo "push_ghcr=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$REGISTRY" == "acr" || "$REGISTRY" == "both" ]]; then
            # Only push to ACR if credentials are configured
            if [[ -n "$ACR_REGISTRY" ]]; then
              echo "push_acr=true" >> "$GITHUB_OUTPUT"
            else
              echo "push_acr=false" >> "$GITHUB_OUTPUT"
              echo "::warning::ACR credentials not configured, skipping ACR push"
            fi
          else
            echo "push_acr=false" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # Generate image metadata (tags, labels)
      # -----------------------------------------------------------------------
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # SHA tag (immutable)
            type=sha,prefix=sha-,format=short
            # Semantic version from tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # -----------------------------------------------------------------------
      # Login to registries
      # -----------------------------------------------------------------------
      - name: Login to GHCR
        if: steps.registries.outputs.push_ghcr == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ACR
        if: steps.registries.outputs.push_acr == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      # -----------------------------------------------------------------------
      # Build and push to GHCR
      # -----------------------------------------------------------------------
      - name: Build and push to GHCR
        id: ghcr-push
        if: steps.registries.outputs.push_ghcr == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          build-args: INSTALL_EXTRAS=all
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ env.IMAGE_SHA }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # -----------------------------------------------------------------------
      # Build and push to ACR
      # -----------------------------------------------------------------------
      - name: Build and push to ACR
        id: acr-push
        if: steps.registries.outputs.push_acr == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          build-args: INSTALL_EXTRAS=all
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ env.IMAGE_SHA }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # -----------------------------------------------------------------------
      # Sign pushed image digests with GitHub OIDC/Sigstore.
      # -----------------------------------------------------------------------
      - name: Install cosign
        if: steps.ghcr-push.outputs.digest != '' || steps.acr-push.outputs.digest != ''
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Sign GHCR image digest
        if: steps.ghcr-push.outputs.digest != ''
        env:
          IMAGE_DIGEST: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@${{ steps.ghcr-push.outputs.digest }}
        run: cosign sign --yes "$IMAGE_DIGEST"

      - name: Sign ACR image digest
        if: steps.acr-push.outputs.digest != ''
        env:
          IMAGE_DIGEST: ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.acr-push.outputs.digest }}
        run: cosign sign --yes "$IMAGE_DIGEST"

      # -----------------------------------------------------------------------
      # Summary
      # -----------------------------------------------------------------------
      - name: Print image summary
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          PUSH_GHCR: ${{ steps.registries.outputs.push_ghcr }}
          PUSH_ACR: ${{ steps.registries.outputs.push_acr }}
          REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_SHA: ${{ env.IMAGE_SHA }}
        run: |
          {
            echo "## Docker Image Build Summary"
            echo ""
            echo "| Registry | Image | Status |"
            echo "|----------|-------|--------|"

            if [[ "$PUSH_GHCR" == "true" ]]; then
              echo "| GHCR | \`ghcr.io/${REPO_OWNER}/${IMAGE_NAME}:sha-${IMAGE_SHA}\` | ✅ Pushed |"
            else
              echo "| GHCR | - | ⏭️ Skipped |"
            fi

            if [[ "$PUSH_ACR" == "true" ]]; then
              echo "| ACR | \`${ACR_REGISTRY}/${IMAGE_NAME}:sha-${IMAGE_SHA}\` | ✅ Pushed |"
            else
              echo "| ACR | - | ⏭️ Skipped |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # Smoke Test (Verify image works)
  # ===========================================================================
  smoke-test:
    name: Smoke Test
    runs-on: [self-hosted, Linux, X64, nyx-ci, trusted]
    needs: [build-push]
    # Only smoke-test when an image was actually pushed. An ACR-only manual
    # dispatch sets push_ghcr=false; if neither registry was pushed there is
    # nothing to test (and the old job would have failed pulling a GHCR image
    # the workflow intentionally did not push).
    if: needs.build-push.outputs.push_ghcr == 'true' || needs.build-push.outputs.push_acr == 'true'
    steps:
      - name: Checkout code (for example files)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ env.IMAGE_SHA }}

      # Bind smoke verification to the immutable action-output digests that the
      # release job will promote. When both registries are enabled, both
      # independently-pushed digests must pass the runtime contract.
      - name: Determine smoke-test images
        env:
          GHCR_DIGEST: ${{ needs.build-push.outputs.ghcr_digest }}
          ACR_DIGEST: ${{ needs.build-push.outputs.acr_digest }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          GHCR_IMAGE=""
          ACR_IMAGE=""
          if [[ -n "$GHCR_DIGEST" ]]; then
            GHCR_IMAGE="ghcr.io/${REPO_OWNER}/${IMAGE_NAME}@${GHCR_DIGEST}"
          fi
          if [[ -n "$ACR_DIGEST" ]]; then
            ACR_IMAGE="${ACR_REGISTRY}/${IMAGE_NAME}@${ACR_DIGEST}"
          fi
          if [[ -n "$GHCR_IMAGE" ]]; then
            SMOKE_IMAGE="$GHCR_IMAGE"
          elif [[ -n "$ACR_IMAGE" ]]; then
            SMOKE_IMAGE="$ACR_IMAGE"
          else
            echo "No image was pushed; nothing to smoke-test." >&2
            exit 1
          fi
          echo "GHCR_IMAGE=$GHCR_IMAGE" >> "$GITHUB_ENV"
          echo "ACR_IMAGE=$ACR_IMAGE" >> "$GITHUB_ENV"
          echo "SMOKE_IMAGE=$SMOKE_IMAGE" >> "$GITHUB_ENV"

      - name: Login to GHCR (to pull image)
        if: needs.build-push.outputs.push_ghcr == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ACR (to pull image)
        if: needs.build-push.outputs.push_acr == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Verify generic image runtime contract
        run: |
          set -euo pipefail
          for image in "$GHCR_IMAGE" "$ACR_IMAGE"; do
            [[ -n "$image" ]] || continue
            docker pull "$image"
            test "$(docker inspect --format '{{ index .Config.Labels "io.elspeth.install-extras" }}' "$image")" = "all"
            docker run --rm --interactive --entrypoint python "$image" - <<'PY'
          import psycopg
          import psycopg2
          from sqlalchemy import create_engine

          del psycopg, psycopg2
          for url, expected_driver in (
              ("postgresql://user:password@localhost/database", "psycopg2"),  # secret-scan: allow-this-line
              ("postgresql+psycopg://user:password@localhost/database", "psycopg"),
          ):
              engine = create_engine(url)
              assert engine.dialect.driver == expected_driver
              engine.dispose()
          PY
          done

      - name: Basic CLI tests
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_SHA: ${{ env.IMAGE_SHA }}
        run: |
          IMAGE="$SMOKE_IMAGE"

          echo "Testing image: $IMAGE"

          # Test 1: Version check
          echo "=== Test 1: Version check ==="
          docker run --rm "$IMAGE" --version

          # Test 2: Help output
          echo "=== Test 2: Help output ==="
          docker run --rm "$IMAGE" --help

          # Test 3: Plugin list
          echo "=== Test 3: Plugin list ==="
          docker run --rm "$IMAGE" plugins list

      - name: Run pipeline integration test
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_SHA: ${{ env.IMAGE_SHA }}
        run: |
          IMAGE="$SMOKE_IMAGE"

          echo "=== Test 4: Run actual pipeline (threshold_gate_container example) ==="

          # Create fresh output directory
          rm -rf examples/threshold_gate_container/output examples/threshold_gate_container/runs
          mkdir -p examples/threshold_gate_container/output examples/threshold_gate_container/runs

          # Run the pipeline in the container
          # This example has paths configured for /app/pipeline mount point
          docker run --rm \
            -v "$PWD/examples/threshold_gate_container:/app/pipeline:rw" \
            "$IMAGE" run \
            --settings /app/pipeline/settings.yaml \
            --execute

          echo "=== Pipeline execution completed ==="

      - name: Verify pipeline outputs
        run: |
          echo "=== Test 5: Verify output files ==="

          # Check that output files were created
          if [[ ! -f "examples/threshold_gate_container/output/normal.csv" ]]; then
            echo "ERROR: normal.csv output not created"
            exit 1
          fi

          if [[ ! -f "examples/threshold_gate_container/output/high_values.csv" ]]; then
            echo "ERROR: high_values.csv output not created"
            exit 1
          fi

          # Check audit database was created
          if [[ ! -f "examples/threshold_gate_container/runs/audit.db" ]]; then
            echo "ERROR: audit.db not created"
            exit 1
          fi

          # Verify row routing (threshold is >1000)
          # High values: Bob(1500), Diana(3000), Frank(2000), Henry(5000) = 4 rows
          # Normal: Alice(500), Charlie(250), Eve(750), Grace(100) = 4 rows
          HIGH_COUNT=$(wc -l < examples/threshold_gate_container/output/high_values.csv)
          NORMAL_COUNT=$(wc -l < examples/threshold_gate_container/output/normal.csv)

          # Account for header row (+1)
          echo "High values CSV lines: $HIGH_COUNT (expected 5: header + 4 data rows)"
          echo "Normal CSV lines: $NORMAL_COUNT (expected 5: header + 4 data rows)"

          if [[ "$HIGH_COUNT" -ne 5 ]]; then
            echo "ERROR: Expected 5 lines in high_values.csv (1 header + 4 rows), got $HIGH_COUNT"
            cat examples/threshold_gate_container/output/high_values.csv
            exit 1
          fi

          if [[ "$NORMAL_COUNT" -ne 5 ]]; then
            echo "ERROR: Expected 5 lines in normal.csv (1 header + 4 rows), got $NORMAL_COUNT"
            cat examples/threshold_gate_container/output/normal.csv
            exit 1
          fi

          echo "=== Output verification passed ==="
          echo ""
          echo "High values output:"
          cat examples/threshold_gate_container/output/high_values.csv
          echo ""
          echo "Normal output:"
          cat examples/threshold_gate_container/output/normal.csv

      - name: Run representative example smoke tests
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          IMAGE_SHA: ${{ env.IMAGE_SHA }}
        run: |
          IMAGE="$SMOKE_IMAGE"

          echo "=== Test 6: Run representative no-secret examples ==="
          for example in boolean_routing batch_aggregation json_explode schema_contracts_demo; do
            echo "Running example: ${example}"
            rm -rf "examples/${example}/output" "examples/${example}/runs"
            mkdir -p "examples/${example}/output" "examples/${example}/runs"
            docker run --rm \
              -v "$PWD:/app:rw" \
              "$IMAGE" run \
              --settings "examples/${example}/settings.yaml" \
              --execute
          done

      - name: Test summary
        run: |
          {
            echo "## Container Smoke Test Results"
            echo ""
            echo "| Test | Description | Status |"
            echo "|------|-------------|--------|"
            echo "| CLI Version | \`elspeth --version\` | ✅ |"
            echo "| CLI Help | \`elspeth --help\` | ✅ |"
            echo "| Plugin List | \`elspeth plugins list\` | ✅ |"
            echo "| Pipeline Run | threshold_gate example | ✅ |"
            echo "| Output Verify | CSV row counts correct | ✅ |"
            echo "| Representative Examples | boolean, batch, JSON explode, schema contracts | ✅ |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # Create GitHub Release (on version tags)
  # ===========================================================================
  release:
    name: Create Release
    runs-on: [self-hosted, Linux, X64, nyx-ci, trusted]
    needs: [build-push, smoke-test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Login to GHCR for verified promotion
        if: needs.build-push.outputs.push_ghcr == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ACR for verified promotion
        if: needs.build-push.outputs.push_acr == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Promote verified image digest to release tag
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
        run: |
          set -euo pipefail
          GHCR_DIGEST="${{ needs.build-push.outputs.ghcr_digest }}"
          ACR_DIGEST="${{ needs.build-push.outputs.acr_digest }}"
          if [[ -n "$GHCR_DIGEST" ]]; then
            GHCR_IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${IMAGE_NAME}@${GHCR_DIGEST}"
            docker buildx imagetools create \
              --tag "ghcr.io/${GITHUB_REPOSITORY_OWNER}/${IMAGE_NAME}:${GITHUB_REF_NAME}" \
              "$GHCR_IMAGE"
          fi
          if [[ -n "$ACR_DIGEST" ]]; then
            ACR_IMAGE="${ACR_REGISTRY}/${IMAGE_NAME}@${ACR_DIGEST}"
            docker buildx imagetools create \
              --tag "${ACR_REGISTRY}/${IMAGE_NAME}:${GITHUB_REF_NAME}" \
              "$ACR_IMAGE"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            Pull from GitHub Container Registry:
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ${{ secrets.ACR_REGISTRY && format('Pull from Azure Container Registry:\n```bash\ndocker pull {0}/{1}:{2}\n```', secrets.ACR_REGISTRY, env.IMAGE_NAME, github.ref_name) || '' }}

            ## Quick Start

            ```bash
            # Show help
            docker run ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

            # Run a pipeline
            docker run -v ./config:/app/config:ro \\
                       -v ./input:/app/input:ro \\
                       -v ./output:/app/output \\
                       ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \\
                       run --settings /app/config/pipeline.yaml --execute
            ```
