# CI Pipeline - Lint and Test
#
# Runs on every push and PR. Fast feedback loop with:
#   - Linting (ruff, mypy) - ~30 seconds
#   - Testing (pytest with coverage) - ~3-5 minutes
#   - Bug-hiding pattern detection
#   - Contract enforcement (Settings→Runtime alignment, type boundaries)
#
# All checks must pass before merging to protected integration branches.

name: CI

on:
  push:
    branches: [main, master, "RC*"]
  pull_request:
    branches: [main, master, "RC*"]

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.5"

permissions:
  contents: read

# Public-repository guardrail: self-hosted runners execute arbitrary workflow
# code on our infrastructure, so fork PRs stay on GitHub-hosted runners.
# Trusted pushes and same-repository PRs use the nyx runner.
#
# GitHub's runs-on expression accepts either a runner label string or a JSON
# array of labels. Keep this expression identical across jobs so the aggregate
# CI Success check reflects one routing policy.
#
# Self-hosted container jobs can leave root-owned venv/cache artifacts in the
# default workspace. Every checkout below uses a per-run, per-job path so stale
# workspace siblings cannot break actions/checkout before project commands run.
#
#   ${{ fromJSON((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && '["self-hosted","Linux","X64","nyx-ci","trusted"]' || '"ubuntu-24.04"') }}

jobs:
  # ===========================================================================
  # Stage 1: Static analysis (shared Python environment)
  # ===========================================================================
  static-analysis:
    name: Static analysis
    runs-on: ${{ fromJSON((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && '["self-hosted","Linux","X64","nyx-ci","trusted"]' || '"ubuntu-24.04"') }}
    container:
      image: python:3.13-bookworm
    env:
      CI_CHECKOUT_PATH: ci-${{ github.run_id }}-${{ github.run_attempt }}-static-analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          path: ${{ env.CI_CHECKOUT_PATH }}

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a
        with:
          version: ${{ env.UV_VERSION }}

      - name: Use checkout-local uv cache
        run: echo "UV_CACHE_DIR=$GITHUB_WORKSPACE/$CI_CHECKOUT_PATH/.uv-cache" >> "$GITHUB_ENV"

      - name: Install system dependencies
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          apt-get update -q
          apt-get install -y -q libsqlcipher-dev

      - name: Install dependencies
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: uv sync --frozen --all-extras

      - name: Check code style (ruff)
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: uv run ruff check src/ tests/ scripts/ examples/ elspeth-lints/src/

      - name: Check formatting (ruff format)
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: uv run ruff format --check src/ tests/ scripts/ examples/ elspeth-lints/src/

      - name: Type check (mypy)
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: uv run mypy src/ elspeth-lints/src/

      - name: Check SlotType / guided.ts mirror consistency
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: uv run python scripts/cicd/check_slot_type_cross_language.py

      - name: Check composer skill tool inventory
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: uv run python scripts/cicd/generate_skill_inventory.py --check

      - name: Enforce contract alignment
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: uv run python scripts/check_contracts.py

      - name: Run plugin options metadata elspeth-lints rule
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules plugin_contract.options_metadata \
            --root .

      - name: Run plugin-contract elspeth-lints rules
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules plugin_contract.component_type,plugin_contract.plugin_hashes \
            --root src/elspeth

      - name: Run immutability elspeth-lints rules
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules immutability.freeze_guards,immutability.frozen_annotations \
            --root src/elspeth

      - name: Run audit-evidence elspeth-lints rules
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules audit_evidence.nominal_base,audit_evidence.tier_1_decoration,audit_evidence.guard_symmetry,audit_evidence.gve_attribution \
            --root src/elspeth

      - name: Run composer elspeth-lints rules
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules 'composer/*' \
            --root src/elspeth

      - name: Run contract-invariants elspeth-lints rules
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules 'contract_invariants/*' \
            --root src/elspeth

      - name: Run session-engine-factory elspeth-lints rule
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules contract_invariants.session_engine_factory \
            --root .

      - name: Run contract-manifest elspeth-lints rule
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules manifest.contract_manifest \
            --root src/elspeth

      - name: Run manifest inventory elspeth-lints rules
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules manifest.symbol_inventory,manifest.test_to_source_mapping \
            --root .

      - name: Run trust-tier elspeth-lints rule
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        env:
          ELSPETH_JUDGE_METADATA_HMAC_KEY: ${{ secrets.ELSPETH_JUDGE_METADATA_HMAC_KEY }}
          ELSPETH_JUDGE_METADATA_SIGNATURE_VERIFY_MODE: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && 'shape-only-when-key-missing' || 'required' }}
        run: |
          set +e
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules trust_tier.tier_model \
            --root src/elspeth
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::error title=Trust-tier signed allowlist diagnosis::If this failure mentions judge_metadata_signature, file_fingerprint, scope_fingerprint, or ast_path drift, run: diagnose-judge-signatures --root src/elspeth --allowlist-dir config/cicd/enforce_tier_model. To repair diagnosed drift from an operator shell, run: sign-judge-signatures --root src/elspeth --allowlist-dir config/cicd/enforce_tier_model --env-file /path/to/operator.env --owner \"\$USER\""
          fi
          exit "$status"

      - name: Run trust-boundary honesty-gate elspeth-lints rules
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        env:
          ELSPETH_JUDGE_METADATA_HMAC_KEY: ${{ secrets.ELSPETH_JUDGE_METADATA_HMAC_KEY }}
          ELSPETH_JUDGE_METADATA_SIGNATURE_VERIFY_MODE: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && 'shape-only-when-key-missing' || 'required' }}
        run: |
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules trust_boundary.tests,trust_boundary.scope,trust_boundary.tier \
            --root src/elspeth

      - name: Forbid new bespoke CI enforcers
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules meta.no-new-bespoke-cicd-enforcer \
            --root .

      - name: Run adapter facade budget legacy gate
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          uv run python scripts/cicd/enforce_adapter_budget.py

      - name: Emit elspeth-lints SARIF artifact
        if: always()
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          set +e
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules meta.no-new-bespoke-cicd-enforcer,plugin_contract.options_metadata \
            --root . \
            --format sarif > elspeth-lints.sarif
          status=$?
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi

      - name: Emit elspeth-lints immutability SARIF artifact
        if: always()
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          set +e
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules immutability.freeze_guards,immutability.frozen_annotations \
            --root src/elspeth \
            --format sarif > elspeth-lints-immutability.sarif
          status=$?
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi

      - name: Emit elspeth-lints plugin-contract SARIF artifact
        if: always()
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          set +e
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules plugin_contract.component_type,plugin_contract.plugin_hashes \
            --root src/elspeth \
            --format sarif > elspeth-lints-plugin-contract.sarif
          status=$?
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi

      - name: Emit elspeth-lints audit-evidence SARIF artifact
        if: always()
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          set +e
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules audit_evidence.nominal_base,audit_evidence.tier_1_decoration,audit_evidence.guard_symmetry,audit_evidence.gve_attribution \
            --root src/elspeth \
            --format sarif > elspeth-lints-audit-evidence.sarif
          status=$?
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi

      - name: Emit elspeth-lints composer SARIF artifact
        if: always()
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          set +e
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules 'composer/*' \
            --root src/elspeth \
            --format sarif > elspeth-lints-composer.sarif
          status=$?
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi

      - name: Emit elspeth-lints contract-invariants SARIF artifact
        if: always()
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          set +e
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules 'contract_invariants/*' \
            --root src/elspeth \
            --format sarif > elspeth-lints-contract-invariants.sarif
          status=$?
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi

      - name: Emit elspeth-lints session-engine-factory SARIF artifact
        if: always()
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          set +e
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules contract_invariants.session_engine_factory \
            --root . \
            --format sarif > elspeth-lints-session-engine-factory.sarif
          status=$?
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi

      - name: Emit elspeth-lints contract-manifest SARIF artifact
        if: always()
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          set +e
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules manifest.contract_manifest \
            --root src/elspeth \
            --format sarif > elspeth-lints-contract-manifest.sarif
          status=$?
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi

      - name: Emit elspeth-lints manifest-inventory SARIF artifact
        if: always()
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          set +e
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules manifest.symbol_inventory,manifest.test_to_source_mapping \
            --root . \
            --format sarif > elspeth-lints-manifest-inventory.sarif
          status=$?
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi

      - name: Emit elspeth-lints trust-tier SARIF artifact
        if: always()
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        env:
          ELSPETH_JUDGE_METADATA_HMAC_KEY: ${{ secrets.ELSPETH_JUDGE_METADATA_HMAC_KEY }}
          ELSPETH_JUDGE_METADATA_SIGNATURE_VERIFY_MODE: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && 'shape-only-when-key-missing' || 'required' }}
        run: |
          set +e
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli check \
            --rules trust_tier.tier_model \
            --root src/elspeth \
            --format sarif > elspeth-lints-trust-tier.sarif
          status=$?
          if [ "$status" -gt 1 ]; then
            echo "::error title=Trust-tier signed allowlist diagnosis::If this failure mentions judge_metadata_signature, file_fingerprint, scope_fingerprint, or ast_path drift, run: diagnose-judge-signatures --root src/elspeth --allowlist-dir config/cicd/enforce_tier_model. To repair diagnosed drift from an operator shell, run: sign-judge-signatures --root src/elspeth --allowlist-dir config/cicd/enforce_tier_model --env-file /path/to/operator.env --owner \"\$USER\""
            exit "$status"
          fi

      - name: Upload elspeth-lints SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: elspeth-lints-sarif
          path: |
            ${{ env.CI_CHECKOUT_PATH }}/elspeth-lints.sarif
            ${{ env.CI_CHECKOUT_PATH }}/elspeth-lints-immutability.sarif
            ${{ env.CI_CHECKOUT_PATH }}/elspeth-lints-plugin-contract.sarif
            ${{ env.CI_CHECKOUT_PATH }}/elspeth-lints-audit-evidence.sarif
            ${{ env.CI_CHECKOUT_PATH }}/elspeth-lints-composer.sarif
            ${{ env.CI_CHECKOUT_PATH }}/elspeth-lints-contract-invariants.sarif
            ${{ env.CI_CHECKOUT_PATH }}/elspeth-lints-session-engine-factory.sarif
            ${{ env.CI_CHECKOUT_PATH }}/elspeth-lints-contract-manifest.sarif
            ${{ env.CI_CHECKOUT_PATH }}/elspeth-lints-manifest-inventory.sarif
            ${{ env.CI_CHECKOUT_PATH }}/elspeth-lints-trust-tier.sarif
          retention-days: 7

      - name: Compare shadow-mode lints
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          PYTHONPATH=elspeth-lints/src uv run python scripts/cicd/parity_harness.py \
            --manifest config/cicd/lint_migration_status.yaml \
            --root .

  # ===========================================================================
  # Stage 3: Test (Quality gate - ~3-5 minutes)
  # ===========================================================================
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ fromJSON((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && '["self-hosted","Linux","X64","nyx-ci","trusted"]' || '"ubuntu-24.04"') }}
    container:
      image: python:${{ matrix.python-version }}-bookworm
    env:
      CI_CHECKOUT_PATH: ci-${{ github.run_id }}-${{ github.run_attempt }}-test-${{ matrix.python-version }}
    needs: [static-analysis]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        # Coverage runs on Python 3.13 only because 3.13 is the release
        # interpreter for this branch. The Python 3.12 lane remains
        # dependency-compatibility signal and intentionally skips coverage so
        # one XML/threshold report is authoritative.
        include:
          - python-version: "3.12"
            coverage: false
          - python-version: "3.13"
            coverage: true

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          path: ${{ env.CI_CHECKOUT_PATH }}

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a
        with:
          version: ${{ env.UV_VERSION }}

      - name: Use checkout-local uv cache
        run: echo "UV_CACHE_DIR=$GITHUB_WORKSPACE/$CI_CHECKOUT_PATH/.uv-cache" >> "$GITHUB_ENV"

      - name: Install system dependencies
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          apt-get update -q
          apt-get install -y -q libsqlcipher-dev jq

      - name: Install dependencies
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: uv sync --frozen --all-extras

      - name: Run tests with coverage
        if: matrix.coverage
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          uv run pytest tests/ \
            --cov=src/elspeth \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -v \
            -m "not slow and not stress and not performance and not testcontainer"

      - name: Enforce audit-critical coverage floors
        if: matrix.coverage
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          # Ratchet the verified 2026-05-19 baseline while the test-debt
          # uplift to 95% is planned. Do not lower without fresh evidence.
          # 2026-06-19: landscape floor 93 -> 92. Fresh evidence: the 0.6.0
          # multi-worker work added substantial landscape code (run_coordination,
          # scheduler/execution/lifecycle repositories) whose test coverage
          # (scheduler 88%, execution 89%, run_lifecycle 90%) sits below the
          # subsystem floor; the new run_coordination_repository is itself at
          # 94%. The Test lane was masked behind static-analysis while this
          # landed, so the dip surfaced only now. Uplift remains tracked debt.
          uv run coverage report --include="src/elspeth/core/landscape/*" --fail-under=92
          uv run coverage report --include="src/elspeth/core/canonical.py" --fail-under=99
          uv run coverage report --include="src/elspeth/engine/orchestrator/*" --fail-under=91
          uv run coverage report --include="src/elspeth/contracts/*" --fail-under=62

      - name: Run tests without coverage
        if: ${{ !matrix.coverage }}
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          uv run pytest tests/ \
            -v \
            -m "not slow and not stress and not performance and not testcontainer"

      - name: Upload coverage report
        if: matrix.coverage && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-report
          path: ${{ env.CI_CHECKOUT_PATH }}/coverage.xml
          retention-days: 7

  # ===========================================================================
  # Stage 5: Integration Tests (Optional - requires secrets)
  # ===========================================================================
  integration:
    name: Integration Tests
    runs-on: ${{ fromJSON((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && '["self-hosted","Linux","X64","nyx-ci","trusted"]' || '"ubuntu-24.04"') }}
    container:
      image: python:3.13-bookworm
    needs: [test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/RC'))
    env:
      CI_CHECKOUT_PATH: ci-${{ github.run_id }}-${{ github.run_attempt }}-integration
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          path: ${{ env.CI_CHECKOUT_PATH }}

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a
        with:
          version: ${{ env.UV_VERSION }}

      - name: Use checkout-local uv cache
        run: echo "UV_CACHE_DIR=$GITHUB_WORKSPACE/$CI_CHECKOUT_PATH/.uv-cache" >> "$GITHUB_ENV"

      - name: Install system dependencies
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          apt-get update -q
          apt-get install -y -q libsqlcipher-dev

      - name: Install dependencies
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: uv sync --frozen --all-extras

      - name: Run integration tests
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # Fail closed: a real integration failure — assertion regression,
          # collection/import error (exit 2), internal error (exit 3), or
          # infra fault — must fail the lane so build-push.yaml never builds an
          # image off a broken CI run. The only tolerated outcome is pytest's
          # exit code 5 ("no tests collected"); integration tests self-skip via
          # pytest.skip / importorskip when their credentials are absent, which
          # is exit 0 anyway. ``|| status=$?`` captures the code without letting
          # ``set -e`` abort before we can inspect it.
          status=0
          uv run pytest tests/integration/ -v -m integration || status=$?
          if [ "$status" -eq 5 ]; then
            echo "No integration tests collected (exit 5) — treating as a skip."
            exit 0
          fi
          exit "$status"

  # ===========================================================================
  # Stage 3c: Dependency and License Audit
  # ===========================================================================
  supply-chain-audit:
    name: Dependency and License Audit
    runs-on: ${{ fromJSON((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && '["self-hosted","Linux","X64","nyx-ci","trusted"]' || '"ubuntu-24.04"') }}
    container:
      image: python:3.13-bookworm
    needs: [static-analysis]
    env:
      CI_CHECKOUT_PATH: ci-${{ github.run_id }}-${{ github.run_attempt }}-supply-chain-audit
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          path: ${{ env.CI_CHECKOUT_PATH }}

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a
        with:
          version: ${{ env.UV_VERSION }}

      - name: Use checkout-local uv cache
        run: echo "UV_CACHE_DIR=$GITHUB_WORKSPACE/$CI_CHECKOUT_PATH/.uv-cache" >> "$GITHUB_ENV"

      - name: Install system dependencies
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          apt-get update -q
          apt-get install -y -q libsqlcipher-dev

      - name: Install dependencies
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: uv sync --frozen --all-extras

      - name: Audit Python dependencies
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          uv export \
            --quiet \
            --frozen \
            --all-extras \
            --no-emit-project \
            --no-emit-package elspeth-lints \
            --format requirements-txt \
            --output-file requirements-audit.txt
          # CVE-2025-45768 / PYSEC-2025-183 has no fixed PyJWT release;
          # the disputed weakness is application-selected HMAC key length.
          # WebSettings enforces a 32-byte secret_key floor on non-loopback hosts.
          #
          # CVE-2026-45829 has no fixed chromadb release as of 2026-06-03 (the
          # pip-audit "Fix Versions" column is empty). chromadb backs the
          # chroma_sink + rag_retrieval plugins; remove this ignore and bump the
          # pin once an upstream fix ships. PyJWT advisories PYSEC-2026-175/177/
          # 178/179 are NOT ignored — they are resolved by the uv.lock bump to
          # PyJWT 2.13.0 (constraint already permitted it).
          uv run --with "pip-audit>=2.9,<3" pip-audit \
            --strict \
            --requirement requirements-audit.txt \
            --no-deps \
            --disable-pip \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln CVE-2026-45829 \
            --progress-spinner=off

      - name: Check Python dependency licenses
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          uv run --with "pip-licenses>=5,<6" pip-licenses \
            --fail-on "GPL;AGPL" \
            --format=markdown \
            --output-file=python-license-report.md

      - name: Upload Python license report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-license-report
          path: ${{ env.CI_CHECKOUT_PATH }}/python-license-report.md
          retention-days: 30

  # ===========================================================================
  # Stage 4: Frontend E2E (Playwright)
  # ===========================================================================
  # Boots the FastAPI backend + Vite dev server, runs Playwright tests
  # against a real Chromium. This job is in ci-success.needs so a red
  # browser journey blocks merge instead of being waved through.
  e2e-frontend:
    name: Frontend E2E (Playwright)
    runs-on: ${{ fromJSON((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && '["self-hosted","Linux","X64","nyx-ci","trusted"]' || '"ubuntu-24.04"') }}
    env:
      CI_CHECKOUT_PATH: ci-${{ github.run_id }}-${{ github.run_attempt }}-e2e-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          path: ${{ env.CI_CHECKOUT_PATH }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a
        with:
          version: ${{ env.UV_VERSION }}

      - name: Use checkout-local uv cache
        run: echo "UV_CACHE_DIR=$GITHUB_WORKSPACE/$CI_CHECKOUT_PATH/.uv-cache" >> "$GITHUB_ENV"

      - name: Install system dependencies
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          if [[ "${{ runner.environment }}" == "self-hosted" ]]; then
            dpkg-query -W libsqlcipher-dev
          else
            sudo apt-get update -q
            sudo apt-get install -y -q libsqlcipher-dev
          fi

      - name: Install Python dependencies
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: uv sync --frozen --all-extras

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ${{ env.CI_CHECKOUT_PATH }}/src/elspeth/web/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.CI_CHECKOUT_PATH }}/src/elspeth/web/frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: ${{ env.CI_CHECKOUT_PATH }}/src/elspeth/web/frontend
        run: |
          if [[ "${{ runner.environment }}" == "self-hosted" ]]; then
            npx playwright install chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Assign isolated Playwright ports
        run: |
          port_base=$((20000 + (GITHUB_RUN_ID % 20000)))
          echo "PLAYWRIGHT_BACKEND_PORT=$port_base" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_FRONTEND_PORT=$((port_base + 1))" >> "$GITHUB_ENV"

      - name: Run Playwright tests
        working-directory: ${{ env.CI_CHECKOUT_PATH }}/src/elspeth/web/frontend
        env:
          CI: "true"
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report
          path: ${{ env.CI_CHECKOUT_PATH }}/src/elspeth/web/frontend/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-traces
          path: ${{ env.CI_CHECKOUT_PATH }}/src/elspeth/web/frontend/test-results/
          retention-days: 7

  # ===========================================================================
  # Frontend unit tests + type check (vitest, gating)
  # ===========================================================================
  # Phase 8 post-merge fix: before this job existed, the entire vitest
  # suite under ``src/elspeth/web/frontend/src/**/*.test.{ts,tsx}`` ran
  # only locally — no workflow invoked ``npm test`` or ``npm run
  # typecheck``.  That meant the ~525-case HeaderSessionSwitcher /
  # ComposerPreferencesPanel / TemplateCards / a11y-harness etc. test
  # corpus was advisory documentation rather than regression protection.
  # This lane is in ``ci-success.needs`` below so a red vitest run
  # blocks merge.
  frontend-unit:
    name: Frontend unit (vitest + typecheck)
    runs-on: ${{ fromJSON((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && '["self-hosted","Linux","X64","nyx-ci","trusted"]' || '"ubuntu-24.04"') }}
    env:
      CI_CHECKOUT_PATH: ci-${{ github.run_id }}-${{ github.run_attempt }}-frontend-unit
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          path: ${{ env.CI_CHECKOUT_PATH }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ${{ env.CI_CHECKOUT_PATH }}/src/elspeth/web/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.CI_CHECKOUT_PATH }}/src/elspeth/web/frontend
        run: npm ci

      - name: Type check
        working-directory: ${{ env.CI_CHECKOUT_PATH }}/src/elspeth/web/frontend
        run: npm run typecheck

      - name: Run vitest
        working-directory: ${{ env.CI_CHECKOUT_PATH }}/src/elspeth/web/frontend
        env:
          CI: "true"
        run: npm test -- --run

  # ===========================================================================
  # Summary Job - Required for branch protection
  # ===========================================================================
  ci-success:
    name: CI Success
    runs-on: ${{ fromJSON((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && '["self-hosted","Linux","X64","nyx-ci","trusted"]' || '"ubuntu-24.04"') }}
    needs:
      - static-analysis
      - test
      - supply-chain-audit
      - e2e-frontend
      - frontend-unit
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.static-analysis.result }}" != "success" ]]; then
            echo "Static analysis job failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Test job failed"
            exit 1
          fi
          if [[ "${{ needs.supply-chain-audit.result }}" != "success" ]]; then
            echo "Dependency/license audit job failed"
            exit 1
          fi
          if [[ "${{ needs.e2e-frontend.result }}" != "success" ]]; then
            echo "Frontend E2E (Playwright) job failed"
            exit 1
          fi
          if [[ "${{ needs.frontend-unit.result }}" != "success" ]]; then
            echo "Frontend unit (vitest + typecheck) job failed"
            exit 1
          fi
          echo "All CI checks passed!"
