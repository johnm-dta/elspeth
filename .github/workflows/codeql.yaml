# CodeQL analysis for Python source.
#
# ADR-023 explains why CodeQL remains a complementary generic vulnerability
# analyzer while ELSPETH-specific invariants live in the custom
# workspace-only elspeth-lints analyzer:
# docs/architecture/adr/023-custom-python-ci-analyzer.md

name: CodeQL

on:
  push:
    branches: [main, master, "RC*"]
  pull_request:
    branches: [main, master, "RC*"]
  schedule:
    - cron: "23 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@78ed0c7291d93e40c51b085850dc669a4c3ab73b
        with:
          languages: python
          queries: security-extended,security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@78ed0c7291d93e40c51b085850dc669a4c3ab73b
        with:
          category: "/language:python"
