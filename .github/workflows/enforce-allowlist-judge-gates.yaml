# CI gates for the convergent panel findings on the cicd-judge-cli prototype.
#
# Two gates run here, both load-bearing per the audit-trail thesis. C1 remains
# implemented in elspeth-lints, but is intentionally not wired into this
# workflow until every covered allowlist shape can acquire judge metadata:
#
#   C1 (check-judge-coverage, temporarily disabled): on PRs and protected-branch
#     pushes touching any 'enforce_*' allowlist directory, every new
#     'allow_hits' entry MUST carry signed judge metadata. Pre-judge entries
#     grandfathered. The
#     grandfathering is rotation-stable: an entry whose fingerprint shifted
#     because of an upstream AST refactor still matches its baseline
#     counterpart, so refactors are not penalised by demanding fresh judge runs.
#     This gate is unsatisfiable on the current branch because the signing
#     tooling covers trust_tier.tier_model only while C1 also sees non-tier-model
#     per_file_rules.
#
#   C3 (check-override-rate): on every configured PR and push to
#     main/master/RC* branches, the rolling-30d OVERRIDDEN_BY_OPERATOR
#     rate is checked against the workflow-pinned --max-rate 0.10
#     threshold. Insufficient-data windows pass with a notice; the gate
#     produces stable signal only once the denominator grows past
#     --min-samples (default 10). Converts the override-rate metric from
#     informational to enforcing.
#
#   VAL (check-judge-quality): in trusted contexts only, run the labelled
#     judge-quality corpus through the live OpenRouter-backed judge and
#     require exact verdict/decorator accuracy >= 0.90. This is a prompt/model
#     REGRESSION TRIPWIRE, not a quality guarantee: the corpus is small (10-30
#     cases) and tolerates ~1 miss, so it catches a gross prompt edit or model
#     swap that parser/schema tests cannot see — it does NOT prove the judge is
#     well-calibrated or injection-resistant. Grow the corpus (esp. adversarial
#     cases) to widen what the tripwire detects.
#
# All gates are implemented as elspeth-lints subcommands; the workflow
# orchestrates checkout and invocation.
#
# VERIFY-ONLY — NEVER SIGNS (elspeth-2b351cd004, spec [O1] custody rule). This
# workflow only ever *verifies*: it must never invoke a signing verb
# (sign-bundle / rekey / justify / sign-judge-signatures / migrate-judge-scope).
# The judge-metadata HMAC key is operator-custody and must never be reachable
# from PR-controlled code, so minting or rotating a signature runs ONLY in an
# operator-controlled shell, never here. Agents stage a review bundle via the
# elspeth-judge MCP server; an operator fires `elspeth-lints sign-bundle` /
# `rekey` in a key-bearing shell (see docs/judge-signature-handoff.md). This
# invariant is enforced as a standing regression guard by
# tests/unit/elspeth_lints/test_meta_ci_never_signs.py. (Re-enabling C1 is out
# of scope for this change.)
#
# BRANCH PROTECTION: the aggregate ``judge-gates-success`` job at the bottom
# is the single required status check for these gates (mirroring ci.yaml's
# ``ci-success``). Branch protection MUST require ``Judge gates success`` from
# GitHub Actions —
# requiring the individual gate jobs is fragile (a renamed job silently drops
# the requirement) and GitHub keys protection on one named check. The
# aggregate fails if C3 is not ``success``; VAL may be ``skipped`` (it is
# intentionally skipped on untrusted fork PRs, which cannot read the
# OpenRouter secret).
#
# Spec: notes/cicd-judge-cli-prototype-plan.md + the convergent-findings
# remediation diff that introduced this workflow.

name: enforce-allowlist-judge-gates

on:
  push:
    branches: [main, master, "RC*"]
  pull_request:
    branches: [main, master, "RC*"]

# Cancel in-progress judge-gate runs when a new commit updates the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Every ``run`` step in this workflow is a bash script: the gate steps use
# ``set -o pipefail`` and the bash-only ``${PIPESTATUS[0]}`` to capture a
# command's exit status through a ``| tee`` pipe. Inside the
# ``python:3.13-bookworm`` container jobs, GitHub's shell auto-detection falls
# back to ``sh -e {0}`` (dash), which rejects ``set -o pipefail`` ("Illegal
# option") and has no ``PIPESTATUS`` — so the steps crashed before running their
# real check. Declaring bash explicitly (the image ships it) makes the shell
# deterministic across the container and host jobs alike.
defaults:
  run:
    shell: bash

# Public-repository guardrail mirrors ci.yaml: fork PRs stay on
# GitHub-hosted runners; trusted pushes and same-repository PRs use
# nyx. Both gates are I/O-light (no compilation, no tests); a small
# hosted runner is sufficient if nyx is busy.
jobs:
  check-judge-quality:
    name: Judge-quality validation corpus (VAL)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ fromJSON('["self-hosted","Linux","X64","nyx-ci","trusted"]') }}
    # This job makes real OpenRouter calls; keep the corpus bounded and fail
    # quickly on transport/config drift.
    timeout-minutes: 20
    container:
      image: python:3.13-bookworm
    env:
      CI_CHECKOUT_PATH: ci-${{ github.run_id }}-${{ github.run_attempt }}-judge-quality
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          path: ${{ env.CI_CHECKOUT_PATH }}

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
        with:
          version: "0.5"

      - name: Use checkout-local uv cache
        run: echo "UV_CACHE_DIR=$GITHUB_WORKSPACE/$CI_CHECKOUT_PATH/.uv-cache" >> "$GITHUB_ENV"

      - name: Install judge dependencies
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: uv sync --frozen --extra llm --no-install-project

      - name: Verify OpenRouter key is present
        run: |
          if [[ -z "${OPENROUTER_API_KEY:-}" ]]; then
            echo "OPENROUTER_API_KEY secret is required for the trusted judge-quality gate." >&2
            exit 2
          fi

      - name: Run check-judge-quality
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: |
          set -o pipefail
          report_file="${RUNNER_TEMP:-/tmp}/judge-quality-report.txt"
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli \
            check-judge-quality \
            --corpus config/cicd/judge-quality-corpus/v1.jsonl \
            --min-accuracy 0.90 2>&1 | tee "$report_file"
          status="${PIPESTATUS[0]}"
          {
            echo "## Judge-quality validation corpus"
            echo
            echo '```text'
            cat "$report_file"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

  check-override-rate:
    name: Override-rate drift gate (C3)
    runs-on: ${{ fromJSON((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && '["self-hosted","Linux","X64","nyx-ci","trusted"]' || '"ubuntu-24.04"') }}
    # Judge gates should fail fast if checkout/dependency/git plumbing hangs.
    timeout-minutes: 15
    container:
      image: python:3.13-bookworm
    env:
      CI_CHECKOUT_PATH: ci-${{ github.run_id }}-${{ github.run_attempt }}-override-rate
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          path: ${{ env.CI_CHECKOUT_PATH }}
          # Shallow clone is fine; the gate reads HEAD content only.

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
        with:
          version: "0.5"

      - name: Use checkout-local uv cache
        run: echo "UV_CACHE_DIR=$GITHUB_WORKSPACE/$CI_CHECKOUT_PATH/.uv-cache" >> "$GITHUB_ENV"

      - name: Install dependencies
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        run: uv sync --frozen --no-install-project

      - name: Run check-override-rate
        working-directory: ${{ env.CI_CHECKOUT_PATH }}
        # Defaults: --window-days 30, --min-samples 10. The threshold is
        # passed explicitly because it is CI policy, not a CLI implementation
        # detail.
        # Insufficient-data windows pass with a notice; the gate is
        # informational until the denominator grows past min-samples.
        # Threshold changes are policy decisions and must land via ADR,
        # not by editing this workflow.
        run: |
          set -o pipefail
          report_file="${RUNNER_TEMP:-/tmp}/override-rate-report.txt"
          PYTHONPATH=elspeth-lints/src uv run python -m elspeth_lints.core.cli \
            check-override-rate \
            --allowlist-root config/cicd \
            --max-rate 0.10 2>&1 | tee "$report_file"
          status="${PIPESTATUS[0]}"
          {
            echo "## Override-rate drift gate"
            echo
            echo '```text'
            cat "$report_file"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

  # ===========================================================================
  # Aggregate success job - Required for branch protection
  # ===========================================================================
  # Branch protection requires THIS job, not the individual gates. Without an
  # aggregate, a red gate only blocks merge if that specific job name is listed
  # as required — fragile against renames, and it leaves "are the gates even
  # gating?" depending on unverifiable repo settings. This job makes the answer
  # mechanical: it fails unless C3 succeeded and VAL succeeded-or-skipped.
  judge-gates-success:
    name: Judge gates success
    runs-on: ${{ fromJSON((github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && '["self-hosted","Linux","X64","nyx-ci","trusted"]' || '"ubuntu-24.04"') }}
    needs:
      - check-judge-quality
      - check-override-rate
    if: always()
    steps:
      - name: Check all judge gates passed
        run: |
          # C1 (new-entry judge-coverage) is temporarily removed: the judge
          # sign tooling supports trust_tier.tier_model only, so audit-evidence
          # per_file_rules (freeze_guards / guard_symmetry / gve_attribution)
          # cannot acquire judge metadata and C1 is unsatisfiable on-branch.
          # Re-add the check-judge-coverage job + this guard once that lands.
          if [[ "${{ needs.check-override-rate.result }}" != "success" ]]; then
            echo "C3 override-rate drift gate did not pass (result: ${{ needs.check-override-rate.result }})"
            exit 1
          fi
          # VAL (judge-quality) is intentionally skipped on untrusted fork PRs:
          # it needs the OpenRouter secret, which GitHub withholds from forks.
          # 'skipped' is therefore acceptable here; any other non-success result
          # (failure / cancelled / timed_out) blocks the merge.
          val_result="${{ needs.check-judge-quality.result }}"
          if [[ "$val_result" != "success" && "$val_result" != "skipped" ]]; then
            echo "VAL judge-quality gate did not pass (result: $val_result)"
            exit 1
          fi
          echo "All judge gates passed (VAL result: $val_result)."
