# Frozen-Dataclass Freeze-Guard Enforcement
#
# Runs AST-based static analysis to detect frozen dataclasses with
# container-typed fields (dict, list, set, Mapping, Sequence) that lack
# the canonical ``freeze_fields(...)`` / ``deep_freeze(...)`` call in
# ``__post_init__``. Without the guard, ``frozen=True`` only prevents
# attribute reassignment — nested mutable contents remain mutable, and
# the immutability claim becomes a lie.
#
# CLAUDE.md asserts this script is "Enforced by CI"; this workflow makes
# that claim true (closes elspeth-obs-c025f9fc15).
#
# Failure modes:
#   - New unallowlisted FG1 / FG2 / FG3 violations
#   - Stale allowlist entries (entries that don't match any code)
#   - Expired allowlist entries (entries past their ``expires:`` date)
#   - Hits exceeding ``max_hits`` on a per-file allowlist entry

name: Enforce Freeze Guards

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**/*.py'
      - 'scripts/cicd/enforce_freeze_guards.py'
      - 'config/cicd/enforce_freeze_guards/**'
  pull_request:
    paths:
      - 'src/**/*.py'
      - 'scripts/cicd/enforce_freeze_guards.py'
      - 'config/cicd/enforce_freeze_guards/**'

jobs:
  check:
    name: Check for freeze-guard violations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run freeze-guard enforcement
        run: |
          python scripts/cicd/enforce_freeze_guards.py check \
            --root src/elspeth \
            --allowlist config/cicd/enforce_freeze_guards
