# ADR-019 Migration Gate: forbid new RowOutcome.X references.
#
# Runs AST-based static analysis to forbid RowOutcome.X attribute accesses
# in files outside the ADR-019 migration allowlist. Removed in Stage 5
# alongside RowOutcome itself.
#
# See docs/architecture/adr/019-two-axis-terminal-model.md for the
# two-axis terminal model that supersedes RowOutcome.

name: Forbid new RowOutcome.X references (ADR-019)

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'scripts/cicd/forbid_new_row_outcome.py'
      - 'config/cicd/forbid_new_row_outcome/**'
      - '.github/workflows/forbid-new-row-outcome.yaml'
  pull_request:
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'scripts/cicd/forbid_new_row_outcome.py'
      - 'config/cicd/forbid_new_row_outcome/**'
      - '.github/workflows/forbid-new-row-outcome.yaml'

permissions:
  contents: read

jobs:
  check:
    name: Check for new RowOutcome references
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run ADR-019 migration gate
        run: |
          python scripts/cicd/forbid_new_row_outcome.py check \
            --root . \
            --allowlist config/cicd/forbid_new_row_outcome
