# Mutation Testing Workflow
# Runs weekly as advisory quality telemetry - mutation testing is slow so not run on every PR
#
# Mutation testing introduces artificial bugs (mutants) into the code and checks if tests catch them.
# A high mutation score means tests actually verify behavior, not just execute code.
#
# This workflow is non-gating. Do not treat mutation score targets as enforced
# until the workflow parses mutmut output and fails on explicit thresholds.

name: Mutation Testing

on:
  schedule:
    # Weekly on Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    # Allow manual triggering for ad-hoc runs
    inputs:
      paths_to_mutate:
        description: 'Specific path to mutate (default: src/elspeth/core/)'
        required: false
        default: 'src/elspeth/core/canonical.py'

env:
  UV_VERSION: "0.5"

jobs:
  mutation-test:
    runs-on: [self-hosted, Linux, X64, nyx-ci, trusted]
    timeout-minutes: 60  # Mutation testing is slow

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run mutation testing on canonical.py (critical)
        run: |
          source .venv/bin/activate
          {
            echo "## Mutation Testing: canonical.py"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Run mutmut on canonical.py - the hash integrity module
          python -m mutmut run --paths-to-mutate src/elspeth/core/canonical.py || true

          # Capture results
          {
            echo "### Results"
            echo '```'
            python -m mutmut results 2>/dev/null || echo "Results summary not available"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize advisory canonical.py mutation run
        run: |
          source .venv/bin/activate
          # Count killed vs total
          if [[ -f .mutmut-cache/mutmut.db ]]; then
            KILLED=$(grep -c "killed" .mutmut-cache/mutmut.db || true)
            TOTAL=$(grep -c "mutant" .mutmut-cache/mutmut.db || true)
          else
            KILLED=0
            TOTAL=0
          fi

          echo "Advisory mutation testing completed for canonical.py"
          echo "Cache markers: ${KILLED} killed, ${TOTAL} total"

      - name: Upload mutation results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: mutation-results
          path: |
            .mutmut-cache/
          retention-days: 30

  mutation-test-landscape:
    runs-on: [self-hosted, Linux, X64, nyx-ci, trusted]
    timeout-minutes: 120  # Landscape has more code

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run mutation testing on landscape package
        run: |
          source .venv/bin/activate
          {
            echo "## Mutation Testing: core/landscape/"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          python -m mutmut run --paths-to-mutate src/elspeth/core/landscape/ || true

          {
            echo "### Results"
            echo '```'
            python -m mutmut results 2>/dev/null || echo "Results summary not available"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload mutation results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: mutation-results-landscape
          path: |
            .mutmut-cache/
          retention-days: 30
