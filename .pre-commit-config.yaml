# Hooks scan the FULL codebase (pass_filenames: false), not just staged files.
# This ensures ALL files pass the same checks as CI, not just files you edited.
# The types: [python] filter acts as a trigger gate — hooks only run when at
# least one Python file is staged, but then check the entire scope.
# Hooks are CHECK-ONLY — they do NOT auto-fix or modify files.
#
# Hook stages installed by `pre-commit install`.  Includes commit-msg for the
# Phase 8 B4-r3 telemetry-backfill cohort-attribution check.  Fresh clones must
# run `pre-commit install` once; the default_install_hook_types directive
# below makes that single command install BOTH stages (pre-commit and
# commit-msg) without requiring a separate `--hook-type commit-msg` flag.
default_install_hook_types: [pre-commit, commit-msg]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      # Linter - scans full codebase, check only (no --fix)
      - id: ruff
        args: [src/, tests/, scripts/, examples/, elspeth-lints/src/]
        pass_filenames: false
      # Formatter - scans full codebase, check only (no reformat)
      - id: ruff-format
        args: [--check, src/, tests/, scripts/, examples/, elspeth-lints/src/]
        pass_filenames: false

  - repo: local
    hooks:
      # Secret-pattern scan — refuses the commit if a credential-shaped string
      # slips into the staged content of THIS commit. Lives at scripts/git-hooks/
      # so it's also runnable as a standalone .git/hooks/pre-commit if desired.
      # Per-line bypass: append "# secret-scan: allow-this-line" to a matched line
      # if it's a documented placeholder the script can't tell apart from the real thing.
      - id: secret-scan
        name: Secret-pattern scan (refuses commit if credential-shaped strings detected)
        entry: scripts/git-hooks/pre-commit-secret-scan.sh
        language: system
        # pass_filenames: false because the local .git/hooks/pre-commit invokes
        # `pre-commit run --all-files` (see header in that file: avoids the
        # stash/unstash mechanism that has caused unstaged-work loss).  All
        # other hooks compensate via pass_filenames: false + fixed-directory
        # scanning.  This script is designed for staged-files-only operation;
        # with no args it falls back to
        # `git diff --cached --name-only --diff-filter=AM`, which is exactly
        # the scope we want — newly-added/modified content per commit, not the
        # whole repo (which would force per-line allow markers on every
        # documented placeholder URL).
        pass_filenames: false
        always_run: true

      - id: mypy
        name: mypy
        entry: .venv/bin/mypy src/elspeth elspeth-lints/src
        language: system
        types: [python]
        pass_filenames: false

      - id: elspeth-lints-no-new-bespoke-enforcers
        name: elspeth-lints forbids new bespoke CI enforcers
        entry: env PYTHONPATH=elspeth-lints/src .venv/bin/python -m elspeth_lints.core.cli check --rules meta.no-new-bespoke-cicd-enforcer --root .
        language: system
        files: ^(scripts/cicd/enforce_.*\.py|config/cicd/lint_migration_status\.yaml|elspeth-lints/src/elspeth_lints/rules/meta_no_new_bespoke_cicd_enforcer/)
        pass_filenames: false

      - id: elspeth-lints-options-metadata-shadow
        name: elspeth-lints plugin options metadata shadow
        entry: env PYTHONPATH=elspeth-lints/src .venv/bin/python -m elspeth_lints.core.cli check --rules plugin_contract.options_metadata --root .
        language: system
        files: ^(src/elspeth/plugins/|config/cicd/enforce_options_metadata/|elspeth-lints/src/elspeth_lints/rules/plugin_contract/options_metadata/)
        pass_filenames: false

      - id: elspeth-lints-immutability-shadow
        name: elspeth-lints immutability shadow
        entry: env PYTHONPATH=elspeth-lints/src .venv/bin/python -m elspeth_lints.core.cli check --rules immutability.freeze_guards,immutability.frozen_annotations --root src/elspeth
        language: system
        files: ^(src/elspeth/|config/cicd/enforce_freeze_guards/|config/cicd/enforce_frozen_annotations/|elspeth-lints/src/elspeth_lints/rules/immutability/)
        pass_filenames: false

      - id: enforce-tier-model
        name: Enforce Tier Model
        entry: .venv/bin/python scripts/cicd/enforce_tier_model.py check --root src/elspeth --allowlist config/cicd/enforce_tier_model --exclude "**/__pycache__/*" --exclude "web/frontend/node_modules"
        language: system
        types: [python]
        pass_filenames: false

      - id: check-contracts
        name: Check Contracts
        entry: .venv/bin/python -m scripts.check_contracts
        language: system
        types: [python]
        pass_filenames: false

      - id: enforce-frozen-annotations
        name: Enforce Frozen Annotations
        entry: .venv/bin/python scripts/cicd/enforce_frozen_annotations.py check --root src/elspeth --allowlist config/cicd/enforce_frozen_annotations
        language: system
        types: [python]
        pass_filenames: false

      - id: enforce-plugin-hashes
        name: Enforce Plugin Hashes
        entry: .venv/bin/python -m scripts.cicd.enforce_plugin_hashes check --root src/elspeth
        language: system
        types: [python]
        pass_filenames: false

      - id: enforce-composer-exception-channel
        name: Composer exception-channel discipline
        entry: .venv/bin/python scripts/cicd/enforce_composer_exception_channel.py check --root src/elspeth --allowlist config/cicd/enforce_composer_exception_channel
        language: system
        types: [python]
        pass_filenames: false
        files: ^src/elspeth/web/composer/tools\.py$

      - id: enforce-composer-catch-order
        name: Composer catch-order discipline
        entry: .venv/bin/python scripts/cicd/enforce_composer_catch_order.py check --root src/elspeth --allowlist config/cicd/enforce_composer_catch_order
        language: system
        types: [python]
        pass_filenames: false
        files: ^src/elspeth/web/.*\.py$

      - id: enforce-contract-manifest
        name: Enforce Declaration Contract Manifest
        entry: .venv/bin/python scripts/cicd/enforce_contract_manifest.py check --allowlist config/cicd/enforce_contract_manifest
        language: system
        types: [python]
        pass_filenames: false
        files: ^(src/elspeth/|scripts/cicd/enforce_contract_manifest\.py|config/cicd/enforce_contract_manifest/)

      - id: check-slot-type-cross-language
        name: SlotType / guided.ts mirror consistency check
        entry: .venv/bin/python scripts/cicd/check_slot_type_cross_language.py
        language: system
        pass_filenames: false
        # Run when either the Python Literal definition or its TypeScript mirror changes.
        files: ^(src/elspeth/web/composer/recipes\.py|src/elspeth/web/frontend/src/types/guided\.ts)$

      # Phase 8 B4-r3 — telemetry-backfill cohort-attribution trailer enforcement.
      # Runs at commit-msg stage; rejects commits that touch a cohort directory
      # without the matching `telemetry-backfill: phase-X` trailer.  See
      # docs/composer/ux-redesign-2026-05/20-phase-8-polish-and-telemetry.md
      # §"Cohort attribution via commit trailers (A4 — load-bearing)".
      - id: telemetry-backfill-trailer
        name: telemetry-backfill cohort-attribution trailer check
        entry: .githooks/commit-msg-telemetry-backfill
        language: script
        stages: [commit-msg]
        # pre-commit passes the commit-msg path as the trailing argument
        # automatically for commit-msg stage hooks; pass_filenames must NOT
        # be set to false here (the framework's commit-msg stage passes the
        # message file path as the sole positional argument).
        always_run: true
