# Temporary ADR-019 Stage 2/3 symbol-inventory allowlist.
#
# Keep this narrow: the inventory is meant to catch downstream consumers of
# `is_terminal` and brittle outcome/path string checks that the RowOutcome lint
# guard cannot see.

allowed:
  - file: src/elspeth/contracts/enums.py
    justification: ADR-019 migration window — defines RowOutcome until Stage 5 and defines the new two-axis enums.
  - file: src/elspeth/testing/__init__.py
    justification: ADR-019 migration window — testing pack re-exports RowOutcome until Stage 5 while adding TerminalOutcome and TerminalPath.
