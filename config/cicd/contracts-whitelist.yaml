# Types intentionally defined outside contracts/
# These are internal to their module and not used across boundaries
allowed_external_types:
  # TUI display types - presentation-specific, not cross-boundary contracts
  - "tui/types:TokenDisplayInfo"
  # DAG wiring helper type shared between CLI instantiation and graph construction
  - "core/dag/models:WiredTransform"
  # DAG validation warnings stay with graph construction; web validation only projects them
  # into API-facing ValidationWarning rows and does not own their construction semantics.
  - "core/dag/models:GraphValidationWarning"
  # Plugin bundle type shared between runtime construction, CLI, and web preflight
  - "plugins/infrastructure/runtime_factory:PluginBundle"
  # SSRF safety type - security infrastructure, tightly coupled to validation logic
  - "core/security/web:SSRFSafeRequest"
  # Engine types used in testing factories - test infrastructure wraps these for convenience
  - "engine/orchestrator/types:PipelineConfig"
  - "engine/orchestrator/types:AggregationFlushResult"
  - "engine/orchestrator/types:ExecutionCounters"
  # BufferEntry moved to contracts/engine.py — no longer an external type exception
  # Dependency/gate result types - used only by engine bootstrap and resolver
  - "core/dependency_config:DependencyRunResult"
  - "core/dependency_config:CommencementGateResult"
  - "core/dependency_config:PreflightResult"
  # Resume/recovery identity spec - built exclusively from checkpoint DB columns by
  # core RecoveryManager, consumed only by the engine resume path; subsystem-internal
  # plumbing kept with its producer, not a universal data contract like TokenInfo.
  - "core/checkpoint/recovery:IncompleteTokenSpec"
  # Secret loader types - used by web secret stores (user_store, server_store)
  - "core/security/secret_loader:SecretRef"
  # Composition state types - shared between web composer and composer MCP server
  - "web/composer/state:CompositionState"
  - "web/composer/state:PipelineMetadata"
  # Runtime preflight coordination types - shared between web execution and composer MCP
  - "web/execution/runtime_preflight:RuntimePreflightKey"
  - "web/execution/runtime_preflight:RuntimePreflightFailure"

