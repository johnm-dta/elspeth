per_file_rules:
- pattern: contracts/declaration_contracts.py
  rules:
  - FG2
  reason: isinstance(self.row_data, Mapping) is a type-validation guard that raises
    TypeError on wrong type (offensive programming), then calls deep_freeze() on the
    validated value — not a conditional freeze bypass
  expires: null
  max_hits: 1
- pattern: contracts/diversion.py
  rules:
  - FG2
  reason: isinstance guards validate SinkWriteResult field types at construction (crash on wrong type) — offensive programming, not freeze guards
  expires: null
  max_hits: 1
- pattern: contracts/schema_contract.py
  rules:
  - FG1
  reason: SchemaContract._by_normalized and _by_original use shallow wraps — values are FieldContract (frozen DCs) and str (scalars)
  expires: null
  max_hits: 2
- pattern: contracts/config/runtime.py
  rules:
  - FG1
  reason: RuntimeRateLimitConfig.services uses MappingProxyType(dict()) — values are RuntimeServiceRateLimit (frozen DCs)
  expires: null
  max_hits: 1
- pattern: contracts/checkpoint.py
  rules:
  - FG2
  reason: ResumedRow.__post_init__ isinstance(self.row_data, Mapping) is a Tier-1
    type-validation guard that raises TypeError on wrong type (offensive programming),
    then calls freeze_fields() on the validated value on the next line — not a
    conditional freeze bypass
  expires: null
  max_hits: 1
- pattern: contracts/node_state_context.py
  rules:
  - FG2
  reason: PoolExecutionContext.__post_init__ isinstance(self.query_ordering, tuple) is a
    Tier-1 type-validation guard that raises TypeError on wrong type (offensive
    programming), not a conditional freeze bypass — query_ordering is
    tuple[QueryOrderEntry, ...] of frozen dataclasses (already immutable) and each entry
    is type-checked on the following lines
  expires: null
  max_hits: 1
