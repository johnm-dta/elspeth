per_file_rules:
- pattern: web/execution/service.py
  rules:
  - FG3
  reason: _OutputBlobFinalizationOutcome.errors is tuple[Mapping[str, str], ...] of flat
    str->str dicts built fresh at construction and consumed read-only (truthiness, len,
    and list() into a slog.error partial-failure event). Surfaced by the FG3 nested-mutable
    detector fix (elspeth-ec6749f8da). deep_freeze would convert the inner dicts to
    MappingProxyType and risks breaking the structlog serialisation of that log event, so
    the proper fix is deferred to elspeth-640168fa4b; nothing mutates the inner dicts.
  expires: null
  max_hits: 1
- pattern: web/composer/_producer_resolver.py
  rules:
  - FG3
  reason: ProducerEntry.options is intentionally not re-frozen because CompositionState
    already deep-freezes node options in __post_init__ — ProducerEntry holds a reference
    to the already-frozen Mapping from state; redundant deep-freeze would be expensive
    and creates a new object that is no longer the original frozen reference
  expires: null
  max_hits: 1
- pattern: web/composer/tool_batch.py
  rules:
  - FG3
  reason: ToolBatchContext.discovery_cache and runtime_preflight_cache are intentionally
    NOT deep-frozen. They are driver-owned, long-lived mutable caches created once in
    _compose_loop and threaded through the frozen context by reference; run_tool_batch
    writes into them (discovery_cache[cache_key] = ... and the runtime-preflight cache
    population) so that results computed in one batch are visible to later batches of
    the same compose call. The frozen=True on ToolBatchContext is the correct lifecycle
    statement — the field *references* are batch-invariant — but deep-freezing the cache
    *contents* would break the cache-write behaviour that is the whole reason the caches
    are passed through the context. Documented at the field in tool_batch.py.
  expires: null
  max_hits: 1
- pattern: web/composer/state.py
  rules:
  - FG3
  reason: CompositionState uses @dataclass(init=False) with a custom __init__ that
    calls freeze_fields(self, "sources") directly — Python never generates a default
    __init__ so __post_init__ is never invoked; the FG3 "no __post_init__" heuristic
    cannot see the freeze performed in the custom __init__
  expires: null
  max_hits: 1
