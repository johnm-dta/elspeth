  - key: "src/elspeth/engine/orchestrator/types.py:immutability.frozen_annotations:_module_:fp=src/elspeth/engine/orchestrator/types.py:ResumeState:unprocessed_rows"
    owner: "@elspeth-maintainers"
    reason: "ResumeState: dict inside a tuple element — nested, not a direct field type issue."
