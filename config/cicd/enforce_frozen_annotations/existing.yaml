# Existing frozen dataclasses with intentional mutable container annotations.
# These are data containers for external/pipeline data where the dict/list
# annotation accurately reflects the runtime type (no __post_init__ freezing).
#
# Migrated to the shared core allowlist loader (Plan A Task 6). Keys are in
# canonical form `<file>:<rule_id>:<symbol_context>:fp=<fingerprint>`. The
# fingerprint format `<file>:<class>:<field>` is kept verbatim from the rule's
# `_finding` at rule.py L57; Plan B will redesign fingerprints centrally and
# resolve the redundant file-path embedding then.

allow_hits:
