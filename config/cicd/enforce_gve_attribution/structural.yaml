# Structural GraphValidationError raise sites where no single node is at fault.
# These are graph-topology errors (cycles, wrong source/sink count, namespace
# collisions) — component_id=None is the correct attribution.

per_file_rules:
  # ── graph.py: ExecutionGraph.validate() ──
  - pattern: "core/dag/graph.py"
    rules: ["GA1"]
    reason: >
      Structural: cycle detection and topo-sort failures, source count, sink
      count, unreachable nodes, connection/sink namespace overlap, dangling
      connections, and frozen build-metadata mutation — no single node at fault.
    max_hits: 11

  # ── builder.py: build_execution_graph() ──
  - pattern: "core/dag/builder.py"
    rules: ["GA1"]
    reason: >
      Structural: pipeline cycle detection (2 sites), missing sources,
      missing sinks, and sources/source-settings name mismatch (ADR-025
      plural-source surface) — no single node at fault.
    max_hits: 5
