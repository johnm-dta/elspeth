  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.9
  judge_rationale: |-
    RULE FIRES, CODE IS THE PRESCRIBED LEGITIMATE FORM. The except wraps `importlib.metadata.version("elspeth")` — a query against Python's package-installation metadata, an external system whose state (installed vs not) ELSPETH does not control. `PackageNotFoundError` is a single narrow exception type, not a bare/broad swallow. The fallback string `"UNKNOWN-dev-uninstalled"` records absence honestly rather than fabricating a plausible version (e.g. `"0.0.0"`), satisfying the Tier-3 'record what we got / record absence' principle. This is module-level package-metadata bootstrap with no audit-trail data in scope, and the rationale plainly states the why (dev editable-install vs production wheel/sdist).
