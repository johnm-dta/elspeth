- key: __init__.py:R6:_module_:fp=1669d46742317730
  owner: john
  reason: |-
    At src/elspeth/__init__.py line 12, the module-level `except PackageNotFoundError` wraps `version("elspeth")`, a query against the Python package-installation metadata database — an external, non-authored system (Tier 3). PackageNotFoundError is a single, narrow exception type (not a bare/broad except) raised specifically when the package is not installed in editable/installed mode. The fallback `__version__ = "UNKNOWN-dev-uninstalled"` records absence honestly rather than fabricating a plausible-looking version string, which aligns with the 'record what we didn't get' principle; production installs via wheel/sdist always populate this metadata. This is meaning-preserving boundary handling at a real external surface, not silent suppression of a bug in our own code, and no audit-trail data is involved.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-31'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-02T04:37:12.574229+00:00'
