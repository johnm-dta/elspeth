- key: __init__.py:R6:_module_:fp=1669d46742317730
  owner: john
  reason: |-
    src/elspeth/__init__.py:10-16 wraps version('elspeth') — a query against the Python package-installation metadata database, an external non-authored system (Tier-3) — in the maximally narrow except PackageNotFoundError. The absent case is a defined environment state, not a hidden failure: an editable checkout whose install step has not run yet. The handler substitutes the explicit honest sentinel __version__ = 'UNKNOWN-dev-uninstalled' (line 16) with an in-source comment (13-15) stating why absence is tolerated (dev-only; production installs always carry metadata). Nothing plausible is fabricated — the sentinel is self-describing in any audit trail that captures it, strictly more honest than crashing every uninstalled dev tree at import time. Only PackageNotFoundError is caught; any other metadata failure propagates. Invalid if the except widens, if the sentinel stops being self-evidently non-a-version, or if production code paths start branching on __version__.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T15:12:25.188526+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.85
  judge_rationale: |-
    RULE MISFIRES / PRESCRIBED FORM. The except catches only PackageNotFoundError (not a bare except) around a query to importlib.metadata — an external, non-authored data source (Tier-3). The handler does not silently swallow: it substitutes an explicit, self-describing sentinel 'UNKNOWN-dev-uninstalled' that honestly records the state in any downstream audit context, which is meaning-preserving (absence recorded as a distinguishable marker, not fabricated as a plausible version). The rule's concern (silent swallow) does not apply: the exception type is maximally narrow and the substituted value is not a plausible version string that could be mistaken for real metadata.
