  judge_confidence: 0.85
  judge_rationale: |-
    This is a legitimate trust boundary at module import: importlib.metadata is querying an external system (the Python package installation database), and PackageNotFoundError is a specific, narrow exception indicating the package is not installed in editable/installed mode. The fallback value 'UNKNOWN-dev-uninstalled' is honest — it records absence rather than fabricating a plausible-looking version string, which aligns with the 'record what we didn't get' principle. The except clause catches one specific exception type (not a bare except), and the dev-only context is genuine: production installs via wheel/sdist always populate metadata. This is offensive programming around a real external boundary, not defensive suppression of a code bug.
