version: 1
defaults:
  fail_on_stale: true
  fail_on_expired: true
  allowlist_budget:
    # Bumped from 392 → 393 on 2026-05-19 (second bump same day) to
    # accommodate the Phase 8 PR-review S4 entry for
    # ``web/app.py:_prometheus_metrics`` (R4 — public /metrics scrape
    # endpoint hardened against ``generate_latest()`` collector failures
    # to avoid leaking tracebacks into the response body). Bounded
    # 90-day expiry (2026-08-19); reviewer must renew or reify after
    # production traffic confirms the handler is unreachable.
    #
    # Bumped from 393 → 411 on 2026-05-20 (net +18) to accommodate the
    # session-routes resource split (commit 064a026dd "Refactor session
    # routes by resource"). The refactor decomposed the 7791-line
    # ``web/sessions/routes.py`` into a package
    # (``routes/{__init__,_helpers,composer,interpretation,messages,runs,sessions}.py``)
    # and named extracted helpers (``_dispatch_guided_respond_impl``,
    # ``_state_data_from_composer_state_impl``, ``_patched_routes_attr``,
    # ``_composer_persisted_validation``, ``_extract_runtime_model_snapshot``).
    # Same HTTP/session-route trust boundary; AST shape changes increased
    # the fingerprinted-entry count from 30 (consolidated under the old
    # ``create_session_router`` factory) to 47 (distributed across
    # registrar wrappers and helpers). All 18 net new entries are bounded
    # 2026-08-20 to force re-evaluation; the 12 R5 isinstance() guards
    # inside ``_dispatch_guided_respond_impl`` are the highest-value
    # remediation target — consolidating that validation behind a single
    # Pydantic validator at the boundary would retire that whole block.
    #
    # Bumped from 411 → 414 on 2026-05-20 (net +3) to accommodate the
    # ``_declared_field_name`` helper introduced by commit 5cab72f3b
    # ("fix(composer): handle structured schema fields in preview"). The
    # helper discriminates between the two arms of
    # ``DeclaredFieldSpec = str | Mapping[str, Any]`` and validates the
    # optional ``"name"`` key on the structured arm — three legitimate
    # Tier-3 boundary patterns (R5 union-arm, R1 mapping probe, R5 value
    # validation). All three entries bounded 2026-08-20 to force
    # re-evaluation; if the structured schema-field shape stabilises into
    # a Pydantic model at the boundary, the whole block retires.
    #
    # Bumped from 414 → 415 on 2026-05-20 (net +1) to accommodate the
    # ``WebScrapeTransform.get_post_call_hints`` Tier-3 isinstance guard
    # introduced by the composer-jit-hints Phase 1 work. The override
    # narrows the LLM-supplied ``text_separator`` config value before
    # the substring check that decides whether to emit the
    # newline-collapse coaching hint. Same trust boundary semantics as
    # the existing ``WebScrapeHTTPConfig._validate_allowed_hosts`` R5
    # entry — config_snapshot is unvalidated LLM-supplied options.
    #
    # Bumped from 415 → 416 on 2026-05-20 (net +1) to accommodate
    # ``_validate_web_scrape_http_identity_not_placeholder`` from commit
    # 02592514c ("Reject web scrape identity placeholders"). The helper
    # inspects raw composer node options for two wire-visible HTTP identity
    # fields (``abuse_contact`` and ``scraping_reason``) before runtime
    # config coercion so placeholder values cannot ship as outbound headers.
    # Entries are bounded to 2026-08-20; if web_scrape HTTP options become
    # a typed composer-side model, this block should retire.
    #
    # Bumped from 416 → 470 on 2026-05-23 (net +54) for the composer/service.py
    # decomposition refactor (`refactor/composer-service-rc5.2`). The refactor
    # extracts three modules from the 5,262-line service.py:
    # - llm_response_parsing.py (Tier-3 LiteLLM response parsers; ~37 entries
    #   for the same R1/R2/R5 patterns previously allowlisted in service.py).
    # - _required_paths_validator.py (Tier-3 JSON-Schema walker; 1 R5 entry).
    # - progress.py (no new Tier-3 entries; UI-status factories only).
    # The 36 remaining TODO entries in pre-existing files
    # (`web/sessions/service.py:_patch_structured_interpretation_prompt`,
    # `web/interpretation_state.py:*`, `web/execution/service.py:_execute_locked`,
    # `web/sessions/routes/messages.py:send_message`) are pre-existing AST-shift
    # rotation drift unrelated to this refactor and should be triaged
    # separately by the file owners. All 54 new entries are bounded to
    # 2026-08-23 (90 days) to force re-evaluation.
    #
    # Bumped from 470 → 537 on 2026-05-23 (net +67) when rebasing
    # refactor/composer-service-rc5.2 atop the parallel refactor/composer-tools-split
    # merge that landed on RC5.2 (commits 0b7c87dc1..9432346f2). The tools-split
    # decomposed the 7,389-line web/composer/tools.py into a `tools/` subpackage
    # with 12 plane modules (_dispatch, _common, blobs, generation, outputs,
    # recipes, secrets, sessions, sinks, sources, transforms, __init__). Each
    # plane module re-acquired AST-shifted fingerprints for the same R1/R5/R9
    # Tier-3 LLM-tool-argument-handling boundaries previously allowlisted under
    # the single tools.py path. Net +67 entries reflect the per-plane
    # redistribution; the underlying boundary semantics are unchanged. All new
    # entries bounded 2026-08-23 (same review window as the composer/service.py
    # bump above) so the upstream tools/ owners and this branch's review can
    # converge in a single quarterly pass.
    max_allow_hits: 537
    # Bumped from 92 → 93 on 2026-05-19 to accommodate the Phase 8b-1a
    # per_file_rules entry for ``web/composer/telemetry_phase8.py`` (R4
    # — W5 load-bearing telemetry-only exemption per
    # docs/composer/ux-redesign-2026-05/20-phase-8-polish-and-telemetry.md).
    # The single per_file_rules entry covers all 11 ``record_*`` helpers
    # via max_hits=12 instead of 11 individual fingerprinted entries —
    # avoids AST-shift fingerprint rotation and concentrates the W5
    # rationale at one site.
    max_per_file_rules: 93
    # Bumped from 485 → 486 on 2026-05-19 for the same Phase 8 PR-review
    # S4 entry as ``max_allow_hits`` above.
    #
    # Bumped from 486 → 504 on 2026-05-20 for the same session-routes
    # resource split bump as ``max_allow_hits`` above (net +18).
    #
    # Bumped from 504 → 507 on 2026-05-20 for the
    # ``_declared_field_name`` helper bump as ``max_allow_hits`` above
    # (net +3).
    #
    # Bumped from 507 → 508 on 2026-05-20 for the same composer-jit-hints
    # Phase 1 ``WebScrapeTransform.get_post_call_hints`` bump as
    # ``max_allow_hits`` above (net +1).
    #
    # Bumped from 508 → 509 on 2026-05-20 for the same wire-visible
    # web_scrape identity placeholder validation bump as ``max_allow_hits``
    # above (net +1).
    #
    # Bumped from 509 → 563 on 2026-05-23 for the same composer/service.py
    # decomposition refactor as ``max_allow_hits`` above (net +54).
    #
    # Bumped from 563 → 629 on 2026-05-23 (net +66) for the same rebase-atop-
    # tools-split as ``max_allow_hits`` above. One per_file_rules entry removed
    # (the now-stale ``web/composer/tools.py`` pattern; the file was deleted
    # and replaced with the ``tools/`` subpackage whose plane modules carry
    # their own per-file rules and fingerprinted entries).
    max_total_entries: 629
    # Permanent exemptions must be renewed or deliberately re-ratcheted during
    # quarterly allowlist review. New suggested entries default to a bounded
    # three-month expiry window instead of expires: null.
    #
    # Bumped 2026-05-23: max_permanent_allow_hits 324 → 387 (net +63),
    # max_permanent_total_entries 417 → 479 (net +62). Same rebase-atop-
    # tools-split rationale as ``max_allow_hits`` / ``max_total_entries``
    # above. Permanent counts represent the subset of expires:null entries —
    # the upstream tools-split's plane modules brought their own permanent
    # allowlist coverage which now lands in this composer-service refactor's
    # commit since both refactors share the same web.yaml.
    max_permanent_allow_hits: 387
    max_permanent_per_file_rules: 93
    max_permanent_total_entries: 479
