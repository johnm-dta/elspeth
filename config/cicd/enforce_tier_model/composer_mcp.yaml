- key: composer_mcp/server.py:R6:create_server:call_tool:fp=98007a473ebfd71b
  owner: composer-audit
  reason: |-
    Trust-boundary recovery — canonical_json/stable_hash on the success-path result_dict runs in finally to compute the audit row. A non-finite float in our own dispatch output would otherwise raise from finally and mask the success return entirely. Falling back to a sentinel canonical preserves both the LLM's success response AND the audit row. Updated 2026-05-06 (elspeth-281f259235) to delegate sentinel construction to web.composer.audit.build_canonicalization_sentinel for diagnostic-shape symmetry.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-28'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-05-30T04:18:42.142178+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:ee8359775f8cd9b8849912ecc4155fa4df8f2d86fabad8289b5acf1e795c87b6'
  judge_confidence: 0.78
  judge_rationale: |-
    This is a legitimate audit-trail-preservation pattern, not defensive programming on Tier-2 data. The except runs inside a finally block whose sole job is to land the audit row; if canonical_json/stable_hash raise on a non-finite float, the exception would propagate out of finally and both mask the LLM's success return AND lose the audit record — directly violating the Auditability Standard ('every decision must be traceable'). The narrow except (ValueError, TypeError) delegates to a shared sentinel builder that records the canonicalization failure explicitly rather than fabricating a value, so the audit row truthfully says 'canonicalization failed' instead of silently dropping. The rationale is site-specific, names the exact failure mode, and points at the shared sentinel discipline; this is the audit-finally pattern the policy implicitly requires.
