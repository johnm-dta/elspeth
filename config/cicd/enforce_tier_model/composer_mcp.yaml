per_file_rules:
- pattern: composer_mcp/server.py
  rules:
  - R1
  reason: MCP tool arguments are external client data (Tier 3) - defensive access is correct
  expires: null
- pattern: composer_mcp/server.py
  rules:
  - R5
  reason: Serialization boundary — isinstance checks convert Pydantic models and containers
    to JSON-safe types; RuntimePreflightFailure union dispatch in _mcp_preview_runtime_preflight
    also uses isinstance to narrow the result type
  expires: null
  max_hits: 4
allow_hits:
- key: composer_mcp/server.py:R6:create_server:call_tool:fp=d82bd1508da8e964
  owner: composer-audit
  reason: Trust-boundary recovery — canonical_json/stable_hash on LLM-supplied arguments
    can raise on Tier-3 input (non-finite floats, non-serializable types). The catch
    builds a sentinel canonical and synthesizes ARG_ERROR via the inner `raise ValueError`
    so the audit row still lands. Audit primacy demands a row even on un-canonicalizable input.
  safety: "Sentinel canonical _canonicalization_error key is written to the audit
    row; the original exception is re-raised as a ValueError caught by the ARG_ERROR
    handler one level out, returning a structured tool error to the LLM."
  expires: null
- key: composer_mcp/server.py:R6:create_server:call_tool:fp=275288b86e214664
  owner: composer-audit
  reason: Trust-boundary recovery — canonical_json/stable_hash on the success-path result_dict
    runs in finally to compute the audit row. A non-finite float in our own dispatch output
    would otherwise raise from finally and mask the success return entirely. Falling back
    to a sentinel canonical preserves both the LLM's success response AND the audit row.
  safety: "Sentinel canonical _canonicalization_error key is written to the audit
    row; the result_dict the LLM saw is unchanged. A future hardening would also flag
    the underlying _dispatch_tool output as a Tier-1 invariant breach (it should not
    have produced un-canonicalizable output), tracked separately."
  expires: null
