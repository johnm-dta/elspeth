- key: composer_mcp/server.py:R6:create_server:call_tool:fp=bbe2757f46dc0db3
  owner: composer-audit
  reason: |-
    Trust-boundary recovery — canonical_json/stable_hash on LLM-supplied arguments can raise on Tier-3 input (non-finite floats, non-serializable types). The catch builds a sentinel canonical and later synthesizes ARG_ERROR through the explicit argument-error result path so the audit row still lands. Audit primacy demands a row even on un-canonicalizable input. Updated 2026-05-06 (elspeth-281f259235) to delegate sentinel construction to web.composer.audit.build_canonicalization_sentinel so both audit surfaces share a single sentinel-shape policy.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
