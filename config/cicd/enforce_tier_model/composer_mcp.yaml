    PRESCRIBED FORM at a Tier-3 boundary. `arguments` is LLM-supplied external data; `canonical_json`/`stable_hash` are the boundary operations that may legitimately reject non-finite floats (rfc8785) or non-serializable types. The except catches narrow types only (ValueError, TypeError), does NOT silently swallow: it builds a value-free forensic sentinel via the shared `build_canonicalization_sentinel` helper, preserves the original exception in `canonicalization_failed`, and at server.py:673-675 surfaces it as an explicit ARG_ERROR via `_argument_error_result`, which sets `status = ComposerToolStatus.ARG_ERROR`, populates the audit payload, and returns `CallToolResult(isError=True)` — verified by reading the file. The audit envelope around the dispatch guarantees the record lands. R6 is not in the decorator's suppressible set ({R1,R5}), so a structural refactor is not the remediation here.
