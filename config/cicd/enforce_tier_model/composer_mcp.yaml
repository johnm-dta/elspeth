- key: composer_mcp/server.py:R6:create_server:call_tool:fp=98007a473ebfd71b
  owner: john
  reason: |-
    At src/elspeth/composer_mcp/server.py line 782, `except (ValueError, TypeError) as canon_result_exc` wraps `canonical_json(result_dict)` / `stable_hash(result_dict)` inside the dispatch's `finally` block. `result_dict` is not merely 'our own output': on the success path it embeds composer-LLM-authored CompositionState (see lines 729-751, `CompositionState.from_dict(result_dict["state"])`), so a non-finite float or non-serializable value can legitimately originate from that external-authored config (Tier 3), which rfc8785 rejects. The catch is in a `finally` whose sole job is to land the audit row, and it deliberately does not re-raise because raising from `finally` would both mask the LLM's success return and destroy the audit record — violating audit primacy; instead it records the failure via the shared `build_canonicalization_sentinel` so the audit row truthfully states 'canonicalization failed' rather than silently dropping. Even were a malformed value to originate from our own dispatch, it surfaces visibly as a recorded canonicalization-failure sentinel rather than being swallowed, keeping this on the right side of R6.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
