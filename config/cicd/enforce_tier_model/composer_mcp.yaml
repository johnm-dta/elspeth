  expires: '2026-09-02'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-04T03:23:25.429812+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.82
  judge_rationale: |-
    PRESCRIBED FORM. This is the audit-record finalization path running in `finally`: canonicalizing the already-returned successful result for the audit row. A raise from finally would mask the legitimate success return to the LLM and corrupt the audit trail. The except catches narrow serialization errors (ValueError/TypeError from canonical_json) and substitutes a documented shared sentinel (build_canonicalization_sentinel) that records the failure mode rather than fabricating success — the audit row still lands with a faithful sentinel, which matches the Auditability Standard's 'record what we got' discipline. The error is not swallowed silently; it is converted into a recorded canonical sentinel keyed to the exception.
