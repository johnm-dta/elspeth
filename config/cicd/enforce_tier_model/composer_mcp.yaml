  judge_policy_hash: 'sha256:ee8359775f8cd9b8849912ecc4155fa4df8f2d86fabad8289b5acf1e795c87b6'
  judge_confidence: 0.86
  judge_rationale: |-
    This is a legitimate Tier-3 boundary catch: canonical_json/stable_hash operate on LLM-supplied arguments (external, untrusted) and can raise ValueError/TypeError on non-finite floats or non-serializable types. The except clause does not silently swallow — it builds a forensic sentinel via a shared helper, preserves the exception in canonicalization_failed for the ARG_ERROR path, and audit primacy is honored by ensuring the row still lands. This is exactly the 'wrap at trust boundary' pattern the policy encourages, not defensive recovery on Tier-2 data. R6 (broad except) is not in the decorator's suppressible set {R1, R5}, so the decorator nudge does not apply.
