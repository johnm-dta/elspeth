- key: composer_mcp/server.py:R6:create_server:call_tool:fp=bbe2757f46dc0db3
  owner: john
  reason: |-
    At src/elspeth/composer_mcp/server.py line 620, `except (ValueError, TypeError) as canon_exc` wraps `canonical_json(arguments)` / `stable_hash(arguments)` operating on `arguments` — the LLM-supplied tool-call arguments, which are external-authored (Tier 3) and can carry non-finite floats or non-serializable types that rfc8785 rejects. The catch is not a silent swallow: it builds a forensic sentinel via the shared `build_canonicalization_sentinel` helper (type-name + value-free message + sorted top-level keys), records the failure in `canonicalization_failed`, and at line 673-675 synthesizes an explicit ARG_ERROR result so the audit row still lands and the LLM still receives a structured error. The narrow two-type catch and the record-then-surface-as-ARG_ERROR flow are the prescribed 'wrap at a Tier-3 boundary' pattern; nothing is fabricated and no audit record is dropped.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
