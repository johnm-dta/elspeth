  judge_confidence: 0.82
  judge_rationale: |-
    PRESCRIBED FORM. R6 fires by shape (no re-raise) but the code is the policy-prescribed quarantine: canonical_json/stable_hash failures are diverted through build_canonicalization_sentinel (web/composer/audit.py:135-174), which produces an explicit, bounded error payload that is then recorded in the ComposerToolInvocation audit row — not silent. The site is in a finally whose sole purpose is to land the audit row; the rationale plainly states why re-raise would violate audit primacy (mask the LLM-returned response AND destroy the audit record), and the surrounding code confirms it: the symmetric Tier-1 read-back path at server.py:752-760 does re-raise as PLUGIN_CRASH for invariant breaks earlier in the dispatch, so by the time finally runs, the failure mode being guarded is RFC 8785 strictness against payload contents that already passed json.dumps (a real Tier-3 gap where LLM-authored CompositionState values can be non-canonicalizable, e.g. non-finite floats). The shared sentinel discipline is documented and used in the parallel web path. Audit row carries the failure explicitly; this is the prescribed quarantine, not a silent swallow.
