- key: composer_mcp/server.py:R6:create_server:call_tool:fp=658eeb3e33dab651
  owner: john
  reason: |-
    This is the MCP tool-call argument canonicalization boundary in `src/elspeth/composer_mcp/server.py:642`. The caught `ValueError`/`TypeError` is not a Tier-1 audit-data read failure and is not silently swallowed: `arguments` are external MCP client input, and the handler converts non-canonicalizable input into a safe audit sentinel and an explicit tool argument error. At `src/elspeth/composer_mcp/server.py:666` the code catches `except (ValueError, TypeError) as canon_exc:`, then at `src/elspeth/composer_mcp/server.py:672-675` records a sentinel with `build_canonicalization_sentinel(canon_exc, arguments)`, `arguments_canonical = canonical_json(sentinel)`, `arguments_hash = stable_hash(sentinel)`, and `canonicalization_failed = canon_exc`. The enclosing flow then checks that sentinel at `src/elspeth/composer_mcp/server.py:719-721` and returns `_argument_error_result(ValueError(f"arguments not canonicalizable ({type(canonicalization_failed).__name__})"))`, whose helper marks `status = ComposerToolStatus.ARG_ERROR` and returns `CallToolResult(..., isError=True)` at `src/elspeth/composer_mcp/server.py:694-706`. Future drift that removes the `canonicalization_failed` check, the ARG_ERROR status, or the `isError=True` result would invalidate this suppression.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T12:21:46.772545+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.85
  judge_rationale: |-
    RULE MISFIRES / PRESCRIBED FORM: R6 flags silent-except, but this except is neither silent nor a swallow. The handler catches ValueError/TypeError from canonical_json on external MCP client `arguments` (Tier-3 boundary), builds an explicit forensic sentinel, records it into the audit-ready canonical/hash fields, and sets `canonicalization_failed = canon_exc` which the downstream flow checks to route to `_argument_error_result` (status=ARG_ERROR, isError=True). The visible code shows the sentinel construction and the `canonicalization_failed` capture; the rationale plainly states the downstream routing at lines 719-721 and 694-706 and nothing in the excerpt contradicts it. This is the prescribed Tier-3 boundary form: coerce/record what we got and produce an explicit error result rather than swallowing.
