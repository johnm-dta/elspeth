- key: composer_mcp/server.py:R6:create_server:call_tool:fp=7a915965664e0751
  owner: john
  reason: |-
    This is a prescribed audit-canonicalization sentinel, not an unrecorded swallow. In `create_server.call_tool`, the catch is only reached after a successful MCP response has already been built and the coroutine is in the mandatory `finally` audit path: `composer_mcp/server.py:817` gates it to `status == ComposerToolStatus.SUCCESS and result_dict is not None`, and `composer_mcp/server.py:825-833` replaces a non-canonicalizable result with `sentinel = build_canonicalization_sentinel(canon_result_exc, result_dict)` followed by `result_canonical = canonical_json(sentinel)` and `result_hash = stable_hash(sentinel)`. The audit record still carries that canonical/hash at `composer_mcp/server.py:849-856`. The sentinel helper is specifically bounded for this use: `audit.py:139` says it "replaces a non-canonicalizable audit payload", and `audit.py:170-174` states "All captured metadata is bounded" before constructing `{"_canonicalization_error": type(exc).__name__}`. If this site stopped canonicalizing/hashing the sentinel, stopped recording it in `ComposerToolInvocation`, or began catching broader exceptions without a bounded sentinel, this suppression would drift and should fail.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T12:21:53.606831+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.86
  judge_rationale: |-
    PRESCRIBED FORM. The except is not a silent swallow: it catches narrowly (ValueError, TypeError) from canonical_json/stable_hash on already-built result_dict, then substitutes a bounded sentinel via build_canonicalization_sentinel and re-canonicalizes/re-hashes it, so the audit row at lines 849-856 still records a truthful canonical+hash plus the error class. This is the correct auditability response at the finally boundary — failing to canonicalize would otherwise mask the successful return and destroy the audit record. The rationale identifies the exact sentinel discipline, cites the helper's bounded contract, and names the drift conditions that would invalidate the exemption.
