  reason: 'ADR-010 §Decision 3 M3 + H2 N1 runtime-VAL manifest hashing. Six cohesive
    introspection patterns, each intrinsic to the data shape: (1) _normalize_code_constant
    x6 isinstance dispatches over CodeType/tuple/list/frozenset/bytes/scalar — CPython
    co_consts is a genuinely heterogeneous tuple and dispatch is the only way to normalize
    it; (2) _callable_implementation_hash x1 isinstance + x6 getattr on __code__/__defaults__/__kwdefaults__/__annotations__/__module__/__qualname__
    — C-implemented callables legitimately lack these, the None-default branch feeds
    the repr-fallback hash; (3) _strip_docstrings x1 getattr + x4 isinstance over
    ast.Expr/ast.Constant/str — AST node dispatch has no Protocol alternative; (4)
    _unwrap_callable x3 isinstance(staticmethod/classmethod/property) — descriptor
    unwrapping over distinct CPython runtime types; (5) _payload_schema_hash x1 isinstance(type)
    + x3 getattr(__annotations__/__required_keys__/__optional_keys__) and x1 getattr(payload_schema)
    in _declaration_contract_implementation_hash + x1 getattr(__module__) in _iter_relevant_method_hashes
    — TypedDict introspection API differs by declaration style; (6) delegated-helper
    dependency hashing inspects function code/globals/module metadata to include helper
    drift without recursively hashing unrelated globals. Plus 1x except (OSError,
    TypeError) in _class_source_hash for inspect.getsource() on builtin/dynamically-generated
    classes; it raises FrameworkBugError rather than emitting a nullable source_hash,
    so source-unavailable classes cannot enter the resume-trust manifest. Total: 35.
    Direct attribute access would crash on legitimate inputs (builtins, C functions,
    functional-syntax TypedDicts, non-global co_names, and dependency cycles). Ceiling
    pinned to 35 — adding a 36th site requires explicit review, not silent absorption.'
  expires: null
  max_hits: 35
