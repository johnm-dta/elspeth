- key: contracts/data.py:R6:_get_allow_inf_nan:fp=a073efa3e28410f3
  owner: john
  reason: |-
    _get_allow_inf_nan iterates over Pydantic FieldInfo.metadata, a heterogeneous list whose items may be marker objects, dataclass-like metadata, or plain scalars (strings/ints). Line 155 (`except TypeError: continue`) catches the TypeError that vars(item) raises on items lacking __dict__, and skips them — only object metadata can carry the allow_inf_nan attribute. This is type-system introspection branching on a structural fact of the Pydantic metadata protocol, not bug-hiding: the except is narrowly scoped to TypeError with a known cause, and a non-match returns the honest default None (no such constraint declared). No error is masked and no value is fabricated.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-31'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-02T02:36:53.284695+00:00'
