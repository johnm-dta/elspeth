  judge_confidence: 0.92
  judge_rationale: |-
    RULE MISFIRES / PRESCRIBED FORM. The flagged `isinstance(cls, type) and issubclass(cls, BaseException)` at line 146 is an offensive invariant check at the `@tier_1_error` decorator API boundary, paired with `raise TypeError` on line 147 — the prescribed 'detect an invalid state and throw a meaningful error' form. The decorator target is supplied by framework code at import time, and Python decorator syntax does not statically enforce that the argument is a BaseException subclass; this is the sole runtime enforcement of that contract before the registry mutation. No `.get()`, no coercion, no suppression — wrong type crashes loudly with a contextual message, exactly matching the Defensive vs Offensive Decision Test's 'Assert it (offensive)' branch.
