    PRESCRIBED FORM — narrow Tier-1-DB I/O fault returned as an explicit error result; Tier-1 semantic corruption deliberately propagates. In PurgeManager.purge_payloads (core/retention/purge.py:427), `except SQLAlchemyError as exc` catches a transient database I/O fault from update_grade_after_purge(...). The in-code comment states the doctrine exactly: update_grade_after_purge operates on our own Tier-1 audit DB, so the ONLY recoverable failure mode is database I/O (lock contention, connection loss); every SEMANTIC anomaly it can detect is raised as AuditIntegrityError — a Tier-1 error that is NOT a SQLAlchemyError — which therefore propagates uncaught and crashes the purge, because corruption of our audit trail must never be recorded as a recoverable "grade update failure". Any other exception (TypeError, AttributeError, RuntimeError) is a bug in our own code and likewise crashes. This is not a silent swallow: the failure is appended to grade_update_failures (returned in PurgeResult) and the loop continues, because the payloads are already irreversibly deleted so a transient DB failure for one run must not prevent grade updates for the remaining runs. The catch is narrow (SQLAlchemyError); the returned grade_update_failures is the explicit error result; the logger.warning is supplementary. R6 cannot distinguish a narrow recoverable-I/O catch (with Tier-1 corruption excluded and re-raising) from a silent swallow. Per-line allowlist is the prescribed mechanism.
