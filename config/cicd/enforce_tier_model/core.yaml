  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.9
  judge_rationale: |-
    RULE MISFIRES / PRESCRIBED FORM. The contextlib.suppress here is narrowly scoped to FileNotFoundError during rollback cleanup of a temp file that this function itself created — the primary write failure is re-raised on line 258, so no store/integrity failure is hidden. Suppressing 'already gone' during best-effort unlink of our own temp path is meaning-preserving cleanup, not silent error swallowing: the only outcome being suppressed is 'the file we were going to delete is already deleted', which is exactly the post-condition we wanted. The rationale correctly identifies the scope, the code confirms the re-raise, and the suppression does not touch the atomic-write path itself.
