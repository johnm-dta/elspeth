- key: core/payload_store.py:R6:FilesystemPayloadStore:delete:fp=e09a86b5ad169a0b
  owner: john
  reason: |-
    `core/payload_store.py:301-319` is an idempotent filesystem delete boundary, not a Tier-1 audit-data read path. The function contract says `delete()` returns `"True if content was deleted, False if not found"` (`core/payload_store.py:304-305`), and the caught exception is exactly the filesystem's "not found" outcome after a prior existence check: `os.unlink(path.name, dir_fd=dir_fd)` followed by `except FileNotFoundError: return False` (`core/payload_store.py:314-316`). This is drift-sensitive: the suppression is valid only while `FilesystemPayloadStore.delete` keeps the explicit boolean not-found contract and catches only `FileNotFoundError` around the unlink race; broad exception swallowing or use on audit records would be BLOCK.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
