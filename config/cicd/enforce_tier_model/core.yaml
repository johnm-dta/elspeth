- key: core/payload_store.py:R6:FilesystemPayloadStore:store:fp=7ffad90e4cb20922
  owner: architecture
  reason: |-
    TOCTOU race guard — FileNotFoundError means file was purged between read attempt and write fallback
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-28'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-05-30T04:22:32.958701+00:00'
