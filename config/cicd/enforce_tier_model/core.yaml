- key: core/landscape/database.py:R1:LandscapeDB:_configure_sqlite:_emit_begin:fp=a9b73e78431f9915
  owner: john
  reason: |-
    `src/elspeth/core/landscape/database.py:645` reads an optional SQLAlchemy execution option, not Tier-1 audit data: `if conn.get_execution_options().get(WRITE_INTENT_OPTION, False):`. The enclosing SQLite `begin` listener selects `BEGIN IMMEDIATE` only when the engine-side write helper has explicitly set `WRITE_INTENT_OPTION`; absence is the documented plain-transaction path, not malformed/corrupt data to crash on. The paired writer path at `src/elspeth/core/landscape/database.py:172-174` sets that transient framework option with `conn.execution_options(**{WRITE_INTENT_OPTION: True})` immediately before `conn.begin()`. This suppression is valid only for this optional SQLAlchemy execution-options probe inside `_emit_begin`; if the site drifts to reading Landscape rows, checkpoints, audit JSON, or any persisted Tier-1 record with `.get()`, it must be reified or allowed to crash instead.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T12:08:16.168643+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.85
  judge_rationale: |-
    RULE MISFIRES. The `.get()` is on SQLAlchemy's execution-options mapping — a framework-owned transient dict whose contents are set by our paired writer path (`conn.execution_options(**{WRITE_INTENT_OPTION: True})`) and whose absence is the documented default path for plain transactions. This is not Tier-1 audit data being defensively probed; it is a presence-check on an optional framework flag where absence has a defined meaning (DEFERRED begin). The R1 pattern's premise (hides missing-key bug in data we control) doesn't apply — the key is intentionally optional by design.
  judge_signature_version: 2
