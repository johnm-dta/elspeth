- key: core/payload_store.py:R6:FilesystemPayloadStore:_write_temp_payload_file:fp=76e7d39385914996
  owner: john
  reason: |-
    This is a bounded collision-retry path for exclusive temporary-file creation, not a swallowed audit-data or defensive-programming failure. In `src/elspeth/core/payload_store.py:149-158`, `_write_temp_payload_file` opens a randomly named temp file with `os.O_CREAT | os.O_EXCL | _O_NOFOLLOW`; the only suppressed exception is `FileExistsError`, and the handler immediately retries with a fresh `secrets.token_hex(8)` name: `except FileExistsError:` / `continue`. The suppression is bounded by `for _ in range(100):`, and exhaustion is reified as `raise FileExistsError(f"Could not allocate unique payload temp file for {filename}")`. Future drift that catches broader `OSError`, removes `O_EXCL`, removes the retry bound, or fails to raise after exhaustion would invalidate this suppression.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T12:22:06.126752+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.94
  judge_rationale: |-
    RULE MISFIRES / PRESCRIBED FORM: The suppressed exception is narrowly `FileExistsError` (not a broad `OSError` or bare `except`), it is the expected collision signal from `O_CREAT | O_EXCL` on a randomly-named temp file, and the `continue` immediately retries with a fresh `secrets.token_hex(8)` name. The retry is bounded by `for _ in range(100)` with a `for/else` that reifies exhaustion as a raised `FileExistsError` — so the error is not swallowed, it is either resolved by retry or surfaced. This is the prescribed pattern for atomic exclusive-create temp-file allocation and does not silently discard information the auditor would need.
  judge_signature_version: 2
