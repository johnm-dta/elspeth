- key: core/payload_store.py:R6:FilesystemPayloadStore:store:fp=1a9aa1ff8a72e9bf
  owner: john
  reason: |-
    This is a prescribed EAFP filesystem race boundary, not a Tier-1 audit-data corruption swallow. In `core/payload_store.py:222-226`, `FilesystemPayloadStore.store` documents that it intentionally uses `try/read_bytes` instead of `exists()+read_bytes` so a concurrent purge between check and read is treated as absence. The flagged handler at `core/payload_store.py:238-239` catches only `FileNotFoundError` and immediately falls through to the atomic write path at `core/payload_store.py:243-251`; it does not suppress hash mismatch or write failure. If this site stops being the pre-write "missing payload file" race path, the justification no longer applies.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T12:22:18.783443+00:00'
