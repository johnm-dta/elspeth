  owner: john
  reason: |-
    `src/elspeth/core/operations.py:35-56` is a prescribed boundary for rendering arbitrary operation exceptions into Tier-1 audit text, not a defensive read of Tier-1 data. The function documents the exact binding: `_render_exception` returns the string persisted as `operations.error_message`, and is the "single chokepoint through which *every* operation error is rendered". The broad handler at `src/elspeth/core/operations.py:52-55` wraps only `message = scrub_text_for_audit(str(exc))`; on any rendering/scrubbing failure it returns the secret-free fallback `type(exc).__name__` instead of risking persistence of an unscrubbed exception string. Drift that moves this handler outside that narrow `str(exc)`/scrub boundary, or changes the fallback to include raw exception text, would invalidate this suppression.
