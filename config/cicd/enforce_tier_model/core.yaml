- key: core/payload_store.py:R7:FilesystemPayloadStore:store:fp=c7f26a4db66ecf0d
  owner: john
  reason: |-
    This suppression is a narrow cleanup-only suppression, not a Tier-1 audit-data read or validation path. In `FilesystemPayloadStore.store`, the protected operation is only best-effort removal of a temporary payload file after the primary atomic-write path has already failed: `except BaseException:` at core/payload_store.py:254 enters cleanup, `if temp_name is not None:` at line 255 proves the temp name came from this function's write attempt, and `with contextlib.suppress(FileNotFoundError): os.unlink(temp_name, dir_fd=dir_fd)` at lines 256-257 suppresses only "already gone" during rollback. The original failure is still re-raised at line 258, so this does not hide store failure, integrity failure, or audit corruption. If future code expands this suppression beyond `FileNotFoundError`, wraps the write/replace/fsync itself, or stops re-raising after cleanup, this justification no longer applies.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
