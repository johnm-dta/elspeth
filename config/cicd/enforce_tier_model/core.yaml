  judge_rationale: |-
    PRESCRIBED FORM. The suppress(FileNotFoundError) is scoped narrowly to the cleanup unlink inside an except BaseException block that ends with a bare `raise` — the original write/flush/fsync exception propagates unchanged. The suppression only makes the rollback-unlink idempotent against the case where the temp file was never fully created, which is meaning-preserving cleanup, not silent error swallowing. The rationale correctly identifies the drift risks (moving suppress around the write path, or losing the trailing raise) that would invalidate this form.
