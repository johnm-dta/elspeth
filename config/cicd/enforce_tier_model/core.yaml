- key: core/landscape/database.py:R1:LandscapeDB:_configure_sqlite:_emit_begin:fp=37903ae52aa2875d
  owner: john
  reason: |-
    `src/elspeth/core/landscape/database.py:645` reads an optional SQLAlchemy execution option, not Tier-1 audit data: `if conn.get_execution_options().get(WRITE_INTENT_OPTION, False):`. The enclosing SQLite `begin` listener selects `BEGIN IMMEDIATE` only when the engine-side write helper has explicitly set `WRITE_INTENT_OPTION`; absence is the documented plain-transaction path, not malformed/corrupt data to crash on. The paired writer path at `src/elspeth/core/landscape/database.py:172-174` sets that transient framework option with `conn.execution_options(**{WRITE_INTENT_OPTION: True})` immediately before `conn.begin()`. This suppression is valid only for this optional SQLAlchemy execution-options probe inside `_emit_begin`; if the site drifts to reading Landscape rows, checkpoints, audit JSON, or any persisted Tier-1 record with `.get()`, it must be reified or allowed to crash instead.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-09-15'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-17T16:15:27.274258+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.85
  judge_rationale: |-
    RULE MISFIRES. The `.get()` here reads SQLAlchemy's execution-options mapping — a framework-provided dict whose contract is defined by SQLAlchemy, not Tier-1 audit data we authored. Absence of WRITE_INTENT_OPTION is the documented, intended signal for the DEFERRED path (the writer side at line 172-174 sets it transiently before begin); this is exactly the boolean-flag-with-default idiom the SQLAlchemy API is designed around. R1's concern (hiding missing-key bugs in our schema) does not apply: there is no first-party schema here, and KeyError would not surface a bug — the key's absence is semantically meaningful. The rationale is site-specific and correctly scopes the suppression.
  judge_signature_version: 2
  scope_fingerprint: cb1ecba71e0e4af4fbb8f8d9b5e34790b33b2d571c3fd742242f31da87e81b10
  judge_transport: openrouter
  ast_path: 'body[37]/body[3]/body[4]/body[1]/test'
  judge_metadata_signature: 'hmac-sha256:v2:8072efb45fa0b16ce8daa4cf5712f322b817937335af5a63fda6289ee47adf64'
- key: core/landscape/run_coordination_repository.py:R6:RunCoordinationRepository:_read_registered_workers:fp=fd1ff8456b1f9107
  owner: john
  reason: |-
    This is a prescribed diagnostic best-effort suppression, not a normal Tier-1 read path. The enclosing caller is already converting a locked database write failure into `WriteLockHeldError`: `raise WriteLockHeldError(run_id=run_id, workers=self._read_registered_workers(run_id)) from exc` at src/elspeth/core/landscape/run_coordination_repository.py:464. The flagged helper is only enriching that error with a forensic worker roster; its docstring explicitly binds the behavior to the BUSY-takeover diagnostic and says the fallback must not hide the primary failure: "Best effort — an unreadable registry yields an empty roster, never masks the WriteLockHeldError." at src/elspeth/core/landscape/run_coordination_repository.py:1005-1006. The catch is also narrowed to DB-layer failures while non-DB programmer errors still surface, as stated in the local comment: "A non-DB (programmer) error is not an expected outcome here and is allowed to surface." at src/elspeth/core/landscape/run_coordination_repository.py:1025-1026. Future drift would invalidate this suppression if `_read_registered_workers` becomes a primary audit read, is called outside the `WriteLockHeldError` construction path, or broadens the catch beyond SQLAlchemy DB failures.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-09-15'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-17T19:28:23.591602+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.85
  judge_rationale: |-
    PRESCRIBED FORM. The R6 silent-except rule fires on the SQLAlchemyError catch, but this is the policy-prescribed legitimate form for a forensic best-effort diagnostic enrichment, not a Tier-1 audit read. The caller is already raising WriteLockHeldError; this helper exists solely to attach a worker roster to that error, and the docstring/comments make explicit that an unreadable registry must NOT mask the primary failure. The catch is narrowed to SQLAlchemyError (DB-layer only — programmer errors still surface), the failure is logged with exc_info, and an empty tuple is returned as an honest 'absence' value rather than fabricated roster data. The rationale plainly states the invariant and binds the suppression to the WriteLockHeldError diagnostic path, and the visible code corroborates each claim.
  judge_signature_version: 2
  scope_fingerprint: 9608ef1e56d9b53e91e6d1dce12fd85c3cb0ffbf28c0de9fedda97b4460c362b
  judge_transport: openrouter
  ast_path: 'body[29]/body[16]/body[1]/handlers[0]'
  judge_metadata_signature: 'hmac-sha256:v2:635118c36d58c40655162ed24261e69999646c20e424d48acf0bfed7b81e4061'
- key: core/landscape/run_coordination_repository.py:R6:_record_best_effort_event:fp=9a4208c0d0f37f5f
  owner: john
  reason: |-
    Prescribed best-effort suppression, not a normal Tier-1 write path. _record_best_effort_event records a fence_refusal / heartbeat_degraded attribution row on a FRESH connection AFTER the triggering transaction rolled back; per ADR-030 section A.2 the row carries no durable state, so a lost event is benign. The catch MUST NOT raise: record_fence_refusal runs inside fenced_leader_transaction's `except RunLeadershipLostError: ... raise` unwind at src/elspeth/core/landscape/run_coordination_repository.py:276-288, so a raise here would replace the recoverable leadership-lost signal with a crash-class error, and on the record_heartbeat_degraded path it would crash the heartbeat thread before it latches coordination-lost. The catch is narrowed to SQLAlchemy DB-layer failures; non-DB programmer errors are not SQLAlchemyError and still surface. Transient write contention (database is locked) logs at WARNING; any other DB fault (FK miss on a vanished run, event_id dedup collision, real corruption) logs at ERROR so it stays visible and alarmable without crashing the leader. Same shape and discipline as the already-signed _read_registered_workers R6 waiver in this file. Future drift invalidates this suppression if the function becomes a primary audit write, is called outside a best-effort/unwind path, or broadens the catch beyond SQLAlchemy DB failures.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-09-17'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-19T03:25:12.802217+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.86
  judge_rationale: |-
    PRESCRIBED FORM. R6 fires correctly — this is a swallowed except — and the code is the policy-prescribed legitimate form: a documented best-effort attribution writer whose 'never raises' contract is load-bearing because it runs inside a leadership-lost unwind path and a heartbeat thread, where raising would convert a recoverable signal into a crash. The catch is narrowed to SQLAlchemyError (non-DB programmer errors still surface), failures are routed to WARNING for transient lock contention and ERROR otherwise so they remain alarmable, and the docstring in the excerpt independently corroborates the rationale. The fabrication test does not apply (no synthesized data; the event is simply lost, which §A.2 designates benign).
