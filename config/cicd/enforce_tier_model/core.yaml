- key: core/canonical.py:R6:_normalize_value:fp=b26d50562c16f852
  owner: john
  reason: |-
    In _normalize_value (line 98) the np.any(np.isnan/isinf) check on a non-empty ndarray is wrapped, and except TypeError: pass handles the case where numpy raises TypeError because the array's dtype is non-numeric (e.g. strings). This is narrow EAFP type-dispatch: numpy offers no clean LBYL way to ask 'could this dtype hold NaN/Inf' without invoking the check, and a non-numeric array definitionally cannot contain NaN/Infinity, so there is nothing to reject — the pass is the correct fall-through, not a swallowed data error. No value is coerced, defaulted, or fabricated; the function continues to normalize the array element-wise, and any genuine non-finite numeric value still raises ValueError. The catch is scoped to TypeError only (the specific exception numpy raises for the dtype mismatch), so it cannot mask other failures.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-31'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-02T04:33:14.497673+00:00'
