    In begin_node_state (line 173) the except (ValueError, TypeError) is reachable ONLY inside the quarantined=True branch: it wraps stable_hash(input_data) and falls back to repr_hash(input_data). The quarantined flag explicitly marks input_data as Tier-3 external row data that may contain non-canonical values (NaN/Infinity, or unserializable types) which stable_hash legitimately rejects — and stable_hash/canonical_json genuinely raise both ValueError (non-finite floats/Decimals) and TypeError (types rfc8785 cannot serialize), so the catch tuple is accurate and complete, not over-broad. The non-quarantined branch (line 176) calls stable_hash uncaught, so this fallback cannot mask a canonicalization bug on our own normal data — only Tier-3 quarantined input degrades to repr_hash. repr_hash is a deterministic alternate hash of the SAME input (the node state still records a real input_hash for that exact data), not a default or fabricated value and not data loss. This is legitimate Tier-3 boundary handling; the existing rationale matches the code and I confirmed its exception-type claims against canonical.py.
