- key: core/payload_store.py:R6:FilesystemPayloadStore:_payload_file_exists:fp=a76c743109d2dd8b
  owner: john
  reason: |-
    This is a prescribed existence-probe form, not a swallowed defensive-programming error. In `core/payload_store.py:137-145`, `_payload_file_exists` is explicitly a boolean helper: it calls `os.stat(filename, dir_fd=dir_fd, follow_symlinks=False)`, maps only `FileNotFoundError` to the documented absence value with `return False`, and still crashes on the Tier-1 integrity violation it is checking for: `if stat.S_ISLNK(file_stat.st_mode): raise ValueError(...)`. Its callers preserve that contract: `exists()` returns the helper result at `core/payload_store.py:293-299`, while the read path does not suppress absence and instead reifies it as `PayloadNotFoundError` at `core/payload_store.py:276-281`. If this site stopped being a pure existence/delete probe or began suppressing broader `OSError`/integrity failures, this suppression would no longer apply.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T12:21:59.644520+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.9
  judge_rationale: |-
    PRESCRIBED FORM. The function is an existence probe whose documented return value distinguishes present vs absent; catching FileNotFoundError to return False is meaning-preserving translation of a filesystem absence into the boolean the function's contract promises, not silent error suppression. Only FileNotFoundError is caught — every other OSError propagates naturally, and the Tier-1 integrity check (symlink detection) still raises ValueError. This is the correct pattern for an `exists`-style helper and matches R6's remediation requirement (explicit result for the specific handled case).
  judge_signature_version: 2
