  owner: john
  reason: |-
    This is a legitimate optional local-state cleanup, not a Tier-1 audit-data read that should crash. In `core/blobs_inline.py:88-100`, `_validate_blob_content_refs` builds a per-call scratch map of recoverable lookup failures: `not_ready_by_blob_id: dict[UUID, str] = {}`; it records only blobs that raised `BlobStateError` at `core/blobs_inline.py:95-97` with `not_ready_by_blob_id[ref.blob_id] = str(exc)`. When a later lookup for the same blob succeeds and belongs to the current session, `core/blobs_inline.py:100` intentionally clears any prior marker with `not_ready_by_blob_id.pop(ref.blob_id, None)` before storing the ready record at `core/blobs_inline.py:101`. The missing-key case is expected when the successful lookup is the first successful/only occurrence for that blob, so crashing would incorrectly turn normal validation flow into an invariant failure. Future drift that changes this from clearing the function-local `not_ready_by_blob_id` accumulator after a successful `blob_service.get_blob(ref.blob_id)` should invalidate this suppression.
