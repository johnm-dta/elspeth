  judge_confidence: 0.8
  judge_rationale: |-
    PRESCRIBED FORM (offensive isinstance→raise). The R5 pattern fires but the code is the encouraged form: line 155's `not isinstance` drives an immediate `raise TypeError` at line 156 with a maximally-informative message — it does not branch-and-continue, suppress, or coerce a default. Per Plugin Ownership a wrong-typed `draft` is a crash, and Python annotations are not runtime-enforced, so making that crash informative is legitimate offensive programming, not defensive re-checking. The rationale's load-bearing claim is verifiable in the excerpt: the guard (155–156) runs BEFORE the fenced write transaction opens at line 159, so a malformed draft fails cleanly without acquiring the ADR-030 leader epoch or touching shared checkpoint DB state — aligning with the crash-site doctrine (termination mandatory, site flexible; an in-transaction crash at `draft.run_id` line 162 would be strictly worse). The rationale is site-specific (duplicate_count 0), cites the termination path, and stands alone for a future auditor.
