  judge_rationale: |-
    This is a legitimate use of broad BaseException catching in a thread-pool worker: the worker runs on a separate thread and must relay all failure modes (including non-Exception BaseException subclasses like SystemExit) back to the calling thread via the result queue, otherwise the caller would block on queue.get until timeout with no diagnostic. The caller re-raises the exception with proper chaining (raise NetworkError(...) from err), so nothing is actually swallowed — the exception is transported across a thread boundary, which is a recognized pattern. The rationale is site-specific and accurately describes the cross-thread error-propagation invariant. The decorator nudge does not apply (R4 is not in the R1/R5 suppressible set, and this is not a Tier-3 external-data boundary).
