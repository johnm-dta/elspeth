- key: core/checkpoint/manager.py:R5:CheckpointManager:create_checkpoint:fp=d02d50150844a802
  owner: john
  reason: |-
    core/checkpoint/manager.py:155 — `if not isinstance(draft, CheckpointDraft):` — is a fail-fast guard, not a defensive branch-and-continue: line 156 immediately `raise TypeError(f'draft must be CheckpointDraft, got {type(draft).__name__}')`, terminating execution on a caller/API contract violation. Python type annotations are not runtime-enforced, so a mistyped `draft` reaching this repository entry point is a real (if unlikely) possibility, not a proven impossibility. The guard runs BEFORE the fenced write transaction opens at core/checkpoint/manager.py:159 (`with self._fenced_or_plain_write(coordination_token=coordination_token, verb='create_checkpoint')`), so a malformed draft fails with a clear, early, structured error without acquiring the ADR-030 leader-fencing epoch or touching shared checkpoint DB state. Per the doctrine's crash-site refinement (a direct crash at the fault site can be irresponsible when it locks/corrupts shared state), this pre-transaction guard is the responsible termination point; removing it (codex's suggestion) would defer the crash to `draft.run_id` at line 162 INSIDE the transaction context — strictly worse. Termination path: core/checkpoint/manager.py:156 (`raise TypeError`). This is not R5 defensive type-probing that proceeds as normal; the isinstance drives an immediate raise. NOTE: codex read the file only through a Wardline dossier (its report cites bwrap loopback failure and cancelled Loomweave reads) and never saw the raise. Invalidated if the guard is changed to branch-and-continue or coerce a default instead of raising, or if `draft` becomes validated at a typed boundary upstream such that this pre-transaction guard is provably unreachable.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
