- key: core/payload_store.py:R6:FilesystemPayloadStore:delete:fp=5e6dea501dc28457
  owner: architecture
  reason: |-
    Idempotent delete — FileNotFoundError means content already deleted (retention purge or duplicate call)
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-28'
