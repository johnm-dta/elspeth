  judge_confidence: 0.78
  judge_rationale: |-
    PRESCRIBED FORM. The wrapped block is an offensive check (raise ValueError on NaN/Inf in numeric arrays) and the narrow `except TypeError: pass` is EAFP type-dispatch for numpy's behaviour on non-numeric dtypes — np.isnan/isinf raise TypeError on string/object arrays, which definitionally cannot contain NaN/Inf so there is nothing to reject. No value is coerced, defaulted, or fabricated; the function falls through to element-wise normalization in both branches, and a real non-finite numeric value still raises. The except is scoped tightly to TypeError so other failures still surface, and the in-source comment at lines 99-100 documents the intent. A cleaner LBYL via `np.issubdtype(obj.dtype, np.number)` exists, but that is a style refinement, not a policy violation — R6 targets silent suppression of real errors, and the swallowed signal here is dispatch, not data corruption.
