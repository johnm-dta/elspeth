    RULE MISFIRES. The rule's premise — that `dict.pop(key, default)` hides a missing-key bug — is false here because the dict is a function-local accumulator where absence is the normal case, not an invariant. `not_ready_by_blob_id` is populated only when a `BlobStateError` was raised earlier in the loop; when a subsequent successful lookup arrives (which for most refs is the first and only outcome), there is legitimately no prior marker to clear. The `pop(..., None)` is idempotent 'clear if present' semantics, not a swallow of unexpected missing data. Crashing on KeyError here would encode 'every successful lookup must have first failed', which is not the intended invariant.
