  safety: Crashes immediately with clear error identifying the buggy sink plugin
  expires: null
- key: engine/executors/sink.py:R5:SinkExecutor:write:fp=6bf4f058589b3c6f
  owner: bugfix
  pattern: plugin-contract-offensive-guard
  reason: "Offensive isinstance \u2014 validates failsink.write() returns SinkWriteResult, crashing with\
