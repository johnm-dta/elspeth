- key: engine/executors/sink.py:R5:SinkExecutor:write:fp=8ae24dda2209d609
  owner: john
  reason: |-
    In SinkExecutor.write (line 540), `if not isinstance(write_result, SinkWriteResult)` guards `write_result = sink.write(rows, ctx)` — the return value of a PLUGIN method dispatched through the BaseSink plugin protocol (the concrete sink is any registered plugin, third-party included). The decisive fact the rule needs: Python does NOT enforce the `-> SinkWriteResult` return annotation at runtime, so a misbehaving or third-party sink can return ANY object; SinkWriteResult being a dataclass does not make the value at THIS call site a guaranteed instance — the annotation is a contract the plugin must honor, not a runtime guarantee. This isinstance is therefore the SOLE runtime enforcement point of the plugin-return contract at the boundary, NOT a redundant re-check of a type our own code constructs. On mismatch it raises a typed PluginContractViolation naming the sink and the actual type (this is a sink plugin bug), strictly more attributable than the bare AttributeError that direct attribute access (write_result.artifact) would produce on a non-instance, and it fails fast before any partial write-state is acted on. This is the CLAUDE.md-sanctioned plugin-returns-wrong-type to CRASH offensive guard; the R5 defensive-isinstance concern does not apply.
