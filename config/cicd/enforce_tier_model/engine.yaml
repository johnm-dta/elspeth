- key: engine/executors/declaration_dispatch.py:R6:_dispatch:fp=15d9ff75661bacf0
  owner: architecture
  reason: |-
    ADR-010 §Semantics amendment (2026-04-20, comment #417 on H2) — the audit-complete dispatcher MUST catch DeclarationContractViolation, attach the authoritative contract_name via C4 closure, and continue iterating so every applicable contract's method runs. This is not silent swallowing: the collected violations are raised as the original (N=1 reference equality) or as AggregateDeclarationContractViolation (N>=2) at loop end. Catch-and-collect IS the audit-complete invariant.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-28'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-05-30T04:23:53.283011+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:ee8359775f8cd9b8849912ecc4155fa4df8f2d86fabad8289b5acf1e795c87b6'
  judge_confidence: 0.86
  judge_rationale: |-
    The except clause catches a specific typed exception (DeclarationContractViolation), enriches it with the authoritative contract_name, and appends to a violations list that is then re-raised at loop end — either as the original instance (N=1, reference-equality preserved) or as an AggregateDeclarationContractViolation (N>=2). This is not silent swallowing: every violation surfaces, and the post-condition documented in the docstring (audit-complete: every applicable contract runs exactly once) is the legitimate offensive-programming pattern. R6 (broad/silent exception handling) is misapplied here because the catch is narrow, the exceptions are reraised, and the collect-then-raise idiom is required by the audit-complete invariant. Decorator nudge does not apply: no external parameter, R6 not in {R1,R5}.
  judge_signature_version: 2
  scope_fingerprint: d644b5df224da3348dfcc439b194177bf5169acf2b73324a2365e8b7f25ae81f
