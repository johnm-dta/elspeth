- key: engine/executors/state_guard.py:R5:NodeStateGuard:_extract_audit_evidence_context:fp=86d1554e15f3f1f6
  owner: john
  reason: |-
    ADR-010 Decision-1 nominal dispatch check: a class must explicitly inherit AuditEvidenceBase to contribute structured audit context, a deliberate nominal (not structural-Protocol) design chosen to prevent accidental-match spoofing. A non-AuditEvidenceBase exception has no structured evidence to contribute; returning (None, None) is honest absence, not a swallowed error. The raw exception is still fully recorded as ExecutionError(exception=str(exc_val), ...) and the FAILED node_state is durably persisted before __exit__ returns. This line is distinct from the inner Mapping guard (fp=81df) and broad-except (fp=d9eb) entries already signed for this method.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-29'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-05-31T16:20:22.213829+00:00'
