- key: engine/orchestrator/heartbeat.py:R7:RunHeartbeatThread:_emit_degraded:fp=c2dddee2bcc6399b
  owner: john
  reason: |-
    contextlib.suppress is the ONLY guard preventing degraded-telemetry emission from raising and crashing the heartbeat thread. A heartbeat that dies on a telemetry hiccup is a liveness regression. Correct must-not-raise discipline.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-09-15'
