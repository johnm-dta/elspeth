    RULE MISFIRES — the rationale establishes that SourceRow.row is typed `Any` precisely because quarantined source payloads from external data may be non-dicts (Tier-3 origin), so the isinstance check here is the boundary-shape discriminator that decides whether to pass the mapping through or wrap a non-mapping malformed payload as `{'_raw': ...}` before handing it to `begin_node_state(input_data=...)`. This is the prescribed Tier-3 quarantine normalization, not a redundant guard on first-party contracted data: the shape is explicitly NOT guaranteed at this point. The surrounding code (sanitize_for_canonical, quarantine token, FAILED node_state) confirms this is the source-validation-failure lifecycle, and the isinstance result is used to preserve absence/origin honestly rather than fabricate a dict.
