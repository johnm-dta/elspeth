- key: engine/barrier_coordination.py:R1:BarrierRecoveryCoordinator:_derive_restored_batch_id:fp=105052e0a03ed6b7
  owner: john
  reason: |-
    This is a sparse internal remap lookup where absence is the intended identity case, not defensive masking of corrupt Tier-1 audit data. The enclosing function documents that BUFFERED token_outcomes carry original batch ids and must be "read through the ``handle_incomplete_batches`` old->retry remap" when a crash interrupted flush. The flagged line (`src/elspeth/engine/barrier_coordination.py:1119`), `resolved = restore.batch_id_remap.get(outcome.batch_id, outcome.batch_id)`, is the prescribed old->retry-or-original resolution: if `outcome.batch_id` was retried, use the remapped batch id; if it was not retried, keep the original batch id. The code does not silently trust the result: it immediately enforces audit invariants by requiring one resolved batch for the node and then crashes if the resolved batch row is missing or belongs to another aggregation node (the `get_batch` / `aggregation_node_id` checks at the end of `_derive_restored_batch_id`). A future drift that made `batch_id_remap` exhaustive, removed the fallback-valid DRAFT/original-batch case, or stopped the subsequent `get_batch` / `aggregation_node_id` checks would invalidate this suppression.
  safety: |-
    Pending cicd-judge re-justification: the barrier-subsystem extraction
    (elspeth-e76a186916) moved this function unchanged from
    RowProcessor to BarrierRecoveryCoordinator, so the prior ACCEPTED verdict
    (which binds to the exact code and location the judge inspected) could not
    be carried. The rationale above was re-verified against the current code
    at this site.
  expires: '2026-08-31'
- key: engine/barrier_coordination.py:R9:BarrierIntakeCoordinator:_token_for_intake:fp=a8d023df453d03df
  owner: john
  reason: |-
    Prescribed state-machine fallback, not a hidden missing-key defect. `_token_for_intake()` (`src/elspeth/engine/barrier_coordination.py:252`) documents that barrier intake intentionally checks the live in-memory stash first, then rehydrates from the journal: "Live stash first" and "Without a live stash, the durable row is still authoritative". The flagged line (`src/elspeth/engine/barrier_coordination.py:268`) uses `hold = self._live_barrier_holds.pop(row.token_id, None)` to distinguish those two valid paths. The default sentinel is consumed by control flow immediately below: a hit returns the stashed token; a miss branches on `self._resume_checkpoint_id` between fresh-leader journal rehydration at offset zero (normal follower handoffs) and resume-leader rehydration with the audit-derived attempt offset stamped with checkpoint provenance — the same semantics as the restore path.
  safety: |-
    Pending cicd-judge re-justification: the barrier-subsystem extraction
    (elspeth-e76a186916) moved this function unchanged from
    RowProcessor to BarrierIntakeCoordinator, so the prior ACCEPTED verdict
    (which binds to the exact code and location the judge inspected) could not
    be carried. The rationale above was re-verified against the current code
    at this site.
  expires: '2026-08-31'
- key: engine/barrier_coordination.py:R1:BarrierIntakeCoordinator:_token_for_intake:fp=02812265c47b140f
  owner: john
  reason: |-
    ACCEPT because `src/elspeth/engine/barrier_coordination.py:271-278` is not masking a required key in an in-memory Tier-1 object; it is consuming an intentionally sparse aggregate query result whose API defines absence as "no prior node_states rows". The enclosing `_token_for_intake` resume arm derives the resume attempt offset from audit state with `max_attempts = self._execution.get_max_node_state_attempts(self._run_id, [row.token_id])` and `attempt_offset=max_attempts.get(row.token_id, -1) + 1`. The callee's contract at `src/elspeth/core/landscape/execution_repository.py:630-634` says: "Tokens with no node_states rows are absent from the result (callers treat absence as max_attempt = -1, i.e. offset 0)." This suppression is bound to that exact sparse-result contract; if the repository later guarantees one entry per requested token or changes absence semantics, this `.get(row.token_id, -1)` justification no longer applies and the site must be re-reviewed.
  safety: |-
    Pending cicd-judge re-justification: the barrier-subsystem extraction
    (elspeth-e76a186916) moved this function unchanged from
    RowProcessor to BarrierIntakeCoordinator, so the prior ACCEPTED verdict
    (which binds to the exact code and location the judge inspected) could not
