  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.88
  judge_rationale: |-
    PRESCRIBED FORM. The `isinstance(exc, Exception)` check at line 118 is not a Tier-1/Tier-2 shape guard on data; it is the standard `except BaseException` boundary discipline: after calling `reraise_if_engine_crash_through(exc)` for engine-owned crash-through types, the code re-raises any remaining non-`Exception` BaseException (KeyboardInterrupt, SystemExit, etc.) untouched rather than wrapping them as a gate failure. Only ordinary `Exception` subclasses — genuine operational failures from user-authored gate expression evaluation — are wrapped as `CommencementGateFailedError`. This is the correct routing structure the policy prescribes: the type discriminator ensures system-level signals bubble while recoverable expression errors are peeled into the gate-failure type. R5's concern (masking contract violations) does not apply — this isinstance discriminates exception categories at an evaluation trust boundary, not row/plugin data shape.
