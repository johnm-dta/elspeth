    TIER_1_ERRORS) to bypass the cleanup-warning downgrade and propagate
    FrameworkBugError/AuditIntegrityError immediately. Relocated from the core.py
    R5 pattern when _cleanup_plugins was extracted to its own module.
  expires: null
