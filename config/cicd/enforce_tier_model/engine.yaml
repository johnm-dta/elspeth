- key: engine/executors/sink.py:R5:SinkExecutor:write:fp=333193edcab82132
  owner: bugfix
  pattern: plugin-contract-offensive-guard
  reason: "Offensive isinstance \u2014 validates plugin return type to crash with PluginContractViolation\
