- key: engine/orchestrator/cleanup.py:R4:cleanup_plugins:run_hook:fp=3f14e10c45af58b3
  owner: architecture
  reason: |-
    Plugin cleanup MUST attempt every hook even when individual hooks fail — the broad catch is required by contract (close()/on_complete() are best-effort by lifecycle design). The nested run_hook helper collapses what was previously 6 separate try/except blocks into one. record_cleanup_error() re-raises Tier-1 errors (FrameworkBugError, AuditIntegrityError) before downgrading anything to a cleanup warning. Non-Tier-1 failures are appended to cleanup_errors and folded into a single RuntimeError chained from the pending exception (if any) after every hook has been attempted.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-28'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-05-30T04:24:47.103912+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:ee8359775f8cd9b8849912ecc4155fa4df8f2d86fabad8289b5acf1e795c87b6'
  judge_confidence: 0.85
  judge_rationale: |-
    Plugin cleanup is a legitimate use case for broad exception handling: best-effort lifecycle hooks must all be attempted even if individual ones fail. The code correctly re-raises Tier-1 errors (FrameworkBugError, AuditIntegrityError) via record_cleanup_error before collecting non-Tier-1 failures into a RuntimeError chained from the pending exception. This is offensive programming applied correctly — failures are surfaced via aggregated RuntimeError, not silently swallowed, and the audit-critical Tier-1 errors propagate immediately. The rule R4 (broad catch) is structurally required here by the lifecycle contract, and the single collapsed catch site is the minimal suppression surface.
  judge_signature_version: 2
