- key: engine/orchestrator/source_iteration.py:R4:SourceIterationDriver:_next_source_item_with_idle_timeout_flushes:poll_idle_flushes_guarded:fp=3dacb3d6b437e8fa
  owner: john
  reason: |-
    This is a prescribed cross-thread exception propagation pattern, not suppression. In `src/elspeth/engine/orchestrator/source_iteration.py:450-456`, the helper-thread wrapper catches `BaseException` only because an uncaught exception in `threading.Thread(target=poll_idle_flushes_guarded, daemon=True)` would not be raised on the orchestrator thread. The caught exception is preserved exactly with `error_queue.put_nowait(exc)` and the polling loop is stopped via `stop_idle_polling.set()`. The enclosing caller then joins the poller, reads the queue, and re-raises the same object at `src/elspeth/engine/orchestrator/source_iteration.py:475-480`: `if idle_error is not None: raise idle_error`. Drift that removes the `error_queue.put_nowait(exc)` handoff or the later `raise idle_error` would invalidate this suppression.
