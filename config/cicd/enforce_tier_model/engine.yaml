- key: engine/commencement.py:R5:evaluate_commencement_gates:fp=18ca009ccd49b5e0
  owner: architecture
  reason: |-
    Offensive isinstance check — gate results must be bool before recording in audit trail. Non-boolean results from expression evaluation are a config bug, not data to coerce.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-28'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-05-30T04:23:45.721939+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:ee8359775f8cd9b8849912ecc4155fa4df8f2d86fabad8289b5acf1e795c87b6'
  judge_confidence: 0.9
  judge_rationale: |-
    This is a textbook offensive isinstance check: the code detects an invalid state (gate expression returned a non-bool) and raises a meaningful CommencementGateFailedError with full context, rather than coercing via bool(result) or silently accepting truthy values. The check enforces an invariant before recording to the audit trail, which aligns with the auditability standard — non-bool results indicate a config/expression bug that must surface explicitly. R5's defensive-shape-guard concern doesn't apply here because the isinstance is used to assert-and-raise, not to branch into a silent recovery path.
  judge_signature_version: 2
