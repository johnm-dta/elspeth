- key: engine/orchestrator/source_iteration.py:R5:SourceIterationDriver:handle_quarantine_row:fp=17fb14baaba5c6cb
  owner: john
  reason: |-
    This is a prescribed Tier-3/source-ingestion quarantine normalization, not defensive handling of Tier-1 audit data. In `src/elspeth/engine/orchestrator/source_iteration.py:97-124`, `handle_quarantine_row` is explicitly the quarantine workflow for a source row that failed validation. Immediately before the finding, the code treats the payload as source-originated invalid data and normalizes it for audit persistence: `source_item = replace(source_item, row=sanitize_for_canonical(source_item.row))` at `src/elspeth/engine/orchestrator/source_iteration.py:166`. The flagged line then preserves mapping-shaped rows and wraps non-mapping malformed source payloads for `begin_node_state(input_data=...)`: `quarantine_data = source_item.row if isinstance(source_item.row, dict) else {"_raw": source_item.row}` at `src/elspeth/engine/orchestrator/source_iteration.py:186`.
    
    The drift-sensitive reason this suppression is valid is that `SourceRow` explicitly declares quarantined source payloads as external malformed data that may be non-dicts: `row: Any` because "quarantined rows from external data may not be dicts" at `src/elspeth/contracts/results.py:694-697`, and `SourceRow.quarantined(..., row: Any, ...)` documents `row` as "The original row data (before validation). May be non-dict for malformed external data" at `src/elspeth/contracts/results.py:752-765`. If this site stops handling `SourceRow.quarantined` payloads before `begin_node_state`, or if `SourceRow.row` becomes validated Tier-1/Tier-2 data only, this justification no longer applies.
