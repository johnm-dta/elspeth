- key: engine/dependency_resolver.py:R5:_load_depends_on:fp=f936e7a8efffb70d
  owner: architecture
  reason: 'Tier 3 boundary: raw operator-authored YAML for cycle detection must be a mapping before key
    access proceeds.'
  safety: Raises ValueError with file path and observed top-level type on malformed input; no coercion
  expires: null
- key: engine/dependency_resolver.py:R1:_load_depends_on:fp=0ecc84f5b6b35d41
  owner: architecture
  reason: 'Tier 3 boundary: depends_on is optional in operator-authored YAML, so .get() preserves the
    explicit no-dependencies default for cycle detection.'
