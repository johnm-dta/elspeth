    Plugin cleanup is a legitimate use case for broad exception handling: best-effort lifecycle hooks must all be attempted even if individual ones fail. The code correctly re-raises Tier-1 errors (FrameworkBugError, AuditIntegrityError) via record_cleanup_error before collecting non-Tier-1 failures into a RuntimeError chained from the pending exception. This is offensive programming applied correctly — failures are surfaced via aggregated RuntimeError, not silently swallowed, and the audit-critical Tier-1 errors propagate immediately. The rule R4 (broad catch) is structurally required here by the lifecycle contract, and the single collapsed catch site is the minimal suppression surface.
