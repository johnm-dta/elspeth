allow_hits:
- key: engine/dependency_resolver.py:R1:_load_depends_on:fp=0ecc84f5b6b35d41
  owner: architecture
  reason: 'Tier 3 boundary: depends_on is optional in operator-authored YAML, so .get() preserves the
    explicit no-dependencies default for cycle detection.'
  safety: Missing depends_on yields []; malformed present values are still validated immediately by subsequent
    type checks
  expires: null
- key: engine/coalesce_executor.py:R5:CoalesceExecutor:_execute_merge:fp=4a8461c859544771
  owner: architecture
  reason: "AuditIntegrityError check prevents writing FAILED records to a compromised database \u2014\
    \ leaving node states as pending is more honest than corrupting further"
  safety: Re-raises immediately; no writes to the untrustworthy database
  expires: null
- key: engine/executors/sink.py:R4:SinkExecutor:_best_effort_cleanup:fp=1b066df6010227f2
  owner: architecture
  reason: "Best-effort cleanup of OPEN node_states before system error crash \u2014 broad catch prevents\
    \ cleanup failure from masking original FrameworkBugError/AuditIntegrityError"
  safety: Logs warning with cleanup exception details; always re-raises the original system error
  expires: null
- key: engine/executors/sink.py:R4:SinkExecutor:write:fp=7484e4d5a8bb7618
  owner: architecture
  reason: Cleanup of OPEN pre-phase states after begin_node_state failure must not mask original error
  safety: Logs warning with cleanup exception details; always re-raises the original error
  expires: null
- key: engine/executors/sink.py:R5:SinkExecutor:write:fp=8ae24dda2209d609
