  safety: Crashes immediately with PluginContractViolation naming the failsink and observed artifact type;
    no silent coercion
  expires: null
- key: engine/commencement.py:R5:evaluate_commencement_gates:fp=18ca009ccd49b5e0
  owner: architecture
  reason: "Offensive isinstance check \u2014 gate results must be bool before recording in audit trail.\
    \ Non-boolean results from expression evaluation are a config bug, not data to coerce."
  safety: Crashes with CommencementGateFailedError explaining the type mismatch; no coercion
  expires: null
- key: engine/executors/state_guard.py:R5:NodeStateGuard:_extract_audit_evidence_context:fp=86d1554e15f3f1f6
  owner: architecture
  reason: 'ADR-010 Decision 1 nominal isinstance check -- discriminates AuditEvidenceBase subclasses so
    NodeStateGuard can populate ExecutionError.context from to_audit_dict(). Nominal inheritance (not
    structural Protocol) is deliberate: see ADR-010 Alternative 3 for the accidental-match spoofing rationale.
    The exception always propagates; only structured audit context is conditionally added.'
  safety: The isinstance predicate only controls whether context is captured; the exception always propagates
    and the state is always completed as FAILED. Missing context is a degradation (less audit detail),
    not a correctness bug.
  expires: null
- key: engine/executors/state_guard.py:R5:NodeStateGuard:_extract_audit_evidence_context:fp=81df711769fff87f
  owner: architecture
  reason: Audit evidence is contractually required to serialize to a mapping before canonical_json() can
    validate it for ExecutionError.context.
  safety: Non-mapping evidence raises TypeError, which is converted into evidence_failure and re-raised
    as AuditIntegrityError only after the FAILED state is durably persisted.
  expires: null
- key: engine/executors/state_guard.py:R4:NodeStateGuard:_extract_audit_evidence_context:fp=d9eb19b04d13628e
  owner: architecture
  reason: Broad catch is deliberate so broken audit-evidence serialization cannot strand node_states OPEN
    while auto-fail is recording terminal failure.
  safety: Caught exceptions are not swallowed; they are returned as evidence_failure and re-raised as
    AuditIntegrityError after terminal FAILED persistence completes.
  expires: null
- key: engine/executors/declaration_dispatch.py:R6:_dispatch:fp=15d9ff75661bacf0
  owner: architecture
  reason: "ADR-010 \xA7Semantics amendment (2026-04-20, comment #417 on H2) \u2014 the audit-complete\
    \ dispatcher MUST catch DeclarationContractViolation, attach the authoritative contract_name via C4\
    \ closure, and continue iterating so every applicable contract's method runs. This is not silent swallowing:\
    \ the collected violations are raised as the original (N=1 reference equality) or as AggregateDeclarationContractViolation\
    \ (N>=2) at loop end. Catch-and-collect IS the audit-complete invariant."
  safety: "Every caught violation is either re-raised via the N=1 reference-equality fast path OR wrapped\
    \ in AggregateDeclarationContractViolation and raised from the dispatcher boundary. No silent drops.\
    \ See N3 \xA7Acceptance + comment"
  expires: null
  expires: null
- key: engine/_best_effort.py:R4:best_effort:fp=c48026df1d344433
  owner: architecture
  reason: "best_effort() is the canonical post-audit ceremony helper for the engine
    layer. Its single broad-except is the entire reason this helper exists \u2014 it
    collapses 14 previously-scattered ``try/except Exception:`` blocks across
    processor.py and orchestrator/core.py into one reviewable surface. Per the
    helper's docstring, it MUST run after the primary audit-load-bearing event has
    been recorded; failures of the ceremony body are logged but never replace the
    in-flight event. CLAUDE.md logging-telemetry-policy: logger is the recovery
    path of last resort when telemetry/ceremony itself is the failing system."
  safety: "Failures are logged with structured context (operation label + caller-
    supplied kwargs) and exception class at warning level; reserved log fields
    override caller context so duplicate keyword failures cannot mask the ceremony
    failure. Raw exception strings are deliberately not logged. The in-flight
    exception (if any) continues to propagate unchanged. Burndown: filigree
    elspeth-550362f760 (closed), elspeth-17fbac339f."
  expires: null
- key: engine/_best_effort.py:R7:best_effort:fp=437c71e49d86fee5
  owner: architecture
  reason: "best_effort() is already the logger-of-last-resort boundary for post-audit
    ceremony. If the logger backend or structlog processor itself fails while
    reporting a ceremony failure, that secondary logger failure must not replace
    the original audit-load-bearing event."
  safety: "The suppress wraps only the _slog.warning call after the ceremony
    exception has already been caught and normalized to structured fields. It does
    not hide primary pipeline work, does not log raw exception text, and is covered
    by tests/unit/engine/test_best_effort.py::test_best_effort_suppresses_logger_failures."
  expires: null
- key: engine/orchestrator/cleanup.py:R4:cleanup_plugins:run_hook:fp=3f14e10c45af58b3
  owner: architecture
  reason: "Plugin cleanup MUST attempt every hook even when individual hooks fail \u2014
    the broad catch is required by contract (close()/on_complete() are best-effort
    by lifecycle design). The nested run_hook helper collapses what was previously
    6 separate try/except blocks into one. record_cleanup_error() re-raises Tier-1
    errors (FrameworkBugError, AuditIntegrityError) before downgrading anything to
    a cleanup warning. Non-Tier-1 failures are appended to cleanup_errors and
    folded into a single RuntimeError chained from the pending exception (if any)
    after every hook has been attempted."
  safety: "Tier-1 errors (TIER_1_ERRORS tuple) bypass the catch entirely and
    propagate. Other exceptions are collected and surface as RuntimeError after
    all hooks attempted, with cause chained to the pending exception so the audit
    trail preserves both. No silent drops. Burndown: filigree elspeth-550362f760
    (closed)."
  expires: null
- key: engine/orchestrator/core.py:R6:Orchestrator:_handle_quarantine_row:fp=49d051713c4a7398
  owner: bugfix
  pattern: audit-record-fallback
  reason: "Tier-3 quarantine boundary \u2014 quarantined row data may contain NaN/Infinity
    rejected by stable_hash. Coercion at the source/quarantine boundary is the one
    Tier-3 location where canonical hashing must accept non-canonical floats. The
    catch is narrow (ValueError, TypeError) and the fallback (repr_hash) is itself
    deterministic on the row contents \u2014 the audit trail records which hashing path
    was used, so an auditor can always tell whether stable_hash or repr_hash produced
    the recorded value."
  safety: "Narrow catch on (ValueError, TypeError) only \u2014 anything else propagates.
    repr_hash is deterministic and recorded as the fallback path; the quarantine
    audit row carries which hash path produced the value."
  expires: null
