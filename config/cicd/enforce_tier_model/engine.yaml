- key: engine/processor.py:R4:RowProcessor:_record_source_boundary_failure:fp=83b8970724893970
  owner: architecture
  reason: Best-effort TokenCompleted telemetry after source-boundary audit completion must not mask the
    original Tier-1 source-boundary failure
  safety: Telemetry runs only after both FAILED audit writes succeed; failures are logged and the original
    failure continues to propagate
  expires: '2026-07-10'
- key: engine/processor.py:R4:RowProcessor:_record_flush_violation:fp=fa466d76f5232435
  owner: architecture
  reason: Best-effort TokenCompleted telemetry after batch-flush FAILED audit completion must not mask
    the original batch-flush violation
  safety: Telemetry runs only after the FAILED outcome is recorded for that token; failures are logged
    and the original violation continues to propagate
  expires: '2026-07-10'
- key: engine/processor.py:R4:RowProcessor:_handle_flush_error:fp=71d8fabe1b48000a
  owner: architecture
  reason: "Best-effort TokenCompleted telemetry after batch-flush FAILED audit completion in _handle_flush_error\
    \ \u2014 same pattern as the sibling _record_flush_violation entry; telemetry runs only after the\
    \ FAILED recorder write succeeds, and its failure must not strand buffered tokens or mask the original\
    \ flush error."
  safety: Telemetry runs only after the per-token FAILED outcome is durably recorded; failures are logged
    with structured context and the original batch flush error continues to propagate via RowResult(outcome=FAILED,
    error=failure)
  expires: '2026-07-10'
- key: engine/processor.py:R4:RowProcessor:_route_empty_emission_results:fp=e70811d518b4d79a
  owner: architecture
  reason: Best-effort TokenCompleted telemetry after zero-row batch flush must not strand buffered tokens
    without terminal dropped outcomes
  safety: Telemetry runs only after DROPPED_BY_FILTER is recorded for that token; failures are logged
    and processing continues to terminalize the remaining buffered tokens
  expires: '2026-07-10'
