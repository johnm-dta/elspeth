    `src/elspeth/engine/orchestrator/export.py:99-106` is not suppressing a defensive-programming defect; it is the iterator EOF path for the spool reader. `_CsvRecordTypeSpool.iter_records` rewinds its own temporary CSV spool, then repeatedly reads the next record-size row: `size_row = next(reader)`. At top-level record boundary, `except StopIteration: return` is the prescribed iterator termination behavior, including the valid empty-spool case. The corruption case is handled separately and fail-closed: once a size row has been read, premature EOF inside that record is reified as `ValueError("CSV export spool is corrupt: record ended early") from exc` at lines 111-115, so truncated Tier-1 spool data does crash rather than being silently accepted.
