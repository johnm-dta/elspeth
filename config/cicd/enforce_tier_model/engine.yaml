- key: engine/orchestrator/follower.py:R4:FollowerProcessor:_best_effort_depart:fp=01d63348996b1aed
  owner: john
  reason: |-
    SITE: src/elspeth/engine/orchestrator/follower.py:399-411, _best_effort_depart (R4). This is best-effort terminal teardown hygiene, not a defensive guard over a load-bearing tier-1 read. depart_worker is a courtesy WRITE attempted only as a worker process exits; its result feeds no downstream computation. All five call sites are exit paths (follower.py:250/254 eviction, 262 SIGINT, 269 seat-death, 276 clean terminal exit), and in four of them a primary exception is already propagating — crashing here would abort during teardown and mask the real cause. heartbeat.stop() runs in the enclosing finally (line 278). Suppression is faithfully recovered: the documented idempotent path inside depart_worker (member-None early return at run_coordination_repository.py:847, failed-CAS no-op at 857) does NOT raise, so the except catches only genuine write failures (DB-locked, IO). When such a write fails and is swallowed, the row stays 'active', the stopped heartbeat lets heartbeat_expires_at lapse, and the leader's §C.2 housekeeping sweep — evict_worker at run_coordination_repository.py:868-927, invoked at processor.py:3718 — CAS-flips active->evicted gated on heartbeat_expires_at < now - grace (lines 911-912), after first refusing to evict any worker still holding a live lease (894-905). The membership table converges either way (clean worker_depart event, or a downgraded worker_evict event), never to a row that lingers 'active' forever. This is the prescribed best-effort idempotent teardown pattern, so the tier-1 crash-on-anomaly rule (which protects reads of durable state whose corruption must halt computation) does not apply. CAVEAT (non-blocking): the debug log at lines 408-410 attributes the swallowed exception to the idempotent finalize-already-departed race; that race is the no-op return inside depart_worker and never reaches this except. The except actually catches real write failures whose recovery is heartbeat-expiry eviction. This is a comment-accuracy nit only and does not change the disposition.
  safety: |-
