  expires: null
- key: engine/executors/sink.py:R5:SinkExecutor:write:fp=00755313e7e139d5
  owner: bugfix
  pattern: plugin-contract-offensive-guard
  reason: "Offensive isinstance \u2014 validates the artifact attached to the failsink's SinkWriteResult\
