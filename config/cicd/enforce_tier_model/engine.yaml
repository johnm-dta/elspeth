  judge_policy_hash: 'sha256:3f52726032979c1f98920606d7207e66c95b7a76e43cd59622818dddfa601ad0'
  judge_confidence: 0.82
  judge_rationale: |-
    The isinstance check here implements an explicit nominal dispatch contract: only exceptions that opt in by inheriting AuditEvidenceBase contribute structured audit context. This is not a defensive shape-guard masking a bug — exc_val is genuinely of unknown type (any exception class can propagate through __exit__), and the nominal check is the intended design per ADR-010 to prevent accidental-match spoofing that a structural Protocol would allow. The raw exception is still recorded verbatim elsewhere, so returning (None, None) is honest absence of structured evidence, not silent error swallowing. R5's concern (masking contract violations) does not apply: there is no contract that exc_val is an AuditEvidenceBase — the whole point is to discriminate.
