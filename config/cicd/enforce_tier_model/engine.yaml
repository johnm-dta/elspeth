- key: engine/orchestrator/heartbeat.py:R4:RunHeartbeatThread:_beat_once:fp=b5fa63cc983f2a28
  owner: john
  reason: |-
    SITE: src/elspeth/engine/orchestrator/heartbeat.py:256 `except Exception as exc:` in RunHeartbeatThread._beat_once, running on a daemon background thread (heartbeat.py:134) that shares zero Python state with the drain loop and communicates only via two threading.Event latches.
    
    CLASSIFICATION — availability/liveness probe boundary, NOT a Tier-1 durable-state read/repair sink. The handler reads typed attributes off a frozen CoordinationSnapshot dataclass (contracts/coordination.py:108, frozen+slots) with no fallback; it does not coerce, default, or repair any field. There is no 'continue with garbage' path a Tier-3 defensive default would create — the body (heartbeat.py:259-268) only does `_consecutive_busy += 1`, a DEBUG log, and `_emit_degraded()` past threshold k.
    
    CONTRACT-PINNED, not defensive. The breadth is mandated verbatim by two documented invariants (heartbeat.py:19-26): BUSY = liveness-unknown (a heartbeat OperationalError is logged and counted toward the degraded threshold; the thread never latches on a DB error) and Never self-terminate on DB errors (the per-tick try/except swallows all exceptions and continues; only _stop_event.set() exits).
    
    RE-RAISE IS STRICTLY WORSE. _run (heartbeat.py:185-192) has no try/except above _beat_once, and Thread(target=self._run) has no caller barrier that converts a thread death into a run failure. A re-raise therefore kills the daemon SILENTLY — the seat stops being refreshed while the main-thread drain loop runs on oblivious until leader_heartbeat_expires_at lapses and another process deposes the seat, converting an immediate diagnosable anomaly into a delayed mysterious eviction. 'Crash for provenance' is an offensive-Tier-1 tactic for SYNCHRONOUS code whose caller surfaces the error; on this daemon it produces the exact silent-dead-heartbeat failure the module was architected to prevent.
    
    THE ONE GENUINE Tier-1 CASE (AuditIntegrityError for an unregistered worker, run_coordination_repository.py:726) is not durably hidden as success: when the heartbeat stops latching/refreshing, the worker loses coordination and the drain loop's heartbeat.check_and_raise() (follower.py:339) raises RunWorkerEvictedError loudly at the next boundary, stopping the run. Absence/anomaly is faithfully surfaced — via the degraded counter (diagnostic) and the eviction latch consumed by check_and_raise (fatal) — just on the correct thread, never accepted as success.
    
    CONCLUSION: the breadth is intentional and contract-pinned for a background liveness probe; suppression is legitimate, not a defensive default over durable state.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-09-15'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-17T16:19:19.083185+00:00'
