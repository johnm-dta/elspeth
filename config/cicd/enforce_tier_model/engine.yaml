    The isinstance check here is not a Tier-3 shape guard on external data — it is exception-type dispatch in an except clause, distinguishing AuditIntegrityError (which must propagate to avoid further writes to a compromised audit DB) from other merge exceptions (which get recorded as FAILED). This is offensive programming: detect a specific invalid state (compromised audit trail) and re-raise to prevent evidence tampering, consistent with the Auditability Standard. The rationale accurately describes the invariant and ties it to the audit-integrity policy. R5's typical target (boundary shape guards) does not apply to except-branch type discrimination, and there is no cleaner idiom in Python for this dispatch short of multiple except clauses.
