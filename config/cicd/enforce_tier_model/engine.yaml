allow_hits:
- key: engine/executors/sink.py:R5:SinkExecutor:_write_primary:fp=6c270328107c1717
  owner: john
  reason: |-
    In SinkExecutor._write_primary (line 516), `if not isinstance(write_result, SinkWriteResult)` guards `write_result = sink.write(rows, ctx)` — the return value of a PLUGIN method dispatched through the BaseSink plugin protocol (the concrete sink is any registered plugin, third-party included). Python does NOT enforce the `-> SinkWriteResult` return annotation at runtime, so a misbehaving or third-party sink can return ANY object; SinkWriteResult being a dataclass does not make the value at THIS call site a guaranteed instance. This isinstance is the SOLE runtime enforcement point of the plugin-return contract at the boundary, NOT a redundant re-check of a type our own code constructs. On mismatch it raises a typed PluginContractViolation naming the sink and the actual type (a sink plugin bug), failing fast before any partial write-state is acted on. This is the CLAUDE.md-sanctioned plugin-returns-wrong-type to CRASH offensive guard; the R5 defensive-isinstance concern does not apply. Relocated verbatim from SinkExecutor.write into _write_primary by the write() decomposition (elspeth-f6a6ab0a46); unsigned pending re-judge.
  safety: |-
    Suppression gated by cicd-judge; unsigned pending re-judge after the
    elspeth-f6a6ab0a46 write() decomposition relocated this guard.
  expires: '2026-09-15'
- key: engine/executors/sink.py:R5:SinkExecutor:_write_primary:fp=7f1d563289d0660e
  owner: john
  reason: |-
    In SinkExecutor._write_primary (line 529), `if not isinstance(artifact_info, ArtifactDescriptor)` guards `write_result.artifact` and raises PluginContractViolation on mismatch. Under the system-owned sink's typed contract, SinkWriteResult.artifact must be an ArtifactDescriptor; per Plugin Ownership a wrong type is a first-party plugin bug we crash on, never coerce. The isinstance->raise is offensive programming (a maximally informative crash naming the sink and the actual type), not coercion, not silent recovery, and not a Tier-3 boundary; R5 does not apply. Relocated verbatim from SinkExecutor.write into _write_primary by the write() decomposition (elspeth-f6a6ab0a46); unsigned pending re-judge.
  safety: |-
    Suppression gated by cicd-judge; unsigned pending re-judge after the
    elspeth-f6a6ab0a46 write() decomposition relocated this guard.
  expires: '2026-09-15'
