- key: engine/orchestrator/cleanup.py:R4:cleanup_plugins:run_hook:fp=527c4066c37b2592
  owner: john
  reason: |-
    PRESCRIBED FORM — best-effort teardown: all non-Tier-1 faults (INCLUDING programming errors) are recorded and re-raised as an aggregated RuntimeError after every hook runs; nothing is swallowed. In cleanup_plugins.run_hook (engine/orchestrator/cleanup.py:93), `except Exception as exc` follows a dedicated `except contract_errors.TIER_1_ERRORS: raise` clause (lines 91-92), so FrameworkBugError / AuditIntegrityError crash IMMEDIATELY. The broad catch then records every OTHER exception via record_cleanup_error() — which appends "hook(plugin): Type: msg" to cleanup_errors and logs with exc_info — and lets the hook loop continue, because the best-effort lifecycle contract requires attempting every plugin's cleanup hook even when one fails (a transform's failed on_complete must not skip the sinks' close, which would leak resources). Critically — and unlike the hot-path sibling AuditedLLMClient._emit_telemetry_after_audit, which re-raises (TypeError, AttributeError, KeyError, NameError) IMMEDIATELY because a single telemetry emit has no multi-hook obligation — this handler deliberately does NOT re-raise programming errors on the spot; instead they too are recorded and then crash DEFERRED-AND-AGGREGATED: after all hooks finish, cleanup.py:120-121 does `if cleanup_errors: raise RuntimeError(f"Plugin cleanup failed: {error_summary}")` (chained `from pending_exc` when a pending exception exists), with each error's type, message, and exc_info preserved. So no exception is swallowed: Tier-1 corruption crashes at once, everything else (recoverable faults and programming bugs alike) crashes once the teardown obligation is discharged. The broad catch is the correct mechanism — a cleanup hook can fail in arbitrary ways and narrowing would let some failures abort the loop and leak resources. R4 flags `except Exception` generically and cannot recognise the Tier-1-first / record / aggregate-and-raise teardown pattern. Per-line allowlist is the prescribed mechanism.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
