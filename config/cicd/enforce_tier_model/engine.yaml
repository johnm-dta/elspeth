  owner: john
  reason: |-
    This is a prescribed exception-boundary guard, not Tier-1 audit-data defensiveness. In `src/elspeth/engine/commencement.py:116-120`, `evaluate_commencement_gates` catches `BaseException` around user-authored commencement gate expression evaluation, immediately calls `reraise_if_engine_crash_through(exc)`, then preserves non-`Exception` crash-through behavior with `if not isinstance(exc, Exception): raise` before wrapping ordinary operational expression failures as `CommencementGateFailedError`. The suppression is valid only for this exact boundary shape: `except BaseException as exc:` followed by `reraise_if_engine_crash_through(exc)` and the quoted non-`Exception` re-raise before `CommencementGateFailedError` wrapping. If this site stops being the commencement-gate expression evaluation boundary, or starts inspecting/normalizing engine-owned audit data, this rationale no longer applies.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T12:18:37.358255+00:00'
