- key: engine/executors/state_guard.py:R5:NodeStateGuard:_extract_audit_evidence_context:fp=86d1554e15f3f1f6
  owner: architecture
  reason: 'ADR-010 Decision 1 nominal isinstance check -- discriminates AuditEvidenceBase subclasses so
    NodeStateGuard can populate ExecutionError.context from to_audit_dict(). Nominal inheritance (not
    structural Protocol) is deliberate: see ADR-010 Alternative 3 for the accidental-match spoofing rationale.
    The exception always propagates; only structured audit context is conditionally added.'
  safety: The isinstance predicate only controls whether context is captured; the exception always propagates
    and the state is always completed as FAILED. Missing context is a degradation (less audit detail),
    not a correctness bug.
  expires: null
- key: engine/executors/state_guard.py:R5:NodeStateGuard:_extract_audit_evidence_context:fp=81df711769fff87f
  owner: architecture
  reason: Audit evidence is contractually required to serialize to a mapping before canonical_json() can
    validate it for ExecutionError.context.
  safety: Non-mapping evidence raises TypeError, which is converted into evidence_failure and re-raised
    as AuditIntegrityError only after the FAILED state is durably persisted.
  expires: null
- key: engine/executors/state_guard.py:R4:NodeStateGuard:_extract_audit_evidence_context:fp=d9eb19b04d13628e
  owner: architecture
  reason: Broad catch is deliberate so broken audit-evidence serialization cannot strand node_states OPEN
    while auto-fail is recording terminal failure.
  safety: Caught exceptions are not swallowed; they are returned as evidence_failure and re-raised as
    AuditIntegrityError after terminal FAILED persistence completes.
  expires: null
- key: engine/executors/declaration_dispatch.py:R6:_dispatch:fp=15d9ff75661bacf0
  owner: architecture
  reason: "ADR-010 \xA7Semantics amendment (2026-04-20, comment #417 on H2) \u2014 the audit-complete\
    \ dispatcher MUST catch DeclarationContractViolation, attach the authoritative contract_name via C4\
    \ closure, and continue iterating so every applicable contract's method runs. This is not silent swallowing:\
    \ the collected violations are raised as the original (N=1 reference equality) or as AggregateDeclarationContractViolation\
    \ (N>=2) at loop end. Catch-and-collect IS the audit-complete invariant."
  safety: "Every caught violation is either re-raised via the N=1 reference-equality fast path OR wrapped\
    \ in AggregateDeclarationContractViolation and raised from the dispatcher boundary. No silent drops.\
    \ See N3 \xA7Acceptance + comment"
  expires: null
- key: engine/executors/declaration_dispatch.py:R6:_dispatch:fp=eaaceb67467655f7
  owner: architecture
  reason: "ADR-010 \xA7Semantics amendment (2026-04-20) \u2014 catches PluginContractViolation so PassThroughContractViolation\
    \ (which inherits PluginContractViolation, not DeclarationContractViolation, per ADR-010 \xA7Consequences\
    \ line 96-97) is subject to audit-complete aggregation rather than short-circuiting the dispatcher\
    \ loop. Without this catch, a pass-through violation would shadow every later contract on the same\
    \ row \u2014 regressing the audit-complete posture. Both caught classes are registered in TIER_1_ERRORS;\
    \ the aggregate is also TIER_1_ERRORS, preserving Tier-1 propagation."
  safety: The caught PluginContractViolation is appended to violations list and raised (singleton or aggregate)
    at loop end; no silent drops. AggregateDeclarationContractViolation is a Tier-1 class, preserving
    the propagation guarantee.
  expires: null
