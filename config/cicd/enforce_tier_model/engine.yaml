  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.78
  judge_rationale: |-
    GENUINE VIOLATION. Per policy, audit (Landscape) fires first, synchronous and crash-on-failure; telemetry fires second as best-effort. The call here is `record_heartbeat_degraded` on `self._repo` — by naming and by the policy's primacy order, this is an AUDIT-channel write, not telemetry. Wrapping an audit-repo write in `contextlib.suppress(Exception)` silently swallows audit failures, which is exactly the forbidden pattern ("No inference — if it's not recorded, it didn't happen"). The rationale asserts "telemetry hiccup" and "must-not-raise discipline" but the visible code shows an audit repo call, and the rationale never reconciles that. If the heartbeat truly must not die, the fix is structural (route to a real telemetry channel, or let the outer beat loop's existing `except Exception` on line 256 catch it) — not to launder an audit write through suppress.
