- pattern: engine/processor.py
  rules:
  - R5
  reason: Protocol dispatch (TransformProtocol vs GateSettings) and union narrowing; ADR-010 H2 (2026-04-20)
    added isinstance(child, PassThroughContractViolation) in the aggregate-flush catch so PassThroughContractViolation
    (pre-DCV hierarchy, inherits PluginContractViolation) still routes through _record_flush_violation
    when wrapped in an aggregate. The source-boundary failure helper also uses nominal isinstance checks
    to distinguish audit-evidence exceptions from framework/orchestration failures without fabricating
    context.
  expires: null
