- key: engine/_best_effort.py:R4:best_effort:fp=c48026df1d344433
  owner: architecture
  reason: |-
    best_effort() is the canonical post-audit ceremony helper for the engine layer. Its single broad-except is the entire reason this helper exists — it collapses 14 previously-scattered ``try/except Exception:`` blocks across processor.py and orchestrator/core.py into one reviewable surface. Per the helper's docstring, it MUST run after the primary audit-load-bearing event has been recorded; failures of the ceremony body are logged but never replace the in-flight event. CLAUDE.md logging-telemetry-policy: logger is the recovery path of last resort when telemetry/ceremony itself is the failing system.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
