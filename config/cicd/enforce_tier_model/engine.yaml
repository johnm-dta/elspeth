  expires: '2026-08-31'
- key: engine/scheduler_drain.py:R1:SchedulerDrainCoordinator:row_result_from_pending_sink:fp=262c85bcd7de4246
  owner: john
  reason: |-
    This `.get()` is not swallowing corrupt Tier-1 audit data; it implements the called repository method's explicit sparse-result contract for resume attempt derivation. In `row_result_from_pending_sink`, the aggregate is scoped to the sink step, then the next retry offset is computed: `max_attempts = self._execution.get_max_node_state_attempts(..., step_index=self._processor.resolve_sink_step())` and `attempt_offset = max_attempts.get(scheduled.token_id, -1) + 1`. The contract being consumed is site-specific: `execution_repository.py:633-634` says `Tokens with no node_states rows are absent from the result (callers treat absence as max_attempt = -1, i.e. offset 0).` The guard immediately following still crashes if an offset above zero lacks resume checkpoint provenance, so the defensive invariant is preserved. A drift that changed `get_max_node_state_attempts` to always return every requested token, or changed no-row semantics away from offset 0, would invalidate this suppression.
  safety: |-
    Pending cicd-judge re-justification: the scheduler-drain extraction
    (elspeth-c49f33d6e4 component 3) moved this function unchanged from
    RowProcessor._row_result_from_pending_sink to
    SchedulerDrainCoordinator.row_result_from_pending_sink (the sink-step
    resolver is now reached through the drain's processor port). The prior
    entry was already unsigned pending-judge after two earlier extractions
    shifted its AST-path fingerprint; this re-key carries the same re-verified
    rationale to the new site.
  expires: '2026-08-31'
- key: engine/orchestrator/source_iteration.py:R6:SourceIterationDriver:load_source_with_events:_source_iter:fp=047cae2106785361
  owner: john
  reason: |-
    This is a prescribed iterator-boundary control-flow suppression, not a defensive-programming defect. In `src/elspeth/engine/orchestrator/source_iteration.py:661-666`, `_source_iter` converts the Python iterator protocol's empty-source signal into the source phase lifecycle completion path: `first_row = next(source_iterator)` followed by `except StopIteration:`, `self._events.emit(PhaseCompleted(...))`, and `return`. The enclosing function documents that actual source-load errors must be emitted and re-raised (`src/elspeth/engine/orchestrator/source_iteration.py:640-644`), and the surrounding outer handler does exactly that for non-exhaustion exceptions at `src/elspeth/engine/orchestrator/source_iteration.py:667-669`: `self._ceremony.emit_phase_error(...); raise`. This suppression is valid only while the caught exception is exactly `StopIteration` from the first iterator pull and the branch emits `PhaseCompleted` before returning; widening the catch or swallowing load failures would invalidate this allowance.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-09-15'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-17T16:20:16.295985+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.9
  judge_rationale: |-
    RULE MISFIRES. The R6 rule targets silent exception swallowing, but StopIteration is not an error here — it is Python's iterator-protocol signal for empty source. The except branch is not silent: it emits PhaseCompleted (the lifecycle completion event) before returning, which is the prescribed control-flow translation from iterator-protocol-empty to source-phase-complete. Genuine load errors are handled by the surrounding outer except at lines 667-669, which calls emit_phase_error and re-raises. This is the protocol-boundary form the rule's plain-language description does not cover.
