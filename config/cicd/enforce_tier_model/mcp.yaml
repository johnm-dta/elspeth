  owner: john
  reason: |-
    This `isinstance()` is a site-specific discriminator at the MCP collision-report redaction boundary, not a Tier-1 audit-data repair. In `src/elspeth/mcp/analyzers/queries.py:728-731`, `list_collisions()` reads `union_field_collision_values` from stored coalesce context where the code explicitly says legacy rows may contain raw values: `"Legacy rows may still contain raw values; those are fingerprinted before comparison or response construction."` The helper at `src/elspeth/mcp/analyzers/queries.py:610-618` only treats a value as already-redacted metadata when the whole shape matches exactly: `isinstance(value, Mapping)`, `set(value) == {"value_hash", "value_type"}`, `isinstance(value.get("value_hash"), str)`, a 64-hex `_VALUE_HASH_RE`, and `isinstance(value.get("value_type"), str)`. Otherwise, `src/elspeth/mcp/analyzers/queries.py:621-628` deliberately sends the value to `_fingerprint_collision_value(value)`, so arbitrary legacy raw user values, including dicts that happen to use `value_hash` / `value_type` keys, are not exposed and are not misread as trusted audit fingerprints. Future drift that removes the legacy-raw-value path or changes `union_field_collision_values` into a guaranteed typed DTO would invalidate this suppression; at that point malformed fingerprint metadata should be reified or allowed to crash instead of being pattern-matched.
  safety: |-
