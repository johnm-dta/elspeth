- key: mcp/server.py:R6:_prompt_for_database:fp=250dc301eb3eda7c
  owner: john
  reason: |-
    At src/elspeth/mcp/server.py line 750, `except ValueError` consumes a documented pathlib control-flow signal: `Path.relative_to()` raises ValueError by API contract when the candidate path is not relative to the search base (different mount/drive). This is EAFP handling of an expected API signal, not a masked error. The fallback assigns the absolute path string to a display-only variable used solely by `sys.stderr.write` for the interactive menu (line 752); the value returned to the caller is unchanged and the displayed path is meaning-preserving (same path, absolute form). No external Tier-3 data is coerced and no Tier-1/Tier-2 invariant is silently repaired.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-31'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-02T04:36:25.491084+00:00'
  judge_model: 'claude-opus-4-7[1m]'
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.92
  judge_rationale: |-
    RULE MISFIRES. `Path.relative_to()` raises ValueError by documented API contract when the candidate is not under the base — this is the standard Pythonic EAFP idiom for branching on that signal, not silent suppression of an unexpected error. The except branch assigns to `display`, a local string used solely for the interactive stderr menu line at 752; the returned value (line 772) is `databases[idx]`, untouched, so there is no Tier-1/Tier-2 invariant being silently repaired and no Tier-3 value being coerced. The fallback (absolute path) is meaning-preserving relative to the alternative (`./<rel>`), so even the display itself is honest. The rationale names the API contract, the variable's display-only scope, and the meaning-preservation argument — sufficient for an auditor to reconstruct the disposition.
  judge_signature_version: 2
