- key: mcp/server.py:R6:_find_audit_databases:fp=badb2efd50be18f6
  owner: john
  reason: |-
    At src/elspeth/mcp/server.py line 719, `except OSError` wraps `db_file.stat().st_mtime`, a filesystem call whose mtime is OS-owned state under no first-party ELSPETH contract (Tier 3). OSError between the `rglob` discovery and the `stat` is an expected TOCTOU/permission boundary condition (file deleted or unreadable since enumeration). The handler is not a silent drop: line 722 still appends the file with `mtime=0`, a deterministic sort-bucket sentinel that pushes it to the end of the recency ordering, so the boundary failure is recorded in the only form this helper consumes (a sort key). Blast radius is bounded to the interactive CLI database-picker menu — nothing flows into Landscape, audit rows, or pipeline data — so the auditability concerns R6 protects do not apply.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-31'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-02T04:36:06.557478+00:00'
  judge_model: 'claude-opus-4-7[1m]'
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.72
  judge_rationale: |-
    PRESCRIBED FORM. The except is at a genuine Tier-3 filesystem boundary: stat() reads OS-owned mtime, and OSError between rglob() enumeration and stat() is a real TOCTOU/permission condition, not a defensive guard against a first-party invariant. The handler is not a silent swallow — it sets mtime=0 as a deterministic sort-key sentinel and still appends the file at line 722, so the boundary failure is recorded in the only channel this helper consumes (an ordering bucket that pushes the un-statable file to the end of its priority group). R6's alternative remediations (raise / quarantine) do not fit an interactive CLI database-picker whose purpose is to show all candidates; mtime=0 is a UI-ordering sentinel, not data fabricated into audit/Landscape. Blast radius is correctly bounded to the picker menu.
