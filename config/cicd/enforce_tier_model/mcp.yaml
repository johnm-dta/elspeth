- key: mcp/server.py:R6:_find_audit_databases:fp=759699bbf39ad998
  owner: john
  reason: |-
    This is a legitimate Tier-3 filesystem discovery boundary, not a Tier-1 audit-data read. In `src/elspeth/mcp/server.py:729-787`, `_find_audit_databases` scans a caller-provided directory for possible `*.db` files and only uses `db_file.stat().st_mtime` as a best-effort sorting signal. The swallowed exception is narrowly scoped to external filesystem metadata at `src/elspeth/mcp/server.py:778-781`: `try: mtime = db_file.stat().st_mtime` / `except OSError: mtime = 0`. A file can disappear or become unreadable between `rglob("*.db")` and `stat()`; treating its mtime as unknown preserves discovery while avoiding a crash on an environmental TOCTOU condition. This suppression would stop applying if the handler opened, parsed, or trusted audit database contents here, or if the `except OSError:` wrapped more than the metadata read.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T12:30:12.093085+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.85
  judge_rationale: |-
    RULE MISFIRES / PRESCRIBED FORM at a Tier-3 filesystem boundary. The `except OSError` is tightly scoped to `db_file.stat().st_mtime`, a best-effort sort key for filesystem discovery — a classic TOCTOU race between `rglob` and `stat`. The fallback `mtime = 0` is not fabrication of audit data; it is a sort-order default for a file whose existence is itself external state, and the file is still surfaced to the caller. Nothing here reads or trusts audit DB contents — that would happen elsewhere on actual open. The scope is narrow (single stat call), the recovery is meaning-appropriate (unknown mtime deprioritizes in sort), and this is not one of the R1/R5 rules the @trust_boundary decorator can suppress.
  judge_signature_version: 2
  scope_fingerprint: 5df8c374489de1f809edc65a20b92e813986f05e8612277218122cdedfbe029b
  judge_transport: openrouter
  ast_path: 'body[39]/body[4]/body[7]/handlers[0]'
  judge_metadata_signature: 'hmac-sha256:v2:3f6ed878a192fa429a5d7346f7125392ad63a32c227281b7612a7a807762e2bd'
- key: mcp/server.py:R6:_prompt_for_database:fp=67c80913ab9ef396
  owner: john
  reason: |-
    mcp/server.py:806-813 is a display-only UI boundary inside `_prompt_for_database`: it tries to render each discovered database path relative to the searched directory, and if `Path(db_path).relative_to(search_path)` raises `ValueError`, it deliberately falls back to the absolute/original path with `display = db_path`. The swallowed exception is not hiding audit-data corruption or a Tier-1 invariant failure; it is the documented alternate control path for a database path that cannot be shown relative to `search_path`. Drift would invalidate this suppression if the handler stopped assigning `display = db_path`, if the caught `ValueError` began covering validation/storage logic, or if the result influenced anything other than `sys.stderr.write(f"  [{i}] {display}\n")`.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T12:30:18.607023+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.9
  judge_rationale: |-
    PRESCRIBED FORM. This is a narrow, display-only fallback: `Path.relative_to` raises `ValueError` when the path isn't under `search_path`, and the except branch handles exactly that documented case by falling back to the absolute path for a stderr prompt line. No audit data, no Tier-1/Tier-2 invariant, no plugin return value is involved — the caught exception is a specific, expected control-flow signal from stdlib, and the fallback is meaning-preserving (show the original path). The rationale correctly identifies the scope and the drift conditions that would invalidate it, and the visible code matches.
  judge_signature_version: 2
  scope_fingerprint: 8774a215ed2f50470087b42e33b100d0a216aa8769c960e7e3208d8d3686fc2c
  judge_transport: openrouter
  ast_path: 'body[40]/body[4]/body[0]/handlers[0]'
  judge_metadata_signature: 'hmac-sha256:v2:f494ddb63b9aa1363d4839fab98f8b589b7c00d1bc0d48ab30a797e5d1c2352b'
- key: mcp/server.py:R6:_prompt_for_database:fp=a2b17219bdcd585b
  owner: john
  reason: |-
    This is a legitimate interactive CLI/user-input boundary, not a Tier-1 audit-data read path. In `src/elspeth/mcp/server.py:790-799`, `_prompt_for_database` is explicitly a prompt helper whose contract says it returns `"Selected database path, or None if user cancelled"`. The flagged handler is only around terminal input: `src/elspeth/mcp/server.py:821-825` has `choice = input().strip()` followed by `except (EOFError, KeyboardInterrupt):`, writes `"\nCancelled.\n"`, and returns `None`. EOF and Ctrl-C are expected user cancellation signals at this Tier-3 terminal boundary; the function reifies them as the documented cancellation result rather than hiding corruption or audit failure.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T12:30:25.431711+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.9
  judge_rationale: |-
    PRESCRIBED FORM. The except catches EOFError and KeyboardInterrupt at an interactive terminal input boundary — these are expected user-cancellation signals, not swallowed errors. The function's documented contract explicitly returns None on cancellation, so reifying EOF/Ctrl-C as the None cancellation result is meaning-preserving at a Tier-3 user-input boundary, not silent corruption. The exception set is narrow and specific (not bare Exception), the user is informed via 'Cancelled.' on stderr, and the return value matches the documented contract.
  judge_signature_version: 2
  scope_fingerprint: 8774a215ed2f50470087b42e33b100d0a216aa8769c960e7e3208d8d3686fc2c
  judge_transport: openrouter
