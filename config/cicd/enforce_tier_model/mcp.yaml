  judge_confidence: 0.82
  judge_rationale: |-
    RULE MISFIRES / PRESCRIBED FORM at a Tier-3 boundary. The value being inspected is `union_field_collision_values` read from stored coalesce context where legacy rows may carry raw user-authored values — i.e. persisted external-origin data re-read from our DB, which the policy explicitly treats as Tier-3 at the read site. The function is a discriminator that distinguishes already-fingerprinted metadata from legacy raw values before fingerprinting; the isinstance checks form an exact-shape match (Mapping + exact key set + str + 64-hex regex + str) and the non-matching path is sent to `_fingerprint_collision_value`, so the guard validates rather than swallows. Rationale is site-specific, names the data flow, and acknowledges the conditions under which the suppression would need to be revisited.
