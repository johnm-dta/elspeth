- key: mcp/server.py:R6:_prompt_for_database:fp=c504027435f2a4b6
  owner: john
  reason: |-
    This is a genuine Tier-3 interactive user-input boundary in `src/elspeth/mcp/server.py:821-836`. `_prompt_for_database` reads operator input with `choice = input().strip()`, then parses it with `idx = int(choice) - 1`; the `except ValueError:` at `src/elspeth/mcp/server.py:835` handles malformed external input by emitting the explicit user-facing error `sys.stderr.write("Please enter a number\n")`. This is not Tier-1 audit data or an internal invariant: the only swallowed exception is an invalid console selection, and the enclosing loop keeps prompting until the user supplies a valid database index or cancels.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T12:30:32.805693+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.9
  judge_rationale: |-
    RULE MISFIRES / PRESCRIBED FORM: this is a genuine Tier-3 interactive boundary — `input()` returns operator-typed text, and `int(choice)` on malformed input raises `ValueError`. The except reports the failure to the user via stderr and the enclosing `while True` loop re-prompts until a valid selection or explicit cancellation (EOFError/KeyboardInterrupt returns None). This is not silent swallowing: the failure is surfaced to the user and the control flow explicitly retries, which is the prescribed handling for interactive Tier-3 input. R6's concern (errors vanishing without user-visible signal or retry) does not apply here.
  judge_signature_version: 2
  scope_fingerprint: 8774a215ed2f50470087b42e33b100d0a216aa8769c960e7e3208d8d3686fc2c
