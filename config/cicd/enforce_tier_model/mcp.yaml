    RULE MISFIRES / PRESCRIBED FORM. The value being inspected is persisted collision metadata read back from the audit store whose contents may be either legacy raw values or the newer redacted fingerprint shape — a versioned-format discriminator at a Tier-3 re-read boundary (persisted data, mutable store, schema drift across versions). The isinstance(Mapping) plus key-set plus hex-regex check is precisely the boundary validation that decides whether the stored shape is the already-redacted form to pass through, or a legacy raw value that must be fingerprinted by _fingerprint_collision_value before egress. The rationale plainly names the discriminator role, the accepted shape, and the fallback path, and the visible code at 613-628 corroborates it; this is not hiding a Tier-1 invariant break.
