- key: mcp/analyzers/queries.py:R5:_is_collision_value_fingerprint:fp=72539d5f6423bbca
  owner: john
  reason: |-
    This is a legitimate boundary/redaction-shape discriminator, not a Tier-1 audit-data suppression. In `src/elspeth/mcp/analyzers/queries.py:725-731`, the analyzer reads persisted `context_after_json` and then extracts `union_field_collision_values`; the adjacent comment says legacy rows may still contain raw values. At `src/elspeth/mcp/analyzers/queries.py:739-740`, each stored entry value is sent to `_collision_value_fingerprint(e[1])`, whose contract at `src/elspeth/mcp/analyzers/queries.py:621-628` is to either pass through already-redacted metadata or fingerprint raw legacy values before response construction.
    
    The flagged `isinstance(value.get("value_type"), str)` at `src/elspeth/mcp/analyzers/queries.py:617` is part of `_is_collision_value_fingerprint`, which accepts `value: Any` and only returns true for the exact audit-safe fingerprint envelope: `isinstance(value, Mapping)`, `set(value) == {"value_hash", "value_type"}`, a string `value_hash` matching `^[0-9a-f]{64}$`, and a string `value_type`. If this predicate drifts away from checking the exact fingerprint envelope before pass-through, the suppression is no longer valid. Here, malformed or raw legacy values are not trusted or emitted; they fall through to `_fingerprint_collision_value(value)` at line 628.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-09-15'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-17T16:14:58.256607+00:00'
