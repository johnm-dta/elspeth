- key: mcp/analyzers/queries.py:R5:_is_collision_value_fingerprint:fp=632a27456b3ee484
  owner: john
  reason: |-
    `mcp/analyzers/queries.py:739-741` passes `e[1]` from persisted coalesce collision metadata into `_collision_value_fingerprint()` before MCP response construction: `"Legacy rows may still contain raw values; those are fingerprinted"` at `mcp/analyzers/queries.py:728-730`. The reported `isinstance(value, Mapping)` at `mcp/analyzers/queries.py:613` is not hiding a missing Tier-1 audit invariant; it is the discriminator for a versioned redaction format. It only accepts the already-redacted form when the value is exactly `{"value_hash", "value_type"}` and `value_hash` is a 64-char lowercase hex digest (`mcp/analyzers/queries.py:613-618`); otherwise `mcp/analyzers/queries.py:628` fingerprints the raw legacy value before comparison or egress. This suppression is valid only for this collision-value redaction discriminator; if the accepted shape, key set, regex, or fallback-to-`_fingerprint_collision_value(value)` changes, this rationale no longer applies.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
