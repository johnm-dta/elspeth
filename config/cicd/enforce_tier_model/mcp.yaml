- key: mcp/server.py:R6:_prompt_for_database:fp=dbbeb81e161a9a1d
  owner: john
  reason: |-
    At src/elspeth/mcp/server.py line 762, `except (EOFError, KeyboardInterrupt)` wraps `input()` reading interactive stdin (Tier 3 external input). EOFError (Ctrl-D / closed stdin) and KeyboardInterrupt (Ctrl-C) are the canonical Python user-cancellation signals, caught narrowly; the handler writes a 'Cancelled.' message to stderr and returns `None`, the documented contract value meaning 'user cancelled, do not open a database', which the caller (`main()`) handles by exiting cleanly. This is meaning-preserving boundary handling of an interactive cancellation, explicitly surfaced to the user and propagated through the documented return — not a silent swallow. No audit-trail data is involved.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-31'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-02T04:36:40.500295+00:00'
  judge_model: 'claude-opus-4-7[1m]'
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.92
  judge_rationale: |-
    PRESCRIBED FORM. The except is narrow (EOFError, KeyboardInterrupt — the canonical Python signals for user cancellation of an interactive `input()` read), not a bare except. The input source is interactive stdin, genuinely Tier-3 external. The handler does not silently swallow: it surfaces 'Cancelled.' on stderr to the user and returns the function's documented sentinel (`None` = 'user cancelled') per the docstring at lines 736-738, which the caller routes into a clean exit. This is meaning-preserving boundary handling of an interactive cancellation converted to an explicit, documented return — exactly the prescribed form R6 exists to distinguish from a true silent swallow. The decorator nudge does not apply: R6 is not in the suppressible set {R1, R5}, and the cancellation arrives via `input()`, not a function parameter.
