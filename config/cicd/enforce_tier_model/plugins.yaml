- key: plugins/infrastructure/pooling/executor.py:R6:PooledExecutor:_execute_batch_locked:fp=d90958e285a74a8e
  owner: bugfix
  reason: |-
    Thread pool may be shut down concurrently during submit(); RuntimeError is translated into deterministic per-row shutdown results so submission-order slots are still completed
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-28'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-05-30T04:26:50.769154+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:ee8359775f8cd9b8849912ecc4155fa4df8f2d86fabad8289b5acf1e795c87b6'
  judge_confidence: 0.85
  judge_rationale: |-
    This is a legitimate concurrency boundary: ThreadPoolExecutor.submit() raises RuntimeError when the pool has been shut down concurrently, which is a documented stdlib contract, not a bug in our code. The handler does not silently swallow the error — it converts it into deterministic per-row TransformResult.error records with reason='shutdown_requested', preserves buffer-slot consistency, and completes remaining reserved slots so no row is silently dropped. This is offensive programming at a runtime-state boundary (concurrent shutdown signal), and the audit trail records exactly what happened to each row. R6 (broad exception handling) is appropriately narrow here — only RuntimeError, the specific shutdown signal.
