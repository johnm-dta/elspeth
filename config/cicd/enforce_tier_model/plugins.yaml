- key: plugins/transforms/rag/query.py:R5:QueryBuilder:_build_field_only:fp=8690adb65aebc738
  owner: john
  reason: |-
    In QueryBuilder._build_field_only (query.py:129), `if not isinstance(extracted, str): raise TypeError(...)` is an offensive guard, not a defensive shape filter. The `extracted` value is typed Any because row_data is dict[str, Any] and observed-mode schemas do not enforce value types; without the guard a bytes value would silently pass _validate_non_empty and corrupt the audit trail with a wrong-typed query. The code matches its inline comment exactly: it refuses to coerce and crashes loudly with a diagnostic naming the upstream plugin bug, which is the prescribed response for 'plugin returns wrong type' on Tier-2 data. R5 normally flags isinstance as defensive, but here it raises rather than swallows — the encouraged offensive form.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-31'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-02T04:52:40.846384+00:00'
  judge_model: 'claude-opus-4-7[1m]'
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.88
  judge_rationale: |-
    PRESCRIBED FORM. R5 fires on isinstance, but the code is the encouraged offensive form, not defensive suppression: `if not isinstance(extracted, str): raise TypeError(...)` with a diagnostic message naming the upstream plugin bug (query.py:129-133). The seam is genuinely shape-unguaranteed — row_data is dict[str, Any] and the rationale plainly states observed-mode schemas do not enforce value types, which the visible code does not contradict (the comment at query.py:121-128 corroborates and adds the concrete failure mode: bytes would silently pass _validate_non_empty since bytes.strip() and bool(b'x') both succeed, producing QueryResult(query=b'...') and corrupting the audit trail with a wrong-typed query). This is the Plugin-Ownership prescribed response for 'plugin returns wrong type' on Tier-2 data: raise a typed exception, do not coerce. The decorator nudge does not apply: _build_field_only takes Tier-2 pipeline data (row_data lineage), not a Tier-3 external parameter, and the suppression scope is one offensive guard, not a boundary function.
