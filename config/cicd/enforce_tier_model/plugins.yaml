  judge_rationale: |-
    RULE MISFIRES / PRESCRIBED FORM. The `usage` parameter is a provider-supplied token-usage payload from an external LLM call — Tier-3 external data per policy ('Transform on external calls: external response is Tier 3'), not a first-party typed contract. The function explicitly normalizes at the Tier-3 boundary: missing fields map to explicit `None` (record-absence-as-None, NOT fabrication to 0), and the result is handed to `TokenUsage.from_dict` for downstream normalization. The docstring at line 198-203 states this invariant plainly, and the symmetric `getattr(..., None)` branch on line 215-217 confirms the same record-absence semantic across the SDK-object shape. This is the prescribed meaning-preserving coercion at a Tier-3 boundary.
