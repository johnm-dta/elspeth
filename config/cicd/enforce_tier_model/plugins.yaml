- key: plugins/sources/csv_source.py:R6:CSVSource:_load_from_file:fp=894a8230ab37856a
  owner: john
  reason: |-
    PRESCRIBED FORM — Tier-3 schema-validation quarantine, recorded not swallowed, type-narrow catch. In CSVSource._load_from_file (csv_source.py:567), `except ValidationError as e` catches the pydantic ValidationError raised by self._schema_class.model_validate(row) — the source-boundary schema validation of an external CSV row whose coerced values may be invalid (the canonical Tier-3 trust boundary: external data may not conform to the declared/inferred schema). It is not a silent swallow: it calls ctx.record_validation_error(schema_mode=self._schema_config.mode) UNCONDITIONALLY (writing a verr_* record into the Landscape audit trail), then conditionally yields SourceRow.quarantined(...) unless on_validation_failure == 'discard'. CRITICAL DISCRIMINATION: the catch is type-narrow to pydantic ValidationError, NOT the broad ValueError. The enclosing try also wraps to_row(), ContractBuilder.process_first_row(), require_schema_contract(), and contract.validate(), but none of those raise pydantic ValidationError: to_row() is model_dump() (serialization, never validates); process_first_row() raises plain ValueError on a field_resolution collision (an explicit 'source plugin bug', i.e. ours) or on a NaN/Infinity value (Tier-1 audit-integrity rejection via normalize_type_for_contract); require_schema_contract() raises an assertion; contract.validate() RETURNS a list of violations rather than raising; and the two SourceRow constructors evaluated inside the try (SourceRow.quarantined at line 556, SourceRow.valid at line 563) are frozen-dataclass (@dataclass(frozen=True, slots=True)) constructors, not pydantic models, whose __post_init__ raises only plain ValueError on an invariant breach. A plain ValueError or AssertionError is not a ValidationError (catching the child never catches the parent, and the dataclass ValueError is an unrelated type to pydantic ValidationError), so all of these our-code / Tier-1 faults PROPAGATE and crash — exactly correct, and exactly the data-vs-config discrimination the sibling azure_blob_source path had to be FIXED to achieve (its broad except ValueError was narrowed); the CSV path gets it for free via the type-narrow catch. Verified empirically: the schema built with allow_coercion=True rejects non-finite float cells ('NaN'/'Infinity'/'inf') as ValidationError at model_validate, so a NaN cell is quarantined HERE and never reaches process_first_row — there is no crash-on-first-row path. R6 is a syntactic detector that does not recognise record_validation_error + yield SourceRow.quarantined as explicit handling. The method is a generator (yields rows, never raises), so @trust_boundary is infeasible (raising-test contract); the per-line allowlist is the prescribed honest mechanism.
  safety: |-
