- key: plugins/sinks/azure_blob_sink.py:R6:AzureBlobSink:write:fp=327e2b1a5d5834ff
  owner: john
  reason: |-
    This is a prescribed per-row Tier-2 operation-safety boundary, not a Tier-1 audit-data violation. In `AzureBlobSink.write`, the caught operation is a CSV trial serialization/encoding of each incoming row before the batch blob upload: `trial_writer.writerow(row)` and `row_buf.getvalue().encode(self._csv_options.encoding)` at `src/elspeth/plugins/sinks/azure_blob_sink.py:661-663`. The site-specific comment says the failure class is row data that cannot be encoded in the configured CSV codec, and that the row is diverted before whole-batch serialization: "A row whose string representation cannot be encoded in the configured CSV codec ... is a per-row Tier-2 data fault" at lines 637-640. The exception is not silently ignored: line 665 calls `self._divert_row(row, row_index=i, reason=f"CSV encoding ({self._csv_options.encoding}) failed: {exc}")`, then line 666 continues to the next row. If these lines drift away from per-row trial encoding plus `_divert_row(...)`, this suppression would no longer apply.
