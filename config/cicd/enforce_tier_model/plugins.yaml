s not the ELSPETH sink contract. Handling path: recorded diversion at plugins/sinks/chroma_sink.py:314 -> _diversion_log. Invalidated if an upstream schema contract is introduced that pins id_field to str and the pipeline enforces it before the sink, at which point a non-string here would be a Tier-1 contract violation that must crash rather than divert.
