  owner: bugfix
  reason: Thread-pool submit can race with shutdown after the row has already been
    admitted to the FIFO buffer
  safety: Catches RuntimeError only, removes any tracked submission still under the
    lock, and completes the waiter path with an explicit shutdown_requested TransformResult
    instead of stranding the ticket
  expires: '2026-07-02'
