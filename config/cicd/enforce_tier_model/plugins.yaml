- key: plugins/sources/csv_source.py:R6:CSVSource:load:fp=c55a1dfdb0de7249
  owner: john
  reason: |-
    In CSVSource.load (csv_source.py:202), the except UnicodeDecodeError catches a decode failure at open() time (BOM/header bytes for codecs like utf-16). This is a Tier-3 source boundary: the bytes are external file content whose contract we did not author, so the policy mandates quarantine, not crash. The handler records the failure via ctx.record_validation_error(schema_mode='parse'), then yields SourceRow.quarantined unless on_validation_failure=='discard', and returns. The catch is narrow (UnicodeDecodeError only), the absence is recorded as an audit fact with the file path and encoding rather than fabricated, and processing of the pipeline is preserved. Not silent data loss. The existing rationale matches the current code.
  safety: |-
