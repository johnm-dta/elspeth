- key: tui/screens/explain_screen.py:R1:ExplainScreen:on_tree_select:fp=d9de8781b120fafc
  owner: john
  reason: |-
    This is an intentional partial-cache lookup for TUI display enrichment, not a defensive read of required Tier-1 audit data. In `src/elspeth/tui/screens/explain_screen.py:186-220`, both maps are built as optional node-state indexes: `focused_state_by_node_id = {state.node_id: state for state in lineage_result.node_states}` only covers the focused token path, and `latest_state_by_node_id` is only populated from recorded node states when there is no focused token. The selected node itself is still validated through the node table at `src/elspeth/tui/screens/explain_screen.py:456-461` via `node = factory.data_flow.get_node(node_id, run_id)` followed by `if node is None: return None`. The `.get()` at `src/elspeth/tui/screens/explain_screen.py:346` only decides whether optional execution-state fields should be added; `src/elspeth/tui/screens/explain_screen.py:471-480` explicitly treats `state_for_display is None` as a valid structure-only detail result. Future drift that made `focused_state_by_node_id` or `latest_state_by_node_id` total over every selectable node, or made missing execution state impossible, would invalidate this suppression.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T13:13:37.289295+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.82
  judge_rationale: |-
    RULE MISFIRES. The two dicts are partial indexes by design — `focused_state_by_node_id` only covers the focused token path, `latest_state_by_node_id` is populated only when no focused token exists — so a missing key is a normal, expected outcome for a selectable node, not a broken invariant. The `.get()` here is not a defensive re-check of a shape our code guarantees; it's the intended lookup semantics (absent → None → structure-only detail), and downstream code at 471-480 explicitly treats None as valid. Direct subscript would spuriously KeyError on legitimate selections. The rationale identifies the maps' partiality, points to the downstream None-tolerant consumer, and names the drift conditions that would invalidate the suppression.
