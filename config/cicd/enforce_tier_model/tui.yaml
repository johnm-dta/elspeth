- key: tui/screens/explain_screen.py:R1:ExplainScreen:_artifact_for_lineage:fp=e6ffb4d9fa3b5b56
  owner: john
  reason: |-
    `tui/screens/explain_screen.py:205-208` constructs `artifacts_by_state_id` as an intentionally sparse presentation index: `"artifacts_by_state_id: dict[str, list[Artifact]] = {}"` and only states with persisted artifacts are inserted via `"artifacts_by_state_id.setdefault(artifact.produced_by_state_id, []).append(artifact)"`. `_artifact_for_lineage` then walks every lineage state and treats absence from that sparse index as the expected “this state produced no artifact” case: at `tui/screens/explain_screen.py:309`, `"artifacts = artifacts_by_state_id.get(state.state_id, ())"`, followed by `if artifacts: return artifacts[-1]` and `return None`. This is not a Tier-1 audit-data invariant lookup where a missing key indicates corruption; it is an optional reverse-index lookup in the TUI display path, and the function’s return type is explicitly `Artifact | None`.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T22:39:33.480645+00:00'
  judge_model: 'claude-opus-4-8[1m]'
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.86
  judge_rationale: |-
    RULE MISFIRES. R1's premise is that a missing key signals a schema/contract bug that direct indexing should surface as KeyError, but the code at explain_screen.py:205-208 constructs `artifacts_by_state_id` as a deliberately partial index — it starts `{}` and only `setdefault(...).append`s entries for states that actually produced an artifact, so the vast majority of lineage states are legitimately absent. `_artifact_for_lineage` (309-312) walks every reversed state and treats absence as the expected 'this state produced no artifact' case, returning the declared `Artifact | None`; direct `artifacts_by_state_id[state.state_id]` would KeyError on the normal path. No first-party contract guarantees every state_id is a key, so this is an optional sparse-index lookup, not a defensive suppression on Tier-1 audit data. The decorator does not apply: the function takes only first-party-constructed arguments, and the subject is not rooted at an external parameter.
  judge_signature_version: 2
  scope_fingerprint: a87f578703bb3a17cb931a0dbdc50be76a6ee45a76b0b95addd63ecd0ed8a34a
