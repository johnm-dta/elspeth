allow_hits:
- key: tui/widgets/lineage_tree.py:R1:LineageTree:_build_tree:fp=60a7a8bf5283d1ba
  owner: john
  reason: |-
    At src/elspeth/tui/widgets/lineage_tree.py line 108, `tokens_by_sink.get(sink_node_id, [])` reads a locally-built sparse grouping index, not a contract-bound typed object. `tokens_by_sink` is constructed in Step 1 (lines 86-100) keyed by each token's own terminal node (`path[-1]`), so its keyspace is by construction a subset of all sinks — a sink with zero tokens routed to it legitimately has no key. A bare `tokens_by_sink[sink_node_id]` would therefore raise KeyError on the normal, expected case (a sink that received no tokens), so the `.get(..., [])` is the correct group-by-with-empty-groups idiom (defaultdict-style), yielding an empty children tuple. This is meaning-preserving, not fabrication: no token is dropped (tokens are grouped by their own terminal node and sinks display whoever points at them), and the surrounding code accesses every genuinely-required field directly (`token["token_id"]`, `sink["name"]`), so this single `.get()` is a deliberate sparse-membership lookup rather than defensive access on a typed contract.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-31'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-02T04:39:25.481945+00:00'
  judge_model: 'claude-opus-4-7[1m]'
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.92
  judge_rationale: |-
    RULE MISFIRES. The flagged `.get()` is on `tokens_by_sink`, a dict built locally in this same method (lines 86-100) keyed by each token's terminal node, so its keyspace is by construction a sparse subset of all sinks — a sink with zero tokens has no key, and that absence carries the well-defined meaning 'no tokens routed here'. The lookup at line 108 is the standard group-by-with-empty-groups idiom (defaultdict-style), yielding an empty children tuple; substituting `[]` for absence is meaning-preserving, not fabrication. The same loop accesses `sink["name"]` and `sink["node_id"]` directly, confirming the author reserves `.get()` for the deliberate sparse-membership case and uses direct access for genuinely required fields. R1's concern (hiding missing keys in a typed contract) does not apply to a locally-built sparse index.
