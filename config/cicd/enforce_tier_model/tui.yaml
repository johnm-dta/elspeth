- key: tui/lineage_view.py:R1:_append_node:fp=e9fafd54ce88cfd6
  owner: john
  reason: |-
    `tui/lineage_view.py:196` is reading a deliberately sparse, locally derived adjacency index, not a required Tier-1 audit field: `outgoing_edges = _sort_edges(outgoing_by_node.get(node.node_id, []))`. The enclosing builder creates `outgoing_by_node` as `defaultdict(list)` at `tui/lineage_view.py:76` and only appends entries for nodes that actually have valid outgoing edges at `tui/lineage_view.py:80-83`, after rejecting edges whose endpoints are absent from `node_by_id`. In `_append_node`, a missing `node.node_id` in `outgoing_by_node` therefore means "leaf node with no outgoing edges", which is rendered through `has_children=bool(outgoing_edges or token_children)` at `tui/lineage_view.py:208`. The same function still lets real graph corruption crash where the child node must exist: `child = node_by_id[edge.to_node_id]` at `tui/lineage_view.py:230`. This suppression depends on `outgoing_by_node` remaining a sparse adjacency map whose absent key means no outgoing edges; if it becomes a complete mandatory audit-data map, or if required child lookup is softened, this rationale no longer applies.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T22:18:22.889548+00:00'
  judge_model: 'claude-opus-4-8[1m]'
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.8
  judge_rationale: |-
    RULE MISFIRES: R1 assumes a missing key signals a bug, but `outgoing_by_node` is a deliberately sparse source→edges adjacency index (built locally, populated only for nodes that have valid outgoing edges), where an absent key is the designed representation of a leaf node with no outgoing edges — a valid, expected state that the code handles meaningfully via `has_children=bool(outgoing_edges or token_children)` at line 208. The excerpt confirms this leaf/edge-iteration semantics, and the rationale credibly shows the code does NOT launder real corruption: required child lookups still crash directly via `node_by_id[edge.to_node_id]` (line 230), so genuine graph-integrity breaks surface. This is not external Tier-3 data flowing from a boundary parameter, so the @trust_boundary decorator does not apply. The rationale is site-specific, cites exact structure, states its own falsifying condition, and duplicate_count is 0; I could not directly re-read lines 76/230 (secret-scrubber denied the file), hence slightly reduced confidence.
