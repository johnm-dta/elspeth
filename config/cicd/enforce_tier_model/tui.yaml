- key: tui/screens/explain_screen.py:R1:ExplainScreen:on_tree_select:fp=01464caccfb7b1d5
  owner: john
  reason: |-
    `tui/screens/explain_screen.py:346` is an intentional optional cache lookup for display enrichment, not a Tier-1 audit-data read that must crash. The loaded-state caches are deliberately partial: `tui/screens/explain_screen.py:218-219` sets `latest_state_by_node_id` to `{}` when a focused lineage exists, so selecting a node outside the focused token path legitimately has no cached execution state. The call then passes that optional value as `state_for_display=state_for_display` with `scan_for_state=False` (`tui/screens/explain_screen.py:347-352`), and `_load_node_state` treats absence as a prescribed display-only condition: it only adds execution fields when `state_for_display is not None` (`tui/screens/explain_screen.py:471-473`) and otherwise returns the structural node detail (`tui/screens/explain_screen.py:480`). The suppression is therefore bound to the current two-cache fallback expression: `state_for_display = self._state.focused_state_by_node_id.get(node_id) or self._state.latest_state_by_node_id.get(node_id)`.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T22:40:17.212431+00:00'
  judge_model: 'claude-opus-4-8[1m]'
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.86
  judge_rationale: |-
    RULE MISFIRES. The `.get(node_id)` is a membership lookup on two deliberately partial in-memory caches, not a defensive read of guaranteed-present Tier-1 audit data. I verified the cited structure: `latest_state_by_node_id` is set to `{}` whenever a focused lineage exists (explain_screen.py:218-219), and `focused_state_by_node_id` holds only states along the focused token path (line 210), so selecting a node outside that path legitimately has no cached entry. Absence is an in-band, designed condition handled honestly — `_load_node_state` adds execution fields only when `state_for_display is not None` (line 471-473) and otherwise returns the structural node detail (line 480), so None means "display-only," not a fabricated default. Direct `[node_id]` access would raise KeyError on a valid "no state for this node" selection, which is not a schema bug; the rule's premise that a missing key indicates a contract violation is false here. The subject is rooted at `self._state`, not the `selection` parameter, so no @trust_boundary nudge applies.
  judge_signature_version: 2
