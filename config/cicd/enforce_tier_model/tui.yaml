- key: tui/widgets/lineage_tree.py:R1:LineageTree:_build_tree:fp=837c05db00cf931c
  owner: john
  reason: |-
    This site is a legitimate sparse-index lookup, not defensive access to required audit data. In `src/elspeth/tui/widgets/lineage_tree.py:120`, `_build_tree` creates a local derived map, `tokens_by_sink: dict[str, list[TreeNode]] = {}`. Lines 136-140 populate that map only for tokens whose `path` has a terminal node: `terminal_node_id = path[-1]` followed by `tokens_by_sink[terminal_node_id].append(token_node)`. The flagged line, `token_children = tuple(tokens_by_sink.get(sink_node_id, [])) if sink_node_id is not None else ()`, is then iterating all sinks and asking whether this sink has any token leaves. A sink with no terminal tokens is an expected empty-child case, not missing required Tier-1 lineage data. The surrounding required lineage fields still use crash-on-missing access, e.g. `token["token_id"]`, `token["row_id"]`, `token["path"]`, `sink["name"]`, and `sink["node_id"]`, so future drift that changes `tokens_by_sink` from this locally built sparse grouping into a raw audit/lineage payload lookup would invalidate this suppression.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-10-06'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-07-08T13:13:55.690027+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.88
  judge_rationale: |-
    RULE MISFIRES. The `.get()` here is not defensive access to required Tier-1 audit data — `tokens_by_sink` is a locally-constructed sparse index built moments earlier in the same function (lines 120, 136-140), populated only for sinks that actually have terminal tokens. A missing key represents the legitimate 'sink has no tokens' case, and the empty-list default preserves meaning (no tokens → no children), not fabrication of absent audit data. The surrounding required lineage fields (`token['token_id']`, `sink['node_id']`, etc.) correctly use crash-on-missing direct subscript, confirming the author distinguished required from sparse access. R1's premise (hiding missing-key bugs in a required field) does not apply to a sparse local index.
