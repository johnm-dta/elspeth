- key: web/sessions/service.py:R6:SessionServiceImpl:archive_session:_sync:fp=f65ffe2b6eacead7
  owner: web-sessions
  reason: "Tier-3 filesystem boundary in archive_session rollback. The primary DB transaction has already failed (primary_exc\
    \ captured at L1677). We attempt to rename the staged quarantine directory back to its original blob_dir location so the\
    \ session blob remains readable. If that restore rename itself fails with OSError (disk full, permission, FS race, intermediate\
    \ dir vanished), we add an exception note to primary_exc and re-raise primary_exc \u2014 the operator sees both failures,\
    \ the primary is never swallowed."
  safety: Narrowed to OSError only. primary_exc.add_note carries type(restore_exc), the source and destination paths, and
    'Manual cleanup required'. The raise on L1689 propagates the original DB-layer failure.
  expires: '2026-08-23'
- key: web/sessions/service.py:R6:SessionServiceImpl:archive_session:_sync:fp=5d64d769907cac14
  owner: web-sessions
  reason: Post-commit quarantine purge in archive_session::_sync. The session-row delete has already committed and from the
    caller's perspective the archive succeeded; this is best-effort filesystem cleanup of the staged blob dir. If shutil.rmtree
    raises OSError (file lock, permission, partial filesystem state), we intentionally early-return so the directory remains
    in quarantine for manual cleanup rather than raising a misleading 'archive failed' error after the DB rows are gone.
  safety: Narrowed to OSError only. Inline comment L1691-1694 documents the quarantine-on-cleanup-failure invariant. Subsequent
    quarantine_root rmdir is gated by this early return so we never attempt parent removal when the child cleanup failed.
  expires: '2026-08-23'
- key: web/sessions/service.py:R1:SessionServiceImpl:prune_state_versions:_sync:fp=807f122d01342885
  owner: web-sessions
  reason: Cross-table reference walk in prune_state_versions. derived_from_map is built from composition_states_table for
    the current session; seeds is the union of keep_ids (caller param), run_referenced (from runs table), and message_referenced
    (from chat_messages_table). A seed id can legitimately not appear in derived_from_map when a run or chat message references
    a composition state that has already been pruned or that lives in a different session. .get() returning None is the correct
    termination signal for the while-loop on L3707.
  safety: "Loop terminates on parent is None. lineage_protected only grows with IDs that DO appear in derived_from_map. No\
    \ silent default is fabricated into audit data \u2014 None is interpreted as 'walk terminates here', and the prune candidate\
