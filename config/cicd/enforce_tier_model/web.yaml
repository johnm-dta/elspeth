  judge_policy_hash: 'sha256:ee8359775f8cd9b8849912ecc4155fa4df8f2d86fabad8289b5acf1e795c87b6'
  judge_confidence: 0.85
  judge_rationale: |-
    This is a legitimate use of contextlib.suppress(QueueEmpty) at a concurrency race boundary. The queue.get_nowait() is being called after a QueueFull was raised on put, but between those two operations another consumer could have drained the queue, making get_nowait raise QueueEmpty. The suppression is narrowly scoped to exactly that race, the intent (drop oldest to make room) is preserved either way (an already-empty queue achieves the goal), and the immediately-following put_nowait still has its own QueueFull handler that logs via slog. This is not defensive programming against unknown state — it's handling a well-defined concurrent-access exception at its precise call site.
