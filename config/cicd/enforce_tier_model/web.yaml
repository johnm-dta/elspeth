- key: web/composer/source_inspection.py:R5:_declared_field_name:fp=684a0b8827dc898e
  owner: web-composer
  reason: Union-arm discrimination on `DeclaredFieldSpec = str | Mapping[str, Any]`
    introduced by commit 5cab72f3b "handle structured schema fields in preview". The
    isinstance(field, str) check is mandatory typed dispatch — the two arms extract
    the field name differently (split on ":" for the legacy "name:type" string form,
    lookup "name" key for the structured-spec form). Not defensive programming; without
    it the str-only `.split` branch cannot be reached safely.
  safety: Both arms are exhaustive over the declared union; neither fabricates a name
    when the input is malformed (returns None).
