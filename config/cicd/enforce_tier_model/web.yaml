    declared-field Mapping for an optional "name" key. Returns None when absent (manifesto
    "absence-is-None"); the caller (derive_extra_column_risk) then drops the entry
    from the declared-lower set so no synthetic column name is invented.
  safety: None is the documented "field has no name" path; subsequent isinstance(name_raw,
