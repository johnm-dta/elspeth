- key: web/app.py:R2:create_app:_request_id:fp=318afae72ce2947e
  owner: web-app
  reason: 'Trust-boundary fallback. The exception handlers registered in

    create_app() use this helper to read request.state.request_id, set

    by RequestIdMiddleware on every request. If a pre-middleware path

    ever fires an exception (e.g., Starlette itself rejecting the

    request before the middleware chain completes), the attribute will

    not exist. getattr(..., "unset") provides a JSON-serialisable

    sentinel so the handler still produces a well-formed response body

    rather than compounding the failure with AttributeError.

    '
  safety: 'The "unset" sentinel cannot be confused with a real UUID4 or any

    value accepted by RequestIdMiddleware''s validator, so operators

    reading slog events and response bodies can distinguish

    middleware-bypassed failures from normal ones.

    '
  expires: null
- key: web/app.py:R4:create_app:_prometheus_metrics:fp=057597c004befd39
  owner: web-app
  reason: Tier 3 — public ``/metrics`` scrape endpoint. ``generate_latest()`` walks
    the global Prometheus REGISTRY and runs collector code we do not own; a collector
    raising on a corrupted state would, under Starlette's default 500 handler, leak
    the traceback into the response body. The bare ``except Exception`` traps the
    collector failure and returns a safe 503 with a one-line ``# scrape failed`` body
    and no internal detail. Closes the Phase 8 PR-review S4 finding.
  safety: Audit-primacy not implicated — ``/metrics`` reads in-memory counter state
    only, emits nothing to audit. Scrapers retry on 5xx; service degrades gracefully.
    The actual exception is unreachable in tests (would require a deliberately-corrupted
    collector) but the handler exists so a production regression in any third-party
    collector cannot escalate to a traceback-leaking 500. Allowlist expiry deliberately
    bounded (90d) per project policy on new suggested entries.
  expires: '2026-08-19'
- key: web/composer/source_inspection.py:R6:_inspect_jsonl:fp=327fe9a5a3e59ac5
  owner: web-composer
  reason: Tier-3 trust boundary — JSONL line-by-line parsing of operator-supplied
    blob content. JSONDecodeError on a single line is the documented Tier-3 failure
    mode; the line is counted as a parse failure and surfaced via the "N jsonl line(s)
    failed to parse" warning. Subsequent lines still inspected.
  safety: parse_failures counter accumulates and is reported in warnings; no row is
    fabricated and the partial sample that did parse is still surfaced.
  expires: null
