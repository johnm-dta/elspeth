- key: web/composer/tools/_common.py:R9:_apply_merge_patch:fp=d70fc3cd8961b533
  owner: composer-tools-common
  reason: >-
    RFC 7396 JSON Merge Patch implementation: a None value in the patch means
    'delete this key from target'. ``result.pop(key, None)`` is the canonical
    implementation — the second argument is the absent-key default, not a
    swallow. Without it, deleting a key that wasn't in target would raise
    KeyError, breaking the merge-patch semantics required by composer
    patch_node_options / patch_output_options / patch_source_options.
  safety: >-
    Documented and tested at tests/unit/web/composer/test_apply_merge_patch.py
    against RFC 7396 examples; deletion of an absent key is a no-op per the
    spec, not a silent error.
  expires: '2026-08-23'
