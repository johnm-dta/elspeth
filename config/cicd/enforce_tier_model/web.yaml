- key: web/composer/tools/_common.py:R5:_prevalidate_plugin_options:fp=374639ae5d2b5155
  owner: composer-tools-common
  reason: >-
    Discriminated-union dispatch on ``exc.__cause__`` (typed ``BaseException |
