- key: web/composer/redaction.py:R5:_coerce_stringified_json_object:fp=4f5bfe819cd1532d
  owner: john
  reason: |-
    In _coerce_stringified_json_object (redaction.py:839), `if not isinstance(value, str): return value` is the entry type-dispatch of a BeforeValidator that recovers from LLMs stringifying a free-form object argument (e.g. options/patch on composer tools) — Tier-3 LLM-authored tool input. A JSON string is an equivalent wire encoding of the object, so parsing it back is meaning-preserving coercion (the '42'->42 class), not fabrication; the raw stringified form is recorded in the per-dispatch audit envelope BEFORE this validator runs, preserving exactly what the model emitted. The coercion is deliberately narrow and fails closed: non-str, invalid JSON, or non-object decodes are returned untouched so the dict[str,Any] validation still rejects malformed input. Legitimate Tier-3 boundary deserialisation. Entry was ALLOWLIST-FRESH; rationale written from current code.

    The @trust_boundary decorator nudge's three structural conditions are met (external `value` parameter, rule R5, the isinstance subject rooted at `value`), but the decorator is structurally INFEASIBLE here. TBE1 (severity error, elspeth-lints trust_boundary/tests) mandates that every @trust_boundary carry a test_ref to a pytest test whose body "contains a raising assertion for malformed-input rejection and calls the decorated function through source_param." This validator provably NEVER raises on malformed `value`: it fails CLOSED by returning the value untouched (non-str, invalid JSON, or non-object decodes all pass through unchanged), deferring rejection to the downstream dict[str,Any] model validation — it never itself raises. A non-raising-by-design boundary cannot satisfy a raising-test gate, so a @trust_boundary here could never satisfy TBE1 and would become a build-failing violation. The per-line allowlist entry is therefore the only honest suppression mechanism for this finding.
