- key: web/composer/_semantic_validator.py:R5:_is_config_probe_exception:fp=f4dd333a133b13c6
  owner: web-composer
  reason: "The semantic-contract validator probes producer plugins to read their output_semantics() during draft pipeline\
    \ composition. Producer construction can fail with known draft/config exceptions (PluginConfigError, PluginNotFoundError,\
    \ TemplateError, UnknownPluginTypeError, or \"Invalid configuration for transform\" ValueError) when the user has not\
    \ finished filling in options. Mirrors the same predicate at web/composer/state.py:_is_config_probe_exception used by\
    \ the schema-contract probe path. The caught exception text is NEVER embedded in any ValidationEntry or SemanticEdgeContract\
    \ \u2014 the only signal exposed downstream is \"no semantic facts\" (treated as UNKNOWN by compare_semantic), preventing\
    \ plugin-option leaks via validator diagnostics."
  safety: Unexpected exceptions are re-raised (per CLAUDE.md plugin-as-system-code policy). Known draft/config exceptions
    yield producer_decl=None, which compare_semantic translates to SemanticOutcome.UNKNOWN; FAIL-policy consumers then emit
    a structured error naming only the requirement_code and plugin names, never the exception text.
  expires: null
