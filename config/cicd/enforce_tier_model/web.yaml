  owner: john
  reason: |-
    PRESCRIBED FORM — recorded, not swallowed. The `except ExpressionEvaluationError` in `_gate_expression_type_diagnostics_for_observed_csv` does NOT silently suppress the error: it converts the expected evaluation failure into a recorded blocking diagnostic. This proof step deliberately evaluates a user/composer-authored gate expression against bounded, sampled observed-CSV rows for the explicit purpose of PROBING for the str-vs-numeric type mismatch that would otherwise fail at pipeline runtime (observed CSV values are strings unless the source schema declares explicit types). The exception is the signal being probed for: when it fires, the except appends a `gate_expression_type_mismatch_against_source_schema` blocking diagnostic carrying the node id, the referenced field, the sample row index, and an evidence locator — i.e. it records what was found and surfaces a repair, the audit-faithful outcome. The evaluated rows are Tier-3 external CSV data, so an evaluation failure on them is recoverable bad external input (quarantine-equivalent: record the diagnostic, continue to the next row/gate), exactly the prescribed Tier-3 handling — not an our-code bug that should crash preview_pipeline. The caught type is the narrow, expected `ExpressionEvaluationError`, not a broad `except Exception`. The function returns a list of diagnostics (non-raising), so the @trust_boundary decorator (which requires a raising-rejection test_ref) is infeasible; per-line allowlist suppression is the correct mechanism.
