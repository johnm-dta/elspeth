  judge_rationale: |-
    RULE MISFIRES. The R8 rule targets `setdefault` used to hide missing-key bugs, but here `actual_sql` is a freshly-constructed local accumulator (line 322) being built up by grouping reflected check constraints by name. `setdefault(name, set()).add(...)` is the canonical accumulator idiom — there is no 'missing key bug' to hide because the key legitimately may or may not have been seen yet in this loop. The external reflection record's fields (`reflected_check["name"]`, `["sqltext"]`) are accessed directly and would crash on malformed input, so defensive handling of the Tier-3 reflection data is not what the setdefault is doing. The rationale matches the visible code.
