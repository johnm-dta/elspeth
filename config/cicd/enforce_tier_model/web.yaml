- key: web/sessions/schema.py:R8:_validate_named_checks:fp=e75ee95cad4cfaee
  owner: john
  reason: |-
    `src/elspeth/web/sessions/schema.py:304` creates `expected_sql` as a fresh local accumulator (`expected_sql: dict[str, set[str]] = {}`), and `src/elspeth/web/sessions/schema.py:311` uses `expected_sql.setdefault(str(constraint.name), set()).add(...)` only to group compiled CHECK SQL by constraint name while walking first-party SQLAlchemy `table.constraints`. This is not a defensive read from Tier-1 audit data and does not mask corruption: after the accumulator is built, `src/elspeth/web/sessions/schema.py:327-342` compares expected vs reflected constraint names and SQL sets and calls `_schema_error(...)` on mismatch. This suppression is valid only while the setdefault target remains this fresh local grouping dict and mismatches still fail closed via `_schema_error`.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-09-15'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-17T16:06:16.185413+00:00'
