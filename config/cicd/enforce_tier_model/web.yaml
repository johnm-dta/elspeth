- key: web/auth/entra.py:R1:EntraAuthProvider:authenticate:fp=564181fecfacb986
  owner: john
  reason: |-
    In EntraAuthProvider.authenticate (entra.py:114), `username=payload.get("preferred_username") or sub` reads an OIDC token claim — Tier-3 external IdP data. The required `sub` claim is accessed with direct subscript and raises AuthenticationError on absence (offensive, lines 105-108); `preferred_username` is genuinely optional in Entra tokens, so `.get()` returning None (or empty) falls back to the already-validated `sub`. This is meaning-preserving Tier-3 handling at the IdP boundary — absence of the optional display name is not fabrication, and the identity remains anchored to the required `sub`. Distinguishing required-claim (crash) from optional-claim (fallback) is exactly the correct boundary discipline.
