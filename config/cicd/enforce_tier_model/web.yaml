    This is a prescribed WebSocket protocol-boundary translation, not a silent Tier-1 suppression. In `websocket_run_progress`, the handler first performs the ownership check at `src/elspeth/web/execution/routes.py:1285-1289` with `run_ownership = await service.verify_run_ownership(user, run_id)` and maps ordinary absence to `await websocket.close(code=4004, reason="Run not found")`. The disputed handler at `src/elspeth/web/execution/routes.py:1290` is narrower: `except RunSessionIntegrityError as integrity_exc:`. The site-specific comment says the condition is "Tier-1 sessions-DB corruption" and explicitly rejects laundering it into not-found: "surfacing it as 4004 would launder internal referential corruption into a benign client response" (`src/elspeth/web/execution/routes.py:1291-1298`). The code then emits the operator-visible error event `slog.error("websocket_run_ownership_session_integrity_error", run_id=run_id, session_id=integrity_exc.session_id, error=str(integrity_exc))` at `src/elspeth/web/execution/routes.py:1299-1304` and closes the already-accepted external WebSocket with internal-error code `1011` at `src/elspeth/web/execution/routes.py:1305`. Future drift should invalidate this suppression if the catch widens beyond `RunSessionIntegrityError`, drops the `slog.error(...)` fields, maps the corruption to `4004`, or stops closing with `1011`.
