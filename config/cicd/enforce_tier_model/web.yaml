  judge_rationale: |-
    This is a legitimate filesystem boundary suppression: rmdir on the shared quarantine_root parent directory will raise ENOTEMPTY when other sessions still have quarantined data there, and may raise transient OSErrors under concurrent purge. The expected non-empty case is precisely what should be silently skipped — the session-scoped cleanup already succeeded via rmtree above. The suppression is narrowly scoped (contextlib.suppress(OSError) on a single rmdir call), the rationale correctly identifies the boundary (filesystem state shared across sessions) and explains why propagation would be wrong (archive outcome already committed). Not a Tier-3 input boundary, so the decorator does not apply.
