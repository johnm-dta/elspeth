- key: web/sessions/engine.py:R1:create_session_engine:_begin_immediate:fp=d823ee01639278b7
  owner: john
  reason: |-
    This is a legitimate prescribed optional-control-flag pattern, not defensive handling of Tier-1 audit/session data. In `src/elspeth/web/sessions/engine.py:94-101`, `_begin_immediate()` is a SQLAlchemy `begin` event hook that chooses the transaction verb. The key is intentionally absent for ordinary read/autobegin connections, and only present when the factory's explicit session-write path marks the connection at `src/elspeth/web/sessions/engine.py:109-111`: `write_conn = conn.execution_options(**{_SESSION_WRITE_INTENT_OPTION: True})`. Therefore `conn.get_execution_options().get(_SESSION_WRITE_INTENT_OPTION, False)` at line 98 is testing an optional internal execution option from SQLAlchemy's connection-options map, where absence means the documented deferred `BEGIN` path in lines 100-101. Reifying with `[...]` would crash the normal read path rather than exposing corruption. This suppression is valid only while `_SESSION_WRITE_INTENT_OPTION` remains an optional execution option set by `_begin_session_write()` and absence continues to mean non-write-intent.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-09-15'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-17T16:06:08.789789+00:00'
