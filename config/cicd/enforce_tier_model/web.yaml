- key: web/composer/boot_probe.py:R6:probe_composer_config:fp=17f8a88608915344
  owner: john
  reason: |-
    probe_composer_config returns an explicit bool status for boot-time composer provider probing. BadRequestError is converted to ComposerBootConfigError because it indicates operator-set sampling config was rejected and must fail boot. The except (LiteLLMAPIError, OpenAIProviderError, TimeoutError, httpx.HTTPError) catches only expected external provider/network/transient failures and returns False, which the caller records as probe_status='transient_failure' with structured warning/telemetry. This is an external-call boundary with an explicit result, not silent swallowing or bug hiding; unexpected local exceptions are not caught here and propagate to the caller.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
