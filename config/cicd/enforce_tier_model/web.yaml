  reason: |-
    Tier-3 filesystem boundary in archive_session rollback. The primary DB transaction has already failed (primary_exc captured at L1677). We attempt to rename the staged quarantine directory back to its original blob_dir location so the session blob remains readable. If that restore rename itself fails with OSError (disk full, permission, FS race, intermediate dir vanished), we add an exception note to primary_exc and re-raise primary_exc — the operator sees both failures, the primary is never swallowed.
