  reason: 'Constant-table lookup: ``_MIME_TO_SOURCE`` maps known MIME types to (plugin,
    mime_extra) pairs. ``blob[''mime_type'']`` was just read from a validated blob
    row; a value not in the inference table means we cannot auto-pick a source plugin
    — the caller must specify ``plugin`` explicitly. The ``.get(...)`` is the lookup;
    the None branch emits a typed _failure_result naming the unsupported MIME (line
    161-164).'
  safety: Missing MIME maps to a typed _failure_result with an actionable repair message
    (specify plugin explicitly); not a silent swallow.
  expires: '2026-08-23'
