- key: web/sessions/service.py:R6:SessionServiceImpl:archive_session:_sync:fp=be42dba4d947b479
  owner: web-sessions
  reason: Tier-3 filesystem boundary in archive_session rollback. The primary DB transaction
    has already failed (primary_exc captured at L1677). We attempt to rename the staged
    quarantine directory back to its original blob_dir location so the session blob
    remains readable. If that restore rename itself fails with OSError (disk full,
    permission, FS race, intermediate dir vanished), we add an exception note to primary_exc
    and re-raise primary_exc — the operator sees both failures, the primary is never
    swallowed.
  safety: Narrowed to OSError only. primary_exc.add_note carries type(restore_exc),
    the source and destination paths, and 'Manual cleanup required'. The raise on
    L1689 propagates the original DB-layer failure.
  expires: '2026-08-23'
- key: web/sessions/service.py:R6:SessionServiceImpl:archive_session:_sync:fp=63c9e8a7006387b6
  owner: web-sessions
  reason: Post-commit quarantine purge in archive_session::_sync. The session-row
    delete has already committed and from the caller's perspective the archive succeeded;
    this is best-effort filesystem cleanup of the staged blob dir. If shutil.rmtree
    raises OSError (file lock, permission, partial filesystem state), we intentionally
    early-return so the directory remains in quarantine for manual cleanup rather
    than raising a misleading 'archive failed' error after the DB rows are gone.
  safety: Narrowed to OSError only. Inline comment L1691-1694 documents the quarantine-on-cleanup-failure
    invariant. Subsequent quarantine_root rmdir is gated by this early return so we
    never attempt parent removal when the child cleanup failed.
  expires: '2026-08-23'
- key: web/sessions/service.py:R7:SessionServiceImpl:archive_session:_sync:fp=6ae7c31a28b59d28
  owner: web-sessions
  reason: Best-effort rmdir of the parent quarantine_root once the session-scoped
    staged dir was successfully removed by the rmtree above. The parent may be non-empty
    (other sessions still quarantined under the same root) or raise transient OSError
    under concurrent purge — none of these conditions change the archive outcome and
    must not propagate.
  safety: Reached only after the session-scoped rmtree succeeded. contextlib.suppress
    is narrowed to OSError only; non-FS exceptions propagate. The session's own quarantine
    artefact is already gone.
  expires: '2026-08-23'
