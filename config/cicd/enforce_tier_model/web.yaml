- key: web/app.py:R1:_BodySizeLimitMiddleware:dispatch:fp=9519401fd195b0ac
  owner: web-app
  reason: Tier 3 — request.headers.get('content-length') reads an optional HTTP header
    from untrusted client input; absent header means no declared size and the request
    proceeds to per-field Pydantic caps which are the actual guarantee.
  safety: Absent header is the expected control-flow branch (Content-Length is optional
    in HTTP); when present and over the 10 MB ceiling, the request short-circuits
    with a 413 before any handler or downstream middleware touches the body. The Pydantic
    per-field caps (SendMessageRequest.content 64 KiB, _InlineBlobModel.content 256
    KiB) remain the binding contract.
  expires: null
