- key: web/auth/entra.py:R1:EntraAuthProvider:authenticate:fp=564181fecfacb986
  owner: john
  reason: |-
    EntraAuthProvider.authenticate (entra.py:94-115) consumes a decoded Entra ID token payload — Tier-3 external IdP data produced by JWKSTokenValidator.decode_token after signature/expiry/issuer/audience validation. The REQUIRED claim is enforced offensively: payload['sub'] at 106 raises AuthenticationError on absence (105-108). The flagged payload.get('preferred_username') or sub at line 114 reads the OPTIONAL OIDC claim, with the in-source comment (112-113) stating the contract: preferred_username is optional and falls back to sub if absent, null, or empty. The fallback is not fabrication — sub is the already-validated authenticated subject identifier, the honest canonical name for the identity when the IdP supplies no display username. Invalid if preferred_username becomes required, if the fallback ever substitutes anything other than the validated sub, or if the strict sub enforcement above is weakened.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
