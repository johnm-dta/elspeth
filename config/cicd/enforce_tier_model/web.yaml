  judge_confidence: 0.83
  judge_rationale: |-
    The suppression is at a legitimate concurrency boundary: queue.empty() and queue.get_nowait() race when the event loop has multiple consumers, so QueueEmpty between the empty() check and the get_nowait() is the documented expected outcome of the race, not a defect being silenced. The surrounding code shows offensive intent — terminal events MUST be delivered, the loop drains until empty, and the subsequent put_nowait is asserted to succeed. contextlib.suppress narrowly scoped to QueueEmpty on a single get_nowait call is the idiomatic Python pattern for this race and does not hide bugs in code we control. Not a Tier-3 boundary; decorator does not apply.
