  judge_policy_hash: 'sha256:08052cb8f2c263c39dc61336444e6f2b2859292e283a902510827744f18d68da'
  judge_confidence: 0.82
  judge_rationale: |-
    RULE MISFIRES — `_ddl_if` is a SQLAlchemy library-internal private marker that is set only when `.ddl_if(...)` has been called on the constraint; its absence is the documented, semantically-meaningful 'no dialect filter' state. This is a third-party-library introspection boundary, not first-party data we own: SQLAlchemy's contract is precisely that the attribute may or may not exist, and `getattr(..., None)` is the prescribed probe for that optional private marker. R2's premise (a missing attribute indicates a type/contract bug to fix) does not hold here — the attribute's optionality is the contract. The follow-on access `ddl_if.dialect` is direct (offensive) once non-None is established, consistent with policy.
