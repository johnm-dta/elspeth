  judge_confidence: 0.8
  judge_rationale: |-
    RULE MISFIRES / PRESCRIBED FORM: `payload` is a decoded Entra ID (OIDC) token — Tier-3 external IdP data whose shape is NOT first-party-guaranteed, so `.get()` on the genuinely-optional `preferred_username` claim is the honest boundary read, not the forbidden defensive pattern (which applies only when shape is contractually guaranteed). The required `sub` claim is enforced offensively above (105-108 raise AuthenticationError on absence), and the `or sub` fallback is meaning-preserving, not fabrication: sub is a validated, IdP-provided value that is the canonical subject identifier, so an auditor querying `username` always receives something the external system actually asserted (fabrication test Q1/Q3 pass — recording None for a mandatory identity field is not the honest alternative here). The rationale is site-specific, cites lines, states the contract and precise invalidation conditions, and the code corroborates it. Decorator nudge does not apply: the suppressed subject is rooted at `payload`, the return of `decode_token(token, ...)`, not derived from the `token` parameter via subscript/attribute/assignment/iteration, so the decorator's source_param tracking would not mechanically cover it.
