- key: web/middleware/request_id.py:R1:RequestIdMiddleware:dispatch:fp=a17a1317c0fa8e7b
  owner: web-middleware
  reason: "Tier 3 trust boundary \u2014 inbound X-Request-ID header is untrusted\nexternal input and is explicitly optional\
    \ by design. request.headers\nis a multidict; the .get(name, \"\") default matches the protocol\nconvention that an absent\
    \ header is equivalent to an empty one, and\nthe middleware's validator (_is_safe_request_id) treats \"\" as a\nsafety\
    \ violation and regenerates a fresh UUID4. Direct subscript\nwould raise KeyError on every request without the header,\
