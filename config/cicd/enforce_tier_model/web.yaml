    the well-known double-checked-locking idiom. Never silently proceeds
    without a lock — the caller always receives a Lock instance or raises.
  expires: '2026-08-23'
- key: web/composer/tools/blobs.py:R1:_session_blob_lock:fp=6b8220b09146a904
