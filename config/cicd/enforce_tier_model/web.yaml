  owner: web-app
  reason: "Tier 3 \u2014 public ``/metrics`` scrape endpoint. ``generate_latest()`` walks the global Prometheus REGISTRY and\
    \ runs collector code we do not own; a collector raising on a corrupted state would, under Starlette's default 500 handler,\
