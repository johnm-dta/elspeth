- key: web/app.py:R6:lifespan:fp=8b1a306f70589e10
  owner: john
  reason: |-
    This is a startup Tier-3 external service probe, not Tier-1 audit-data handling. In `src/elspeth/web/app.py:450-458`, `lifespan` calls `await asyncio.wait_for(probe_composer_config(...), timeout=_COMPOSER_BOOT_PROBE_TIMEOUT_SECONDS)` for `settings.composer_model` and `settings.composer_advisor_model`; that probe crosses the LLM/provider boundary and is explicitly optional runtime readiness, guarded by `if settings.composer_boot_probe_enabled:` at line 434. The `except TimeoutError:` at `src/elspeth/web/app.py:469` does not silently hide internal corruption: it reifies the timeout as `probe_status = "transient_failure"` and emits `slog.warning("composer_boot_probe_transient_failure", ..., failure_class="TimeoutError", timeout_seconds=..., action="booting; composer LLM calls will be exercised at first use")` at lines 470-477. The same `finally` block records the final status and latency to telemetry counters at lines 487-491. Structural/local failures are not suppressed: `ComposerBootConfigError`, `asyncio.CancelledError`, and unexpected `Exception` are re-raised at lines 478-486. This suppression is therefore valid only while the caught exception remains the bounded `wait_for` timeout around the external composer boot probe and continues to set `probe_status` plus emit the explicit warning/telemetry shown here.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-09-15'
