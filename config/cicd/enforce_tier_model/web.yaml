  owner: john
  reason: |-
    This is a volatile, lazily-created per-session lock cache, not Tier-1 audit data. The site defines `_session_locks` as an internal asyncio lock map and documents that entries are "lazily created" and "cleaned up on session deletion" at `web/execution/service.py:310-313`. The flagged line is the deletion cleanup path: `web/execution/service.py:376-382` defines `cleanup_session_lock()` and calls `self._session_locks.pop(session_id, None)` after `archive_session()` completes. Because the map is lazy, a deleted session may legitimately have no cached lock entry to remove; the default is an idempotent cache-cleanup form, not a hidden missing audit key or corrupted engine invariant. Drift that makes every session require a pre-existing lock before deletion would invalidate this suppression.
