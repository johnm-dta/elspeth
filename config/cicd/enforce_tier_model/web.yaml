- key: web/sessions/service.py:R1:SessionServiceImpl:prune_state_versions:_sync:fp=ecfa1eb58e52ae14
  owner: web-sessions
  reason: Cross-table reference walk in prune_state_versions. derived_from_map is
    built from composition_states_table for the current session; seeds is the union
    of keep_ids (caller param), run_referenced (from runs table), and message_referenced
    (from chat_messages_table). A seed id can legitimately not appear in derived_from_map
    when a run or chat message references a composition state that has already been
    pruned or that lives in a different session. .get() returning None is the correct
    termination signal for the while-loop on L3707.
  safety: Loop terminates on parent is None. lineage_protected only grows with IDs
    that DO appear in derived_from_map. No silent default is fabricated into audit
    data — None is interpreted as 'walk terminates here', and the prune candidate
    set is conservative (protects strictly more than the true closure, never less).
  expires: '2026-08-23'
- key: web/sessions/service.py:R1:SessionServiceImpl:prune_state_versions:_sync:fp=d3febd70c6d39c8e
  owner: web-sessions
  reason: Inner step of the same lineage walk in prune_state_versions. After protecting
    a parent at L3708, advance to its parent via derived_from_map.get(). Returns None
    when the lineage reaches a root state (derived_from_state_id IS NULL in the DB)
    or leaves the session's state table (cross-session fork ancestor). Both are correct
    termination conditions; the while-loop reads parent is None and exits.
  safety: Termination signal, not silent default. lineage_protected only grows with
    present IDs so prune candidates on L3713 are computed against the true protected
    set.
  expires: '2026-08-23'
