- key: web/sessions/routes/messages.py:R7:register_message_routes:send_message:fp=be313c147c5a50be
  owner: web-sessions
  reason: |-
    asyncio cancellation boundary in send_message's CancelledError handler. On client-disconnect/operator-cancel during the composer-engaged window we must still persist the partial llm_calls audit record. asyncio.shield decouples the child coroutine from the cancelling outer task; the outer 'await asyncio.shield(...)' re-raises CancelledError on the cancelling task while the shielded coroutine keeps running. contextlib.suppress catches THAT re-raised CancelledError so we can proceed to the cancelled-progress publish below and the outer 'raise' on L795 that restores the cancel chain.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-28'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-05-30T04:47:24.730479+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:ee8359775f8cd9b8849912ecc4155fa4df8f2d86fabad8289b5acf1e795c87b6'
  judge_confidence: 0.85
  judge_rationale: |-
    This is a legitimate use of contextlib.suppress(CancelledError) at an asyncio cancellation boundary, not defensive error-swallowing. The pattern `await asyncio.shield(...)` deliberately re-raises CancelledError on the awaiting task while the shielded coroutine completes in the background; suppressing that re-raised CancelledError is the documented idiom for ensuring the partial llm_calls audit record persists and the cancelled-progress event publishes before the outer `raise` on L795 restores the cancel chain. The suppression is narrowly scoped to CancelledError only (not bare Exception), and the audit-trail-first ordering (persist llm_calls, then publish progress, then re-raise) is consistent with the Auditability Standard and telemetry primacy. R7 (silent exception suppression) is the correct rule to flag this pattern generally, but this site is the structural exception the rule contemplates.
  judge_signature_version: 2
  scope_fingerprint: 2bced425e8dac03bdbdaf483c9a19c7b55c8ecef17e18037600215aa8aa5a1ab
