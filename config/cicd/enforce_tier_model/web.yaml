    ``_SESSION_BLOB_LOCKS_REGISTRY_MUTEX`` after the fast-path probe missed.
    Required by the double-checked-locking idiom: a competing thread may have
    installed the lock between the fast-path miss and the mutex acquisition.
    Without this re-read two callers would each install a different Lock for
    the same session_id.
  safety: >-
    Under the registry mutex, miss-then-install is atomic; hit-then-return is
    safe because the installed lock outlives any caller. No lock leak (locks
