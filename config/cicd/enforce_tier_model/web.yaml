- key: web/composer/tools/_common.py:R1:validate_composer_file_sink_collision_policy:fp=89db23813aaa62c8
  owner: composer-tools-common
  reason: >-
    Tier-3 read of LLM-authored sink options. ``mode`` is the file-sink mode
    key (``Literal["write", "append"]``); the default ``"write"`` matches the
    Pydantic schema default on file-sink config models
    (``CSVSinkConfig.mode`` at ``plugins/sinks/csv_sink.py:57`` and
    ``JSONSinkConfig.mode`` at ``plugins/sinks/json_sink.py:63``, both
