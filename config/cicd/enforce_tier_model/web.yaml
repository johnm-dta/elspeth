- key: web/sessions/schema.py:R5:_ddl_constraint_applies_to_dialect:fp=b4c49376d69ac4bd
  owner: john
  reason: |-
    This is a narrow SQLAlchemy dialect-filter adapter, not defensive handling of ELSPETH Tier-1 audit data. In `src/elspeth/web/sessions/schema.py:303-310`, `_validate_named_checks()` calls `_ddl_constraint_applies_to_dialect(constraint, dialect.name)` only while deriving the expected CHECK-constraint set from SQLAlchemy `CheckConstraint` metadata. The flagged branch is site-specific to SQLAlchemy's conditional-DDL shape: `src/elspeth/web/sessions/schema.py:348-356` reads `constraint._ddl_if`, then its `dialect`, and handles the two SQLAlchemy target forms with `if isinstance(target, str): return target == dialect_name; return dialect_name in target`. A future drift where `target` stops being the SQLAlchemy `_ddl_if.dialect` value for a `CheckConstraint`, or this helper starts validating persisted session-DB rows, would invalidate this suppression.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-09-15'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-06-17T16:06:38.404290+00:00'
