- key: web/composer/tools/generation.py:R5:_value_transform_preserves_field:fp=dcfcc5591c34166e
  owner: john
  reason: |-
    PRESCRIBED FORM at a Tier-3 boundary. In `_value_transform_preserves_field`, `operations = node.options["operations"]` is composer/operator-authored node configuration re-read from persisted session state — Tier-3 origin per the custody doctrine (persistence does not promote external-origin values: we authored the NodeSpec container, the operator or composer LLM authored the values, and re-reading persisted config is a fresh Tier-3 boundary because the store is mutable and the validating contract can drift). `isinstance(operations, (list, tuple))` and `isinstance(operation, Mapping)` are subtype-aware shape validation of that external value before iterating and subscripting: CompositionState options are deep-frozen, so a JSON array arrives as a tuple and a JSON object as a MappingProxyType — a `type(operations) is list` or `type(operation) is dict` check would wrongly reject the frozen subtypes the engine actually produces (the inline comment at this site documents exactly this). The function returns False on shape mismatch (a meaningful "this node does not provably preserve the field" abstention — honest, no coercion, no fabrication), so it is a non-raising accessor for which the @trust_boundary decorator is infeasible (its contract requires a raising-rejection test_ref). Per-line allowlist suppression is therefore the prescribed honest mechanism, consistent with the judge's prior adjudications of this shape in this file (web.yaml:553/1431/2850).
