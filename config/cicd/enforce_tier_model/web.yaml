- key: web/sessions/schema.py:R2:_ddl_constraint_applies_to_dialect:fp=e43d24d0445b8247
  owner: john
  reason: |-
    `src/elspeth/web/sessions/schema.py:348` is a prescribed compatibility/introspection boundary over optional SQLAlchemy DDL metadata, not a Tier-1 audit-data read. The enclosing validator builds expected CHECK DDL from SQLAlchemy metadata only when `type(constraint) is CheckConstraint` and `_ddl_constraint_applies_to_dialect(constraint, dialect.name)` returns true at `src/elspeth/web/sessions/schema.py:305-310`. The flagged line, `ddl_if = getattr(constraint, "_ddl_if", None)`, probes SQLAlchemy's optional private marker created only by `.ddl_if(...)`; absence means the constraint is unconditional and the helper returns `True` at lines 349-350. This suppression is valid only while the helper remains limited to SQLAlchemy `CheckConstraint` DDL metadata/dialect filtering. If it drifts into persisted session rows, schema sentinels, or engine-owned audit facts, the default would become a Tier-1 violation and must be reified or crash.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-09-15'
  judge_verdict: ACCEPTED
