- key: web/sessions/routes/messages.py:R6:register_message_routes:send_message:fp=6ffa502bacb1e244
  owner: web-sessions
  reason: Bounded await of the background auto_title_task in send_message's finally-block.
    asyncio.wait_for(timeout=2.0) is the scheduling bound; on TimeoutError we cancel
    the runaway task and let the route return. Per the inline comment L799-804, expected
    provider/timeout failures inside the auto-title coroutine are recorded inside
    the task itself; this handler addresses ONLY the wait_for scheduling timeout,
    not the inner task exception. Programmer bugs and DB write failures inside the
    task surface as the task's own exception (re-raised by wait_for) and are NOT caught
    by this except clause.
  safety: Narrowed to TimeoutError only (NOT bare Exception). auto_title_task.cancel()
    signals the task; the strong reference keeps the task alive for the event loop's
    weak-ref GC window. Non-TimeoutError exceptions from inside the task propagate
    out of the finally-block.
  expires: '2026-08-23'
- key: web/sessions/routes/messages.py:R7:register_message_routes:send_message:fp=be313c147c5a50be
  owner: web-sessions
  reason: asyncio cancellation boundary in send_message's CancelledError handler.
    On client-disconnect/operator-cancel during the composer-engaged window we must
    still persist the partial llm_calls audit record. asyncio.shield decouples the
    child coroutine from the cancelling outer task; the outer 'await asyncio.shield(...)'
    re-raises CancelledError on the cancelling task while the shielded coroutine keeps
    running. contextlib.suppress catches THAT re-raised CancelledError so we can proceed
    to the cancelled-progress publish below and the outer 'raise' on L795 that restores
    the cancel chain.
  safety: Narrowed to asyncio.CancelledError only — no other exception class is suppressed.
    Inline comment L757-766 documents the nested-cancel invariant. The 'raise' on
    L795 propagates the original CancelledError to the client.
  expires: '2026-08-23'
- key: web/sessions/routes/messages.py:R7:register_message_routes:send_message:fp=1a85561c51205f0c
  owner: web-sessions
  reason: Same asyncio cancellation boundary as L769, applied to the discriminated
    cancelled-progress publish. The shielded _publish_progress emits the client_cancelled_progress_event
    to the progress registry so /_active pollers see the terminal state; the outer
    await re-raises CancelledError on the cancelling task, which contextlib.suppress
    absorbs so the outer 'raise' on L795 can restore the original cancel chain.
  safety: Scoped to asyncio.CancelledError only. Inline comment L780-784 documents
    the shielded-publish-runs-in-background / outer-await-resumes-cancel invariant.
    terminal_status is set to 'cancelled' for the finally-block telemetry decrement.
  expires: '2026-08-23'
