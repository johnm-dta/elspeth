- pattern: web/composer/telemetry_phase8.py
  rules:
  - R4
  owner: web-composer
  reason: 'Telemetry-only exemption per CLAUDE.md §"Telemetry and Logging" / logging-telemetry-policy.
    Every record_* helper wraps its underlying counter .add(...) call in try / except
    Exception that swallows and returns None. Rationale (W5 — load-bearing per docs/composer/ux-redesign-2026-05/20-phase-8-polish-and-telemetry.md):
    telemetry is best-effort; a broken OTel exporter must not 500 a PATCH whose audit
    row already wrote. Audit primacy: audit fires sync + crash-on-failure BEFORE the
    emit; if the emit then raises, the audit record stands but the user request would
    otherwise fail after the fact, inverting primacy. The _assert_session_trust_mode
    / _assert_account_mode / _assert_completion_verb ValueErrors fire BEFORE the try/except
    wrap so input-validation programmer-error guards still propagate.'
  safety: Exception is silently consumed and the helper returns None; the audit row
    (where present) is the legal record per CLAUDE.md primacy. The assert-before-try
    ordering is verified by tests/unit/web/composer/test_telemetry_phase8.py::test_record_session_switched_assert_runs_before_swallow;
    W5 swallow behaviour is verified by test_helper_swallows_exporter_failure parametrised
    across every record_* helper. Future emit-site additions should reuse the same
    wrap shape — extending this allowlist max_hits requires re-reading the W5 rationale
    section in the Phase 8 plan.
  expires: null
  max_hits: 11
