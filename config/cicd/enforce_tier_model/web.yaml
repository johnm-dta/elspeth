  judge_confidence: 0.88
  judge_rationale: |-
    RULE MISFIRES at a genuine Tier-3 boundary. The JWT header is external-origin data from a remote IdP, and per RFC 7515 the 'kid' field is optional — no first-party contract guarantees its presence. The .get() result is not silently coerced: a None kid flows into the matching loop and, if no JWK matches, raises a typed AuthenticationError, which is the correct routing for a recoverable external-input failure. This is meaning-preserving boundary handling (absence recorded as None, surfaced as auth failure), not fabrication or silent recovery.
