  owner: john
  reason: |-
    PRESCRIBED FORM — web-boundary integrity handler that records and fails honestly, no fabrication. In create_execution_router.websocket_run_progress (web/execution/routes.py:849 seed path, and :882 idle-timeout recheck path — same handler, two phases), `except (ValidationError, _RunStatusIntegrityError) as integrity_exc` wraps _load_run_status_snapshot_with_accounting(). The catch is intentionally narrow to two types and its TRUE scope is broader than "pure Tier-1 corruption": _RunStatusIntegrityError is raised (routes.py:180) when load_run_accounting_for_settings — the Landscape-derived accounting projection — fails to load/compute (a Tier-1 projection integrity failure on our own audit data); ValidationError is re-raised (routes.py:186-187) from service.get_status() building the run-status response model, which covers BOTH a Tier-1 data anomaly (our accounting/run_record values fail the response model) AND an our-code projection-construction fault (a bug building the model). It is not a silent swallow: in every case the handler records the full detail via slog.error (run_id, phase=seed|idle_recheck, error=str(integrity_exc)) — the documented channel for an audit/accounting-system failure per CLAUDE.md logging policy, because the Landscape carries the run audit, not this projection-layer failure — and then closes the WebSocket with code 1011 and reason "Run status failed internal accounting validation" and returns/breaks. CRITICALLY it never fabricates a run status: it does not send a synthesized "completed"/"running" event, so the external client receives an honest internal-error close, not a wrong answer. This is the Tier-1 doctrine correctly applied at a web boundary (feedback_tier1_explicit_vs_implicit_fabrication: "exception not implicit transformation") — crashing the whole web process for one run's projection failure would be a DoS on all other clients, so failing that one connection honestly and recording the detail is the correct graceful management. R6 is a syntactic detector that does not recognise slog.error + websocket.close(1011) + return as explicit handling. The handler is an async WebSocket route body, not a row-producing generator; per-line allowlist is the prescribed honest mechanism (the @trust_boundary decorator is a Tier-3-only construct and would mislabel this Tier-1/our-code integrity handler).
