  owner: web-composer
  reason: Companion to the R5 entry above — the ``.get(name)`` call inside the Optional-container
    traversal handles the absent-intermediate case (when the Pydantic model field
    is None at runtime).  Forbidden-defensive elsewhere because typed dataclass field
    access (``obj.field``) is the project standard, but this closure operates on the
    ``model_dump()`` dict representation (not the Pydantic dataclass), where Optional-as-None
    is surfaced as a literal None value in the dict that the walker must traverse
    without crashing.  The walker contract (spec §4.2.5) emits TraversalNodes for
    the typed paths; the substitute_provider must match the walker's traversal regardless
    of which Optional arms are populated at a specific runtime invocation.
  safety: Skips frontier entries whose ``.get(name)`` returns None (the Optional-arm-absent
    case).  No silent default coercion — absent leaves are correctly omitted from
    the substitution set, matching the audit semantics (no leaf exists, no substitution
    needed).
  expires: null
