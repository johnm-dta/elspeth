    \ False), and deliberately lets\nFingerprintKeyMissingError and SecretDecryptionError propagate to\nthe app-level handlers\
    \ in web/app.py, which map them to 503 / 409\nrespectively. A broader catch would defeat the typed-error design\nand regress\
    \ to \"validate silently reports available=False with no\ndeployment guidance\" \u2014 the defect this method exists to\
