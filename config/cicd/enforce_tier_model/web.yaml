- key: web/app.py:R6:_periodic_orphan_cleanup:fp=f1a6f4177f16c388
  owner: john
  reason: |-
    Codex's framing ("Tier-1 audit/database failures are swallowed") is refuted by the exception taxonomy. The catch at src/elspeth/web/app.py:238 is the narrow `except (SQLAlchemyError, OSError)`, not a bare `except Exception`. The Tier-1 audit invariant on this state is carried by AuditIntegrityError, which is @tier_1_error-decorated (src/elspeth/contracts/errors.py:705-714) and subclasses Exception DIRECTLY — runtime-verified MRO [AuditIntegrityError, Exception, BaseException, object] and issubclass against SQLAlchemyError/OSError both False. _finalize_orphaned_landscape_runs raises it at app.py:181 for a missing Landscape row; the deeper write/read path raises AuditIntegrityError/LandscapeRecordError(AuditIntegrityError) (core/landscape/errors.py:17, runtime-confirmed not a SQLAlchemyError subclass). None of these are in the except tuple, so genuine audit failure propagates out of the while-loop and terminates the task. That dead task is surfaced to the operator at teardown: orphan_task is awaited under contextlib.suppress narrowed to CancelledError ONLY (app.py:527-529), so a task that died from an uncaught exception re-raises its stored exception at `await orphan_task` during lifespan shutdown. Programmer-bug exceptions (AttributeError/TypeError/AssertionError) are likewise outside the tuple and propagate, as documented (app.py:246-258). What the except absorbs is exactly and only recoverable persistence/IO transients: cancel_all_orphaned_run_records mutates the session store inside a single self._engine.begin() transaction (sessions/service.py:4748-4768), so a SQLAlchemyError rolls back atomically — no partial cancellation persists — and OSError covers SQLite file-level faults escaping before SQLAlchemy wraps them. Absorbing these in a periodic, idempotent, best-effort loop is correct: the loop sleeps and re-derives live runs from scratch next interval (app.py:215-218), the orphaned run stays protected by the partial-unique-index, and Landscape finalization is gated behind the successful return so it is simply re-attempted rather than left half-applied. The exc_info omission (app.py:260-266) is the standardised DSN/path-leak redaction, logging exc_class for triage correlation, not error suppression. This is a correctly-narrowed catch that respects the three-tier model by letting the audit invariant crash with provenance; no edit is warranted.
  safety: |-
