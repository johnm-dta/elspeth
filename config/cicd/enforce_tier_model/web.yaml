- key: web/sessions/routes/messages.py:R6:register_message_routes:send_message:fp=6ffa502bacb1e244
  owner: web-sessions
  reason: |-
    Bounded await of the background auto_title_task in send_message's finally-block. asyncio.wait_for(timeout=2.0) is the scheduling bound; on TimeoutError we cancel the runaway task and let the route return. Per the inline comment L799-804, expected provider/timeout failures inside the auto-title coroutine are recorded inside the task itself; this handler addresses ONLY the wait_for scheduling timeout, not the inner task exception. Programmer bugs and DB write failures inside the task surface as the task's own exception (re-raised by wait_for) and are NOT caught by this except clause.
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-28'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-05-30T04:47:08.294981+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:ee8359775f8cd9b8849912ecc4155fa4df8f2d86fabad8289b5acf1e795c87b6'
  judge_confidence: 0.82
  judge_rationale: |-
    The except TimeoutError handler narrowly catches only the asyncio.wait_for scheduling timeout — a legitimate concurrency-boundary condition where the background task exceeds its 2-second budget and must be cancelled to let the route return. The inline comment correctly documents that inner task exceptions (programmer bugs, DB failures) are re-raised by wait_for and propagate past this handler; only the scheduling TimeoutError is suppressed, with the explicit remediation of cancelling the runaway task. This is offensive programming at a concurrency boundary, not silent error swallowing: the timeout is a real condition with a meaningful response (cancel), not a defensive default. R6 fires on the bare-except pattern but the narrow exception type and bounded remediation match the policy's allowed concurrency-boundary handling.
  judge_signature_version: 2
