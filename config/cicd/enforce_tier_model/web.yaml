  owner: web-execution
  reason: |-
    Subscriber map creates the per-run queue→state mapping lazily on first subscription
  safety: |-
    Suppression gated by cicd-judge; see judge_rationale below.
  expires: '2026-08-28'
  judge_verdict: ACCEPTED
  judge_recorded_at: '2026-05-30T06:26:06.876430+00:00'
  judge_model: anthropic/claude-4.7-opus-20260416
  judge_policy_hash: 'sha256:3f52726032979c1f98920606d7207e66c95b7a76e43cd59622818dddfa601ad0'
  judge_confidence: 0.86
  judge_rationale: |-
    R8 flags dict.setdefault() as hiding missing-key bugs, but here setdefault is being used for its legitimate purpose: lazy initialization of a nested per-run subscriber map on first subscription. There is no 'missing-key bug' to hide — the contract is precisely that the run_id key may or may not exist yet when a subscriber connects, and the empty dict is the correct initial value (not a fabricated default substituting for real data). This is internal first-party state (Tier-1-ish process state, not external data), the value being inserted is a fresh empty container, and the alternative (check-then-insert) would be strictly worse under the held lock. The rationale correctly identifies the lazy-initialization pattern that R8's remediation guidance does not apply to.
