    This is a prescribed control-flow probe, not defensive swallowing of audit or pipeline data. In `web/sessions/service.py:1954-1959`, the enclosing function documents that `asyncio.get_running_loop()` is used to detect whether this synchronous persistence primitive was incorrectly called from async land, and that `RuntimeError` is the canonical signal for the "no running loop" case. The caught site at `web/sessions/service.py:1986-1991` is exactly that probe: `try: asyncio.get_running_loop()` followed by `except RuntimeError:` and `pass`, with the site-specific comment "No running loop in this thread -- we are in a worker thread / or pure sync test context. Proceed." The `else` branch at `web/sessions/service.py:1992-1998` then raises a new `RuntimeError` when a loop is present, preserving the intended crash-on-misuse behavior. Future drift that catches a broader exception, wraps database/audit writes, or removes the async-loop guard semantics would invalidate this suppression.
