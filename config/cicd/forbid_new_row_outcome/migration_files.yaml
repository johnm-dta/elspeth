# ADR-019 migration allowlist for forbid_new_row_outcome.py.
#
# Files listed here may reference RowOutcome.X during the remaining migration
# window. New source files outside this list must use
# (TerminalOutcome, TerminalPath) pairs and must not hardcode legacy
# RowOutcome value strings against an outcome symbol.
#
# Final Phase 5 scope:
# - enums.py defines RowOutcome until Stage 5 deletes it.
# - testing/__init__.py re-exports RowOutcome alongside the new enums until
#   Stage 5 trims the testing helper surface.
# - tests/ retains only compatibility fixtures, mapping-table tests, scanner
#   fixtures, and commentary references; real engine-output assertions have
#   been migrated to (TerminalOutcome, TerminalPath).
#
# Stage 5 deletes RowOutcome and this allowlist (and the script that
# consults it) — the partition assertion in contracts/enums.py becomes the
# only enforcement of the (TerminalOutcome, TerminalPath) closed set.
#
# Allowlist entry rules:
# - 'file' is a path RELATIVE TO THE REPO ROOT.
# - A trailing '/' makes the entry a directory-prefix match (allows every
#   .py file under that subtree).
# - Anything else is an exact path match.
# - 'justification' is mandatory and non-empty; it documents WHY this file
#   is in the migration set, so a future reader of this allowlist can tell
#   "remove this entry now that the file has been retyped" from "this entry
#   still has work scheduled."

allowed:
  # Contracts layer: RowOutcome itself.
  - file: src/elspeth/contracts/enums.py
    justification: ADR-019 migration site — defines RowOutcome until Stage 5; also defines TerminalOutcome / TerminalPath.
  # Testing helpers: exposed to plugin-developer scaffolding.
  - file: src/elspeth/testing/__init__.py
    justification: testing pack re-exports RowOutcome alongside TerminalOutcome/TerminalPath; Stage 5 trims to TerminalOutcome/TerminalPath only.
  # Tests subtree: compatibility fixtures and migrated-test commentary.
  - file: tests/
    justification: compatibility fixtures, mapping-table tests, scanner fixtures, and commentary references only; no real-engine-output outcome == RowOutcome.X assertions may remain after Phase 5.
