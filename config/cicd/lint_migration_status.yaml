version: 1
# Active legacy scripts are explicitly tracked so the meta gate can reject any
# new bespoke scripts/cicd/enforce_*.py file during the elspeth-lints migration.
# Status lifecycle:
#   pending -> shadow -> cutover -> deleted
#
# Shadow entries must include:
#   new_rule: <elspeth-lints rule id>
#   old_command: [<argv tokens emitting JSON findings>]
#   new_command: [<argv tokens emitting JSON findings>]
#
# Supported command placeholders:
#   {python}, {root}, {old_script}, {new_rule}
