# Temporary test-to-source mapping inventory allowlist.
#
# Keep this narrow: real engine-output tests must migrate to two-axis
# (TerminalOutcome, TerminalPath) assertions in this PR. This allowlist is only
# for deliberate compatibility fixtures, mapping-table tests, and commentary.

per_file_rules:
  - pattern: "tests/unit/contracts/test_enums.py"
    rules: ["manifest.test_to_source_mapping"]
    reason: "ADR-019 compatibility and mapping-table tests intentionally exercise RowOutcome until Stage 5 deletes the enum."
  - pattern: "tests/fixtures/cicd/symbol_inventory/positive.py"
    rules: ["manifest.test_to_source_mapping"]
    reason: "ADR-019 source-inventory positive fixture intentionally keeps stale value comparisons for guard coverage."
  - pattern: "tests/unit/core/landscape/test_database_compatibility_guards.py"
    rules: ["manifest.test_to_source_mapping"]
    reason: "ADR-019 compatibility tests intentionally build stale token_outcomes schemas to verify fail-fast migration errors."
  - pattern: "tests/unit/mcp/test_startup_schema_errors.py"
    rules: ["manifest.test_to_source_mapping"]
    reason: "MCP startup compatibility tests intentionally build stale token_outcomes schemas to verify fail-fast schema-error reporting."
