scope-blurb: >-
  Annotated walkthrough of selected transcripts from an evaluation of
  the ELSPETH composer conducted on 2 May 2026 against the staging
  deployment.  The walkthrough covers (1) what to watch for in the
  transcripts, (2) annotated transcripts showing the system in
  operation across three load-bearing behaviours, (3) the named
  defects that remain after the evaluation, and (4) the proposed
  forward programme and the case for sponsor support.  Companion to
  the formal SES briefing (composer-briefing-2026-05-03.md) and the
  underlying engineering eval reports.

