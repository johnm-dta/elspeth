# Headline cards on the cover.
#
# Wording is lifted directly from the walkthrough's "What to watch
# for" section rather than authored afresh — the cover panel must
# say what the body says, not a paraphrase that drifts.  The
# walkthrough's three load-bearing claims map one-to-one onto §§1-3
# of the body and are demonstrated, not predicted.
findings:
  - title: "Constraints surviving to runtime"
    status: "verified"
    note: >-
      The user states a precedence rule in conversation; the composer
      encodes it into the pipeline configuration; the engine honours
      it on real rows at runtime.
  - title: "Honest refusals"
    status: "verified"
    note: >-
      The composer names what's missing instead of producing a
      plausible-looking but non-functional configuration when the
      platform genuinely cannot satisfy a request.
  - title: "Substantive clarifying questions"
    status: "verified"
    note: >-
      Questions engage the structure of the user's analytical problem
      rather than just confirming the surface specification.

