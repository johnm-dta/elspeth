scenarios:
  - id: linear
    ordinal: 1
    title: Linear source → transform → sink
    cases:
      - id: happy-path
        workflow: run
        fixture: linear/happy-path.yaml
        input_fixture: linear/input.csv
        expected:
          status: completed
          output_rows: 3
          required_audit_record_types: [run]
    dimensions:
      config:
        status: pass
        evidence: [yaml-importer-generator, core-builder-schema-plural-sources-05]
      build: &build_pass
        status: pass
        evidence: [core-builder-schema-plural-sources]
      contracts: &contracts_pass
        status: pass
        evidence: [core-builder-schema-plural-sources-03, composer-runtime-agreement]
      runtime:
        status: partial
        evidence: [harness-linear-happy-path]
        reason: Existing runtime evidence does not execute every required production disposition for this scenario.
        owner_issue: elspeth-ef29ef6ba4
        exit_gate: The scenario corpus case passes exact production runtime result and disposition assertions.
      audit:
        status: partial
        evidence: [harness-linear-happy-path]
        reason: Existing audit evidence does not prove every required durable record and portable export for this scenario.
        owner_issue: elspeth-ef29ef6ba4
        exit_gate: The scenario corpus case passes exact durable audit-state and exported-record assertions.
      recovery: &recovery_partial
        status: partial
        evidence: [focused-crash-restart-09]
        reason: The source-ingress crash seam now passes public-resume, fail-closed, and exactly-once plugin assertions, but the complete linear scenario recovery matrix is not yet executable evidence.
        owner_issue: elspeth-ef29ef6ba4
        exit_gate: The scenario corpus case passes database-reopen and public-resume assertions without duplicate work.
      concurrency: &concurrency_unknown
        status: unknown
        reason: No complete contention and fencing case exists for this scenario.
        owner_issue: elspeth-ef29ef6ba4
        exit_gate: The scenario corpus contention case passes single-effective-owner and stale-worker fencing assertions.
      freeform: &freeform_pass
        status: pass
        evidence: [yaml-importer-generator, yaml-importer-generator-02]
      guided: &guided_partial
        status: partial
        reason: Guided authoring has only partial evidence for this scenario.
        owner_issue: elspeth-7e2dd67275
        exit_gate: The guided-authoring corpus case passes canonical graph equality for this scenario.
      round_trip: &round_trip_partial
        status: partial
        reason: Import and export helpers exist, but canonical browser-backed round-trip equality is incomplete.
        owner_issue: elspeth-7cf763da7c
        exit_gate: The browser-backed corpus round-trip passes canonical graph and traversal-plan equality.
      scale: &scale_partial
        status: partial
        reason: Functional scale slices pass without a declared supported threshold for this scenario.
        owner_issue: elspeth-ef29ef6ba4
        exit_gate: The scenario corpus scale case passes its declared supported threshold in the required CI gate.

