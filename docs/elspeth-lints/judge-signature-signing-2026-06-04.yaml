  - file_path: web/app.py
    rule: R6
    symbol: _periodic_orphan_cleanup
    fingerprint: 4cfa0bef5fce8c3f
    rationale: |-
      In _periodic_orphan_cleanup (line 180), the catch is narrowed to (SQLAlchemyError, OSError) — recoverable DB-layer transients and SQLite file-level I/O failures from cancel_all_orphaned_runs at a true external boundary (DB engine + filesystem). The correct behaviour for this periodic background loop is to absorb the transient and retry on the next interval. Programmer-bug exceptions (AttributeError, TypeError, AssertionError) are deliberately NOT caught and terminate the task so they surface at lifespan shutdown — the offensive-programming stance. exc_info is omitted to avoid the documented SQLAlchemy __cause__ credential-leak vector. The existing rationale is accurate. Not silent swallowing of bugs; consistent with sibling cleanup sites.
  - file_path: web/app.py
    rule: R7
    symbol: lifespan
    fingerprint: 99b1d84eb65cf352
    rationale: |-
      Shutdown suppresses the exact asyncio cancellation control signal after explicit task cancellation; it does not suppress operational errors.
  - file_path: web/app.py
    rule: R1
    symbol: _BodySizeLimitMiddleware.dispatch
    fingerprint: 92dd4b5a184dc62a
    rationale: |-
      In _BodySizeLimitMiddleware.dispatch (line 501), `request.headers.get("content-length")` reads an optional HTTP header from untrusted client input — Tier 3. content-length is optional and clients may omit it (comment lines 491-495); None means no declared size, in which case the request proceeds to the per-field Pydantic caps which are the actual contract. Notably the int(content_length) conversion at line 502 is deliberately NOT wrapped, so a malformed header propagates to Starlette's 400 handling rather than being defended — absence is handled honestly (skip the early 413) and bad values still crash. This is correct Tier-3 optional-header handling, not bug-hiding.
  - file_path: web/app.py
    rule: R1
    symbol: create_app
    fingerprint: f23aed5fee50ba7b
    rationale: |-
      create_app (app.py:706) reads os.environ.get("ELSPETH_ENV") != "test" as one clause of the production secret_key guard (the guard hard-crashes via SystemExit when secret_key is the default value on a non-local host outside tests). os.environ is a Tier-3 external boundary (process environment, not first-party data); .get() returns None when ELSPETH_ENV is unset and the != "test" comparison correctly treats absence as "not the test environment" without fabricating a substitute. The decorator nudge does not apply — os.environ is not a function parameter, so @trust_boundary(source_param=...) has nothing to bind. This is the canonical shape-safe read of an optional env var with explicit None handling. (Note: existing rationale's "WEB_CONCURRENCY" label is stale — the actual var is ELSPETH_ENV in the secret-key production guard; rewritten from current code.)
  - file_path: web/app.py
    rule: R1
    symbol: create_app
    fingerprint: bf72ca4a84a3c2e7
    rationale: |-
      At app.py:797, os.environ.get("WEB_CONCURRENCY", "1") reads an optional process-environment variable — a genuine Tier-3 boundary external to ELSPETH. The default "1" is meaning-preserving: absence of WEB_CONCURRENCY documents single-worker, and the value is immediately validated by _parse_worker_count(signal_name="WEB_CONCURRENCY") which rejects non-integers. This is an optional env-var read with a documented absence default, not a defensive .get() on a typed first-party object. (Note: the existing existing_reason text mislabels the variable as ELSPETH_ENV, but the code and the verified existing_rationale both correctly describe WEB_CONCURRENCY.)
  - file_path: web/app.py
    rule: R4
    symbol: create_app._prometheus_metrics
    fingerprint: cace50c86a32e828
    rationale: |-
      In _prometheus_metrics (app.py), the broad `except Exception` wraps generate_latest(), which walks the global Prometheus REGISTRY and runs third-party collector code we do not own — a genuine external boundary at a public /metrics scrape endpoint. A corrupted collector raising would otherwise reach Starlette's default 500 handler and leak the traceback into the response body; the handler instead records the failure via `_handler_slog.error("prometheus_scrape_failed", exc_class=..., detail=str(scrape_exc)[:200])` and returns a fixed 503 with a one-line '# scrape failed' body, so scrapers retry gracefully. Audit-primacy (CLAUDE.md): this endpoint reads in-memory OTel counter state only, so a scrape failure is a telemetry-system failure — operational, not legal — which is the sanctioned use of slog (logged, not audited); no Landscape audit event is swallowed. Logging a bounded message is safe here, unlike the secret-bearing DB exceptions in execution/service.py: generate_latest() only formats global-REGISTRY state, every value of which /metrics already serves publicly, so the message identifies which collector broke without exposing anything not already public. Broad except is the correct width for unknown third-party collector failures at an external boundary; the error is recorded for operators, not dropped.
  - file_path: web/composer/service.py
    rule: R5
    symbol: ComposerServiceImpl._serialize_response_via_walker
    fingerprint: ae6883ce1915b729
    rationale: |-
      PRESCRIBED FORM — first-party sum-type dispatch, now mechanically declared. `_serialize_response_via_walker` accepts `_ToolOutcome`, whose `_ToolOutcomeResponse` type alias is `ToolResult | Mapping[str, Any] | None` in web/composer/_compose_loop_carriers.py. P3 constructs `_ToolOutcome` records only through `tool_batch.run_tool_batch._append_tool_outcome`; normal execute-tool, cache-hit, proposal, and session-aware success paths store a `ToolResult`, while the `request_advisor_hint` interception path intentionally stores first-party Mapping envelopes because that tool is outside `execute_tool` and performs an async advisor LLM call. Those Mapping envelopes are the disabled/budget-exhausted/advisor-error/timeout/success payloads produced in tool_batch.py and are redacted by the manifest entry for `request_advisor_hint`, whose known response keys include the sensitive `guidance` field. The external advisor text crosses its Tier-3 boundary in `_call_advisor_with_audit`, which validates non-empty content and records an inner ComposerLLMCall before building the first-party envelope. The `isinstance(response, Mapping)` branch therefore dispatches a declared internal union so P4 can either deep-thaw the advisor Mapping envelope or call `ToolResult.to_dict()`; it is not masking an unexpected contract violation or fabricating data.
  - file_path: web/auth/oidc.py
    rule: R1
    symbol: JWKSTokenValidator.decode_token
    fingerprint: 7f739b2cc0f07da8
    rationale: |-
      In JWKSTokenValidator.decode_token (oidc.py:390), kid = header.get("kid") reads the optional 'kid' header from an unverified JWT header (jwt.get_unverified_header). The JWT and its header are external-origin Tier-3 data from a remote IdP, and 'kid' is explicitly OPTIONAL per RFC 7515 JWS. A None result flows into the key-matching loop and, if no JWK matches, raises a typed AuthenticationError (line 398) — absence is recorded and surfaced as an auth failure, never fabricated. Direct subscript would raise KeyError on a legitimately kid-less token, converting an expected optional-claim case into a crash. This is meaning-preserving Tier-3 boundary handling, not silent data loss.
  - file_path: web/sessions/routes/_helpers.py
    rule: R2
    symbol: _litellm_error_detail
    fingerprint: 3ca0bb6706462b74
    rationale: |-
      In _litellm_error_detail (_helpers.py:508), getattr(exc, "status_code", None) reads status_code from a LiteLLM-native exception in the else-branch — a third-party-SDK exception object whose attribute surface is provider/SDK-controlled, i.e. Tier-3 external data even though our code holds the reference (our own _BadRequestLLMError carrier is dispatched by exact type in the other branch with direct attribute access). The follow-up `type(natural_status_code) is int` narrows to a validated shape and falls back to None, recording absence rather than fabricating a status code. This is the legitimate Tier-3 shape-guard, not a defensive read of a first-party contract. Existing rationale matches.
  - file_path: web/sessions/routes/_helpers.py
    rule: R5
    symbol: _extract_runtime_model_snapshot
    fingerprint: 23dc9504f1c66975
    rationale: |-
      In _extract_runtime_model_snapshot (line 639), `if not isinstance(options, Mapping): raise AuditIntegrityError(...)` is an OFFENSIVE Tier-1 guard, not defensive suppression. The composition_state JSON is written by our own writer, which guarantees the structural envelope (options is a Mapping; model/model_version are str-or-absent) even though the values inside are LLM-authored. A non-Mapping options is therefore corruption of our own audit data — the code crashes with a typed AuditIntegrityError (and uses `type(value) is str`, not duck-typing, on the inner keys, lines 647/653) rather than coercing garbage into the audit row or hiding the writer bug behind a NULL. isinstance here is the exact-shape envelope check that surfaces our-code corruption by raising. Legitimate offensive use; absent optional keys are correctly recorded as None (line 645-646), not fabricated.


      The @trust_boundary decorator nudge would mark this function tier=3 with source_param=`state` — but that is a TIER MISLABEL that would launder Tier-1 audit data as a Tier-3 external boundary. `state` is a CompositionStateRecord written by our own composition_state writer: node["id"]/node["options"] are read by required direct-subscript (Tier-1, crash-on-absence) and the isinstance(options, Mapping) guard raises AuditIntegrityError on a non-Mapping — an OFFENSIVE check that surfaces corruption of OUR data, not a zero-trust rejection of external input. A @trust_boundary(tier=3) here would (a) misrepresent the trust tier in the audit-tooling record and (b) suppress the offensive guard that is doing exactly the Tier-1 job CLAUDE.md mandates. The honest representation is this per-line allowlist entry documenting a sanctioned Tier-1 offensive isinstance, NOT a Tier-3 boundary decorator.
  - file_path: web/sessions/routes/_helpers.py
    rule: R1
