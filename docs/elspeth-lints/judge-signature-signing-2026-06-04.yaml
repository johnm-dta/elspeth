    rationale: |-
      In BatchTransformMixin._release_loop (mixin.py:350), except TimeoutError -> continue handles the documented poll sentinel from wait_for_next_release(timeout=1.0): 'no result ready in this window'. It is a normal condition during low load, not an error; re-raising would kill the release thread and stall the pipeline. The catch is narrowly typed, and the same try/except routes ShutdownError -> break (clean exit, line 354) and other Exception -> wrap-as-ExceptionResult/emit with TIER_1_ERRORS re-raised (lines 361-380) — discriminated control flow, not a catch-all swallow. R6's concern (errors vanishing without re-raise or error result) does not apply to a documented timeout sentinel used for poll-and-retry. Matches the existing rationale.
