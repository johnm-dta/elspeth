    fingerprint: bce5d1bfa9700829
    rationale: |-
      HTTP/session route boundary; persisted composer state, request payloads, and audit-drain fallbacks require explicit shape checks and narrow recovery catches.
  - file_path: web/sessions/routes/_helpers.py
    rule: R1
    symbol: _extract_runtime_model_snapshot
    fingerprint: ad64db4a8b3325db
    rationale: |-
      In _extract_runtime_model_snapshot (_helpers.py:645/646), `options.get("model")` / `options.get("model_version")` read LEGITIMATELY-OPTIONAL keys from a Tier-1 composition_state node written by our own writer. The REQUIRED keys (`node["id"]`, `node["options"]`) are read by direct subscript (crash-on-absence, correct for Tier-1), and a non-Mapping options raises AuditIntegrityError (offensive). model/model_version are optional BY DESIGN — an LLM transform without an explicit pin uses an LLM-pack default at runtime — so `.get`-returns-None faithfully records 'no runtime model pinned' (the audit columns are nullable) without fabricating a default. A non-str value at either key still raises AuditIntegrityError (line 647/653). The bare `.get` is the honest optional-key read; rewriting it surfaces no decision. R1 over-fires on these optional Tier-1 reads; per-line entry is the reviewed suppression.

      The @trust_boundary nudge (source_param=state, tier=3) is a TIER MISLABEL that would launder Tier-1 audit data as a Tier-3 external boundary and is therefore rejected: `state` is our own composition_state, the offensive AuditIntegrityError guards are doing the Tier-1 job CLAUDE.md mandates, and a tier=3 decorator would both misrepresent the trust tier and suppress those offensive checks.
  - file_path: web/sessions/routes/_helpers.py
    rule: R6
    symbol: _handle_convergence_error
    fingerprint: bc7bce58e1ea7cdd
    rationale: |-
      _handle_convergence_error (_helpers.py:1956) catches except SQLAlchemyError as save_err around a best-effort persistence of partial composer state at a Tier-3 DB-persistence boundary. The catch is narrowed to the SQLAlchemyError family per CLAUDE.md Tier-1 semantics (TypeError/KeyError from state.to_dict()/CompositionStateData would be Tier-1 invariant bugs and deliberately propagate). It does not swallow: it records the failure class via slog (class name only, str(exc) deliberately omitted because SQLAlchemyError text can carry DB URLs/credentials/bound payloads) and surfaces the outcome to the caller by setting partial_state_save_failed=True and partial_state_save_error in the HTTP response body. The recovery is deliberate — a persistence failure must not upgrade a 422 convergence error to a 500. Record-then-degrade-with-explicit-signal, not a silent default. Legitimate.
  - file_path: web/sessions/routes/_helpers.py
    rule: R6
    symbol: _handle_plugin_crash
    fingerprint: 330794dc236b4b2e
    rationale: |-
      In _handle_plugin_crash (_helpers.py:2098), `except SQLAlchemyError as save_err` wraps the partial-state save during plugin-crash handling so that a DB write failure does not mask the original plugin-crash 500 response. The catch is narrow (full SQLAlchemyError family deliberately, to avoid OperationalError/ProgrammingError escaping; ValueError/TypeError/KeyError Tier-1 invariant bugs are NOT caught here and propagate) and the error is not swallowed: it is recorded via slog (class name only, to avoid leaking SQL params/secrets) and surfaced to the frontend as explicit partial_state_save_failed / partial_state_save_error fields so the UI can distinguish 'state captured' from 'state lost'. This is record-then-continue at an audit-DB-degradation boundary, not silent data loss.
  - file_path: web/sessions/routes/_helpers.py
    rule: R6
    symbol: _handle_runtime_preflight_failure
    fingerprint: a2fdcb3a8186e070
    rationale: |-
      In _handle_runtime_preflight_failure (line 2331), `except SQLAlchemyError as save_err` wraps a best-effort audit-DB save of the partial composition state during error handling. The persistence-fallback contract is explicit: a DB write failure must NOT mask the original runtime-preflight 500. The catch is narrowed to SQLAlchemyError (not bare except), records the failure via slog as an audit-system-failure event (class name only, no exc_info, per the documented credential-redaction rationale), and surfaces partial_state_save_failed in the response body. This matches CLAUDE.md's audit-system-failure / persistence-fallback exemption. Programmer bugs are not caught and propagate. Not silent swallowing — the failure is recorded and surfaced.
