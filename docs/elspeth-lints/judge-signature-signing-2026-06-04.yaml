  - file_path: plugins/infrastructure/batching/mixin.py
    rule: R6
    symbol: BatchTransformMixin._complete_ticket
    fingerprint: f6b5a60d4c2ae50c
    rationale: |-
      In BatchTransformMixin._complete_ticket (mixin.py:305), `except (KeyError, ShutdownError)` catches two specific, named exceptions representing legitimate expected races: a ticket already evicted by timeout (KeyError) or a buffer shutdown (ShutdownError). These are documented control-flow signals that a late worker completion arriving after eviction/shutdown is expected and discardable. The discard is recorded via debug log with token_id and state_id for traceability; re-raising would crash a worker thread over a benign race the design tolerates. This is a narrow EAFP catch, not a broad swallow — the handling IS the explicit policy for these two conditions. Existing rationale accurate.
