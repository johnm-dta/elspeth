# ============================================================
# Constraints enforced at close-time
# ============================================================
constraints:
  - rule: subsys-required-at-close
    description: An issue cannot transition to a done category without at least one subsys:* label.
    exception: Issues with kind:cicd-only or type=meta.
  - rule: cluster-max-one
    description: An issue may have at most one cluster:* label (epic grouping).
  - rule: layer-derives-from-subsys
    description: layer:* is auto-derivable from the subsys:* value. If both present, must agree.
