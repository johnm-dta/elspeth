  - from: component:azure
    to: subsys:plugins/infrastructure

  # subsystem:* and subsystem/* → subsys:*
  - from_prefix: "subsystem:"
    to_prefix: "subsys:"
  - from_prefix: "subsystem/"
    to_prefix: "subsys:"
  - from: cluster/composer
    to: cluster:composer-epic    # if rebound to epic slug; otherwise drop

  # web:* → subsys:web/*
  - from: web:composer
    to: subsys:composer/web
  - from: web:execution
    to: subsys:web/execution
  - from: web:frontend
    to: subsys:web/frontend
  - from: web:api
    to: subsys:web
  - from: web:blobs
    to: subsys:web/blobs
  - from: web:catalog
    to: subsys:web/catalog
  - from: web:sessions
    to: subsys:web/sessions
  - from: web:shareable-reviews
    to: subsys:web/shareable-reviews

  # cluster:* (subsystem-shaped) → subsys:*
