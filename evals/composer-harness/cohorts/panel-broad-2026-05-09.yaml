# Cohort declaration: panel-broad-2026-05-09
#
# Maps the non-Azure non-Docker examples in `examples/` to persona pairs for
# the panel-evals harness. Two-tier matrix:
#
#   sparse      — every example gets 2 personas (one "fit", one "stretch").
#                 Default for broad coverage.
#   diagnostic  — 6 representative pipeline shapes get all 4 personas, for
#                 cross-persona comparability on the most informative cells.
#
# Persona-fit assignment heuristic (operator-overridable below):
#   p1_compliance       — audit / retention / regulated workflows
#   p2_researcher       — RAG, multi-query, qualitative analysis, statistical batch
#   p3_marketingops     — gate routing, transform chains, sentiment, lead-style
#   p4_adversarial_engineer — engine internals: chaos, fork-coalesce, large-scale,
#                             checkpoint, deaggregation, schema contracts, plumbing
#
# Stretch persona is usually p1_compliance (amateur baseline — proves the
# composer can drive a non-technical user) OR p4_adversarial_engineer
# (technical ground truth — proves the composer doesn't oversimplify when
# pushed). Choose based on which contrast is more informative for the
# example's shape.
#
# Cell counting:
#   sparse:     27 examples × 2 personas              = 54 cells
#   diagnostic:  6 examples × 4 personas              = 24 cells
#   total broad cohort                                 = 78 cells
#
# Cost estimate (current staging gpt-5-mini):
#   Per cell: ~$1 OpenRouter spend (composer model) + ~$0.001 (Channel 2 judge)
#   Smoke (12 cells, see smoke_subset below): ~$12
#   Broad (78 cells):                          ~$80

cohort_name: panel-broad-2026-05-09
description: |
  Panel-of-examples evaluation. Drives composer through every non-Azure
  non-Docker example × selected personas. Phase-A persona discipline
  (competence_ceiling, incomprehension_moves, concession_rule) applies
  via the existing personas/p{1,2,3,4}_*.md specs.

scenario_root: scenarios/panel/panel-broad-2026-05-09
runs_root: runs/panel-broad-2026-05-09

# ---------------------------------------------------------------------------
# Smoke subset — these 12 cells run first to validate Phase A persona
# discipline holds under live composer pressure with the new spec language.
# Pick by hand for shape diversity:
#   - 1 gate-routing example (boolean_routing)
#   - 1 RAG example (chroma_rag)
#   - 1 aggregation example (batch_aggregation)
#   - 1 multi-step linear (transform_pipeline)
#   - 1 fork-coalesce shape (fork_coalesce)
#   - 1 LLM-classification (schema_contracts_llm_assessment)
# Each gets 2 personas: one "fit" + Linda (amateur baseline) for contrast.
# ---------------------------------------------------------------------------
smoke_subset:
  - { example: boolean_routing, personas: [p3_marketingops, p1_compliance] }
  - { example: chroma_rag, personas: [p2_researcher, p1_compliance] }
  - { example: batch_aggregation, personas: [p4_adversarial_engineer, p1_compliance] }
  - { example: transform_pipeline, personas: [p3_marketingops, p1_compliance] }
  - { example: fork_coalesce, personas: [p4_adversarial_engineer, p1_compliance] }
  - { example: schema_contracts_llm_assessment, personas: [p2_researcher, p1_compliance] }

# ---------------------------------------------------------------------------
# Sparse matrix — broad-cohort coverage. Every example × 2 personas.
# Excludes the 6 diagnostic-promoted examples (they get all 4 personas
# in the diagnostic block below; would double-count here).
# ---------------------------------------------------------------------------
sparse:
  # Compliance / retention / audit
  - { example: audit_export, personas: [p1_compliance, p4_adversarial_engineer] }
  - { example: retention_purge, personas: [p1_compliance, p4_adversarial_engineer] }
  - { example: landscape_journal, personas: [p1_compliance, p4_adversarial_engineer] }
  - { example: error_routing, personas: [p1_compliance, p3_marketingops] }

  # Research / qualitative / RAG (chroma_rag itself is in diagnostic)
  - { example: chroma_rag_indexed, personas: [p2_researcher, p4_adversarial_engineer] }
  - { example: chroma_rag_qa, personas: [p2_researcher, p1_compliance] }
  - { example: multi_query_assessment, personas: [p2_researcher, p1_compliance] }
  - { example: openrouter_multi_query_assessment, personas: [p2_researcher, p4_adversarial_engineer] }

  # Marketing-ops / routing / sentiment (boolean_routing, transform_pipeline,
  # threshold_gate routing variants are in diagnostic or here)
  - { example: threshold_gate, personas: [p3_marketingops, p4_adversarial_engineer] }
  - { example: explicit_routing, personas: [p3_marketingops, p1_compliance] }
  - { example: deep_routing, personas: [p3_marketingops, p4_adversarial_engineer] }
  - { example: openrouter_sentiment, personas: [p3_marketingops, p2_researcher] }
  - { example: chaosllm_sentiment, personas: [p3_marketingops, p4_adversarial_engineer] }

  # Engineering / engine internals (fork_coalesce, batch_aggregation,
  # schema_contracts_llm_assessment are in diagnostic)
  - { example: chaosllm, personas: [p4_adversarial_engineer, p3_marketingops] }
  - { example: chaosllm_endurance, personas: [p4_adversarial_engineer, p3_marketingops] }
  - { example: chaosweb, personas: [p4_adversarial_engineer, p1_compliance] }
  - { example: checkpoint_resume, personas: [p4_adversarial_engineer, p1_compliance] }
  - { example: deaggregation, personas: [p4_adversarial_engineer, p2_researcher] }
  - { example: json_explode, personas: [p4_adversarial_engineer, p3_marketingops] }
  - { example: large_scale_test, personas: [p4_adversarial_engineer, p1_compliance] }
  - { example: rate_limited_llm, personas: [p4_adversarial_engineer, p3_marketingops] }
  - { example: database_sink, personas: [p4_adversarial_engineer, p1_compliance] }
  - { example: schema_contracts_demo, personas: [p4_adversarial_engineer, p2_researcher] }
  - { example: template_lookups, personas: [p4_adversarial_engineer, p3_marketingops] }
  - { example: statistical_batch_plugins, personas: [p2_researcher, p4_adversarial_engineer], variant: threshold_summary }

# ---------------------------------------------------------------------------
# Diagnostic full-matrix — 6 representative shapes × all 4 personas.
# These cells exist for cross-persona comparability: the same pipeline
# shape under amateur (Linda), researcher-journeyman (Sarah),
# overconfident-amateur (Marcus), and expert (Dev).
# ---------------------------------------------------------------------------
diagnostic:
  personas: [p1_compliance, p2_researcher, p3_marketingops, p4_adversarial_engineer]
  examples:
    - boolean_routing                  # gate routing — multi-output split
    - chroma_rag                       # RAG retrieval pattern
    - fork_coalesce                    # full DAG: fork + coalesce
    - batch_aggregation                # aggregation primitive
    - schema_contracts_llm_assessment  # LLM-heavy multi-query
    - transform_pipeline               # canonical linear chain

# ---------------------------------------------------------------------------
# Per-cell overrides. Use this to:
#   * pick a non-default settings variant (e.g. fork_coalesce/settings_union_fail.yaml)
#   * skip a cell that doesn't make sense (e.g. Linda asking for chaosweb is
#     borderline — chaos engineering is technical-engineering-only)
#   * inject extra red/green criteria specific to a cell
# Format:
#   - { example: <name>, persona: <persona_id>, variant: <variant> | null,
#       skip_reason: "..." | null, criteria_overrides: {...} | null }
# ---------------------------------------------------------------------------
overrides: []
