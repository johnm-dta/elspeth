sources:
  stream_a:
    plugin: csv
    on_success: merged
    options:
      path: examples/concurrent_scheduler/input/stream_a.csv
      schema:
        mode: fixed
        fields:
        - 'id: str'
        - 'amount: float'
      on_validation_failure: discard
  stream_b:
    plugin: csv
    on_success: merged
    options:
      path: examples/concurrent_scheduler/input/stream_b.csv
      schema:
        mode: fixed
        fields:
        - 'id: str'
        - 'amount: float'
      on_validation_failure: discard

queues:
  merged: {}

aggregations:
- name: rendezvous
  plugin: batch_stats
  input: merged
  on_success: output
  on_error: discard
  trigger:
    count: 6
  output_mode: transform
  options:
    schema:
      mode: observed
    value_field: amount
    compute_mean: true

sinks:
  output:
    plugin: csv
    on_write_failure: discard
    options:
      path: examples/concurrent_scheduler/output/rendezvous.csv
      schema:
        mode: observed

landscape:
  url: sqlite:///examples/concurrent_scheduler/runs/audit.db
