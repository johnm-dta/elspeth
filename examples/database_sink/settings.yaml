# Database Sink Example — Write Pipeline Output to SQLite
#
# Demonstrates writing pipeline results to a relational database:
#
#   source ─(validated)─> [value_gate] ─┬─ database (high-value deals)
#                                        └─ standard.csv (everything else)
#
# The database sink is a durable, exactly-once publisher: it appends to a target
# table you own and fences each committed batch in a target-side `_elspeth_*`
# effect ledger. Provision both up front with ./run.sh (which runs seed.py first)
# — the runtime never issues DDL. Uses SQLite so no external server is needed.

sources:
  primary:
    plugin: csv
    on_success: validated
    options:
      path: examples/database_sink/input.csv
      schema:
        mode: fixed
        fields:
        - 'id: int'
        - 'customer: str'
        - 'amount: int'
        - 'category: str'
        - 'region: str'
      on_validation_failure: discard

gates:
- name: value_gate
  input: validated
  condition: row['amount'] >= 5000
  routes:
    'true': high_value_db
    'false': standard

sinks:
  high_value_db:
    plugin: database
    on_write_failure: discard
    options:
      url: sqlite:///examples/database_sink/output/deals.db
      table: high_value_deals
      schema:
        mode: fixed
        fields:
        - 'id: int'
        - 'customer: str'
        - 'amount: int'
        - 'category: str'
        - 'region: str'
      # Recoverable exactly-once publication: append to the operator-owned target
      # table and record each committed batch in the target-side effect ledger.
      # Both tables are provisioned up front by seed.py (run via ./run.sh).
      if_exists: append
      effect_ledger:
        table: _elspeth_sink_effects
        schema_version: 1
        permissions: [select, insert]
  standard:
    plugin: csv
    on_write_failure: discard
    options:
      path: examples/database_sink/output/standard_deals.csv
      schema:
        mode: fixed
        fields:
        - 'id: int'
        - 'customer: str'
        - 'amount: int'
        - 'category: str'
        - 'region: str'

landscape:
  url: sqlite:///examples/database_sink/runs/audit.db
