sources:
  feed_a:
    plugin: csv
    on_success: source_out
    options:
      path: examples/multi_worker_showcase/input/feed_a.csv
      schema:
        mode: fixed
        fields:
        - 'id: int'
        - 'text: str'
      on_validation_failure: discard
  feed_b:
    plugin: csv
    on_success: source_out
    options:
      path: examples/multi_worker_showcase/input/feed_b.csv
      schema:
        mode: fixed
        fields:
        - 'id: int'
        - 'text: str'
      on_validation_failure: discard

queues:
  source_out: {}

transforms:
- name: llm_0
  plugin: llm
  input: source_out
  on_success: output
  on_error: quarantine
  options:
    provider: openrouter
    api_key: fake-key-chaosllm-does-not-check
    base_url: http://127.0.0.1:8199/v1
    model: chaosllm/fake-gpt-4
    timeout_seconds: 10
    prompt_template: 'Analyze the sentiment of the following text and respond with ONLY a JSON object.


      Text: {{ row.text }}


      Respond with exactly this format (no other text):

      {"sentiment": "positive" or "negative" or "neutral", "confidence": 0.0-1.0, "summary": "brief explanation"}

      '
    temperature: 0.0
    response_field: sentiment_analysis
    # required_input_fields is empty here because the DAG validator cannot see
    # through a named queue's dynamic schema to the fixed CSV source declarations.
    # The 'text' field is enforced structurally: both CSV sources declare
    # 'text: str' in their fixed schema, so any row reaching the llm carries it.
    required_input_fields: []
    schema:
      mode: observed

sinks:
  output:
    plugin: json
    on_write_failure: discard
    options:
      path: examples/multi_worker_showcase/output/results.json
      schema:
        mode: observed
      format: jsonl
  quarantine:
    plugin: json
    on_write_failure: discard
    options:
      path: examples/multi_worker_showcase/output/quarantined.json
      schema:
        mode: observed
      format: jsonl

landscape:
  url: sqlite:///examples/multi_worker_showcase/runs/audit.db

retry:
  max_attempts: 5
  initial_delay_seconds: 0.5
  max_delay_seconds: 10.0
  exponential_base: 2.0
