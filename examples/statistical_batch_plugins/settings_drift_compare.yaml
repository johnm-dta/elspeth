sources:
  primary:
    plugin: csv
    on_success: drift_in
    options:
      path: examples/statistical_batch_plugins/drift_scores.csv
      schema:
        mode: fixed
        fields:
        - 'id: int'
        - 'cohort: str'
        - 'score: float'
      on_validation_failure: discard
aggregations:
- name: score_drift
  plugin: batch_drift_compare
  input: drift_in
  on_success: output
  on_error: discard
  trigger:
    count: 8
  output_mode: transform
  options:
    schema:
      mode: fixed
      fields:
      - 'id: int'
      - 'cohort: str'
      - 'score: float'
    cohort_field: cohort
    value_field: score
    value_type: numeric
    baseline_cohort: baseline
sinks:
  output:
    plugin: json
    on_write_failure: discard
    options:
      path: examples/statistical_batch_plugins/output/drift_compare.jsonl
      schema:
        mode: observed
      format: jsonl
landscape:
  url: sqlite:///examples/statistical_batch_plugins/runs/drift_compare.db
