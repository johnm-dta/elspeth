sources:
  primary:
    plugin: csv
    on_success: effect_size_in
    options:
      path: examples/statistical_batch_plugins/effect_size_scores.csv
      schema:
        mode: fixed
        fields:
        - 'id: int'
        - 'prompt_variant: str'
        - 'score: float'
      on_validation_failure: discard
aggregations:
- name: prompt_effect_size
  plugin: batch_effect_size
  input: effect_size_in
  on_success: output
  on_error: discard
  trigger:
    count: 8
  output_mode: transform
  options:
    schema:
      mode: fixed
      fields:
      - 'id: int'
      - 'prompt_variant: str'
      - 'score: float'
    variant_field: prompt_variant
    score_field: score
    baseline_variant: control
sinks:
  output:
    plugin: json
    on_write_failure: discard
    options:
      path: examples/statistical_batch_plugins/output/effect_size.jsonl
      schema:
        mode: observed
      format: jsonl
landscape:
  url: sqlite:///examples/statistical_batch_plugins/runs/effect_size.db
