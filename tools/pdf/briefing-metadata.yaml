# Headline verdict cards on the cover.
#
# Each finding renders as a status-tinted card; status drives the
# accent color and pill label (see #cover-status-color / #cover-
# status-label in template.typ).  Statuses: "verified", "fix-
# verified", "gap".
#
# Wording is lifted from §1 of the briefing rather than authored
# afresh — the cover panel must say what the body says, not a
# paraphrase that drifts.
findings:
  - title: "Dialogue discipline"
    status: "verified"
    note: >-
      Clarifying questions, refusal honesty, and mutation control held
      under adversarial pressure across all nine scenarios.
  - title: "Configuration and audit integrity"
    status: "verified"
    note: >-
      Generated YAML passes the same schema contracts as hand-written
      pipelines; audit trail substantively complete for runs that
      execute, with one named gap (per-call language-model records).
  - title: "End-to-end execution"
    status: "fix-verified"
    note: >-
      Engine-failure cluster demonstrated, not merely predicted, to
      resolve with a single targeted change — verified on the Linda
      compliance flow.

