scope-blurb: >-
  This briefing reports the findings of a simulated user ("hard-mode") evaluation of the
  ELSPETH composer conducted on 2 May 2026 and the verification of the
  predicted fix conducted on 3 May 2026.  The evaluation tested the
  composer's behaviour under deliberately adversarial operator pressure
  across nine scenarios (three personas × three task classes — happy-path,
  edge-case, limit-probe).  The briefing covers the headline result,
  per-scenario evidence, verification of the fix on the most refined of
  the three engine-failed pipelines, talking points for further internal
  conversations, and an appendix on what ELSPETH can do today and where
  the platform is heading.

